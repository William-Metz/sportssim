app = "sportssim"
primary_region = "iad"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "180s"
    method = "GET"
    path = "/api/health"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
