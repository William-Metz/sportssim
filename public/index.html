<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsSim 🎯 — Multi-Sport Edge Finder</title>
<style>
:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1f2937;--bg4:#374151;--accent:#3b82f6;--accent2:#60a5fa;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;--purple:#a855f7;--teal:#14b8a6;--text:#f0f0f0;--text2:#9ca3af;--text3:#6b7280;--border:#1e293b;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;border:none;font-family:inherit;font-size:14px}
select,input{font-family:inherit;font-size:14px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 14px;outline:none}
select:focus,input:focus{border-color:var(--accent)}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 20px 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
.header h1{font-size:32px;font-weight:800;letter-spacing:-0.5px}
.header h1 span{color:var(--accent)}
.header p{color:var(--text2);margin-top:6px;font-size:14px}
.sport-switcher{display:flex;justify-content:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.sport-btn{padding:10px 24px;border-radius:10px;font-weight:600;color:var(--text2);background:var(--bg2);border:2px solid transparent;transition:all .2s;font-size:15px}
.sport-btn:hover{color:var(--text);background:var(--bg3)}
.sport-btn.active{color:#fff;border-color:var(--accent);background:var(--bg3)}
.sport-btn.active[data-sport="nba"]{border-color:#f97316}
.sport-btn.active[data-sport="mlb"]{border-color:#22c55e}
.sport-btn.active[data-sport="nhl"]{border-color:#3b82f6}
.sport-btn.active[data-sport="all"]{border-color:#a855f7}
.sport-btn.active[data-sport="ncaa"]{border-color:#f97316}
.tabs{display:flex;gap:4px;background:var(--bg2);padding:5px;border-radius:10px;margin-bottom:20px;overflow-x:auto}
.tab{padding:9px 18px;border-radius:8px;font-weight:500;color:var(--text2);background:transparent;transition:all .2s;white-space:nowrap;font-size:13px}
.tab:hover{color:var(--text);background:var(--bg3)}
.tab.active{color:#fff;background:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h2{font-size:17px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat .val{font-size:26px;font-weight:700;color:var(--accent)}
.stat .label{font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--bg3)}
.positive{color:var(--green);font-weight:600}
.negative{color:var(--red);font-weight:600}
.neutral{color:var(--text2)}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-high{background:rgba(34,197,94,.15);color:var(--green)}
.badge-med{background:rgba(234,179,8,.15);color:var(--yellow)}
.badge-low{background:rgba(156,163,175,.15);color:var(--text2)}
.badge-nba{background:rgba(249,115,22,.15);color:var(--orange)}
.badge-mlb{background:rgba(34,197,94,.15);color:var(--green)}
.badge-nhl{background:rgba(59,130,246,.15);color:var(--accent)}
.game-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;transition:border-color .2s}
.game-card:hover{border-color:var(--accent)}
.game-card.has-edge{border-left:4px solid var(--green)}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.game-teams{font-size:18px;font-weight:700}
.game-teams .at{color:var(--text3);font-weight:400;margin:0 6px}
.game-time{font-size:12px;color:var(--text2)}
.game-model{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:16px;padding:12px;background:var(--bg3);border-radius:8px}
.model-side{text-align:center}
.model-side .team{font-weight:700;font-size:14px}
.model-side .prob{font-size:28px;font-weight:800;margin:4px 0}
.model-vs{color:var(--text3);font-size:12px;font-weight:600}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:12px}
.book-cell{background:var(--bg3);border-radius:8px;padding:10px;text-align:center;position:relative}
.book-cell.best{border:2px solid var(--green)}
.book-cell .book-name{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.book-cell .book-ml{font-size:16px;font-weight:700}
.book-cell .book-spread{font-size:12px;color:var(--text2);margin-top:2px}
.book-cell .book-total{font-size:11px;color:var(--text3);margin-top:2px}
.book-cell .best-tag{position:absolute;top:-6px;right:-6px;background:var(--green);color:#000;font-size:8px;font-weight:800;padding:2px 5px;border-radius:4px}
.edge-banner{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,rgba(34,197,94,.1),rgba(34,197,94,.05));border:1px solid rgba(34,197,94,.3);border-radius:8px;margin-top:8px;flex-wrap:wrap;gap:8px}
.edge-pick{font-size:16px;font-weight:800;color:var(--green)}
.edge-details{font-size:12px;color:var(--text2)}
.bet-btn{display:inline-block;padding:8px 16px;background:var(--green);color:#000;font-weight:700;border-radius:8px;font-size:12px;text-decoration:none;transition:opacity .2s}
.bet-btn:hover{opacity:.85}
.loading{text-align:center;padding:60px 20px;color:var(--text2)}
.loading .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:14px}
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-row label{font-size:12px;color:var(--text2)}
.filter-row select{font-size:12px;padding:6px 10px}
.refresh-btn{padding:8px 16px;background:var(--accent);color:#fff;border-radius:8px;font-weight:600;font-size:12px}
.refresh-btn:hover{opacity:.85}
@media(max-width:768px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .books-grid{grid-template-columns:repeat(2,1fr)}
  .game-model{grid-template-columns:1fr;text-align:center}
  .game-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎯 Sports<span>Sim</span></h1>
    <p>Multi-Sport Edge Finder — Real-time odds comparison across all sportsbooks</p>
    <p style="font-size:12px;color:var(--text3);margin-top:4px" id="last-updated"></p>
  </div>

  <div class="sport-switcher">
    <button class="sport-btn active" data-sport="all" onclick="switchSport('all')">🏆 All Sports</button>
    <button class="sport-btn" data-sport="nba" onclick="switchSport('nba')">🏀 NBA</button>
    <button class="sport-btn" data-sport="mlb" onclick="switchSport('mlb')">⚾ MLB</button>
    <button class="sport-btn" data-sport="nhl" onclick="switchSport('nhl')">🏒 NHL</button>
    <button class="sport-btn" data-sport="opening-day" onclick="switchSport('opening-day')" style="background:linear-gradient(135deg,#22c55e20,#eab30820);border:2px solid #22c55e">🔥 Opening Day</button>
    <button class="sport-btn" data-sport="playbook" onclick="switchSport('playbook')" style="background:linear-gradient(135deg,#6366f120,#a855f720);border:2px solid #a855f7">📋 Playbook</button>
    <button class="sport-btn" data-sport="ncaa" onclick="switchSport('ncaa')" style="background:linear-gradient(135deg,#f9731620,#ef444420);border:2px solid #f97316">🏀 March Madness</button>
  </div>

  <div class="tabs" id="main-tabs"></div>

  <div id="tab-content"></div>
</div>

<script>
const API = '';
let currentSport = 'all';
let currentTab = 'picks';
let todayData = null;
let minEdge = 0;

// ==================== NAVIGATION ====================

function switchSport(sport) {
  currentSport = sport;
  document.querySelectorAll('.sport-btn').forEach(b => b.classList.toggle('active', b.dataset.sport === sport));
  if (sport === 'opening-day') {
    currentTab = 'opening-day';
    document.getElementById('main-tabs').innerHTML = '';
    showTab('opening-day');
    return;
  }
  if (sport === 'playbook') {
    currentTab = 'playbook';
    document.getElementById('main-tabs').innerHTML = '';
    showTab('playbook');
    return;
  }
  buildTabs();
  showTab(currentTab === 'opening-day' ? 'picks' : currentTab);
}

function buildTabs() {
  const tabsEl = document.getElementById('main-tabs');
  const tabs = [
    { id: 'picks', label: '🎯 Daily Picks' },
    { id: 'today', label: '📡 Today\'s Games' },
    { id: 'value', label: '💰 Value Bets' },
    { id: 'props', label: '🎰 Player Props' },
    { id: 'ratings', label: '📊 Power Ratings' },
    { id: 'trends', label: '🔥 Trends & Injuries' },
    { id: 'lines', label: '📈 Lines' },
    { id: 'predict', label: '🎯 Predictor' },
    { id: 'backtest', label: '🧪 Backtest' }
  ];
  if (currentSport === 'mlb' || currentSport === 'all') {
    tabs.splice(5, 0, { id: 'rotations', label: '⚾ Rotations' });
    tabs.splice(6, 0, { id: 'weather', label: '⛅ Weather' });
    tabs.splice(7, 0, { id: 'umpires', label: '👨‍⚖️ Umpires' });
  }
  tabs.push({ id: 'daily-slate', label: '💰 Daily Slate' });
  tabs.push({ id: 'alt-lines', label: '📐 Alt Lines' });
  tabs.push({ id: 'statcast', label: '🔬 Statcast' });
  tabs.push({ id: 'arb', label: '🔀 Arb Scanner' });
  tabs.push({ id: 'sgp', label: '🎲 SGP Builder' });
  tabs.push({ id: 'polymarket', label: '🔮 Polymarket' });
  tabs.push({ id: 'ml', label: '🧠 ML Engine' });
  tabs.push({ id: 'edge-scanner', label: '🎯 Edge Scanner' });
  tabs.push({ id: 'tracker', label: '📋 Bet Tracker' });
  tabs.push({ id: 'auto-scanner', label: '🔄 Auto Scanner' });
  if (currentSport === 'mlb' || currentSport === 'all') {
    tabs.push({ id: 'futures', label: '🏆 MLB Futures' });
    tabs.push({ id: 'f5-unders', label: '⚾ F5 Unders' });
    tabs.push({ id: 'lineups', label: '📋 Lineups' });
  }
  if (currentSport === 'nba' || currentSport === 'all') {
    tabs.push({ id: 'playoffs', label: '🏆 Playoffs' });
    tabs.push({ id: 'nba-seeding', label: '🎯 Seeding Sim' });
    tabs.push({ id: 'rest-tank', label: '😴 Rest/Tank' });
  }
  if (currentSport === 'nhl' || currentSport === 'all') {
    tabs.push({ id: 'nhl-playoffs', label: '🏒 NHL Playoffs' });
    tabs.push({ id: 'nhl-goalies', label: '🥅 NHL Goalies' });
  }
  // NFL always visible — preseason futures model
  tabs.push({ id: 'nfl-futures', label: '🏈 NFL Futures' });
  // NCAA March Madness tab — always visible during tournament
  tabs.push({ id: 'march-madness', label: '🏀 March Madness' });
  tabs.push({ id: 'platoon-splits', label: '🔄 Platoon Splits' });
  tabs.push({ id: 'catcher-framing', label: '🥊 Catcher Framing' });
  tabs.push({ id: 'stolen-bases', label: '🏃 SB Revolution' });
  tabs.push({ id: 'k-props', label: '🔥 K Props' });
  tabs.push({ id: 'champ-futures', label: '💰 Champ Futures' });
  tabs.push({ id: 'od-weather', label: '🌤️ OD Weather' });
  tabs.push({ id: 'seeding-futures', label: '🎯 Seeding→$' });
  tabs.push({ id: 'consensus', label: '🧠 Consensus' });
  tabs.push({ id: 'model-accuracy', label: '📊 Model Accuracy' });
  tabs.push({ id: 'od-checklist', label: '🚀 OD Checklist' });
  tabs.push({ id: 'line-shop', label: '🛒 Line Shop' });
  tabs.push({ id: 'od-validate', label: '✅ OD Readiness' });
  tabs.push({ id: 'od-lines', label: '📈 OD Lines' });
  tabs.push({ id: 'live-tracker', label: '🔴 Live Tracker' });
  tabsEl.innerHTML = tabs.map(t =>
    `<button class="tab ${t.id === currentTab ? 'active' : ''}" data-tab="${t.id}" onclick="showTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function showTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === id));
  const wrap = document.getElementById('tab-content');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:12px">Loading...</p></div>';
  if (id === 'picks') loadDailyPicks();
  else if (id === 'today') loadToday();
  else if (id === 'value') loadValue();
  else if (id === 'props') loadProps();
  else if (id === 'ratings') loadRatings();
  else if (id === 'lines') loadLines();
  else if (id === 'rotations') loadRotationsTab();
  else if (id === 'weather') loadWeatherTab();
  else if (id === 'umpires') loadUmpiresTab();
  else if (id === 'predict') loadPredictor();
  else if (id === 'trends') loadTrends();
  else if (id === 'backtest') loadBacktest();
  else if (id === 'opening-day') loadOpeningDay();
  else if (id === 'polymarket') loadPolymarket();
  else if (id === 'sgp') loadSGPTab();
  else if (id === 'alt-lines') loadAltLinesTab();
  else if (id === 'statcast') loadStatcastTab();
  else if (id === 'arb') loadArbTab();
  else if (id === 'ml') loadMLTab();
  else if (id === 'edge-scanner') loadEdgeScanner();
  else if (id === 'tracker') loadTracker();
  else if (id === 'auto-scanner') loadAutoScannerTab();
  else if (id === 'playbook') loadPlaybook();
  else if (id === 'playoffs') loadPlayoffsTab();
  else if (id === 'futures') loadFuturesTab();
  else if (id === 'rest-tank') loadRestTankTab();
  else if (id === 'champ-futures') loadChampFuturesTab();
  else if (id === 'f5-unders') loadF5UndersTab();
  else if (id === 'lineups') loadLineupsTab();
  else if (id === 'daily-slate') loadDailySlateTab();
  else if (id === 'consensus') loadConsensusTab();
  else if (id === 'model-accuracy') loadModelAccuracyTab();
  else if (id === 'nhl-playoffs') loadNHLPlayoffsTab();
  else if (id === 'nhl-goalies') loadNHLGoaliesTab();
  else if (id === 'nba-seeding') loadNBASeedingTab();
  else if (id === 'od-checklist') loadODChecklistTab();
  else if (id === 'od-validate') loadODValidateTab();
  else if (id === 'od-weather') loadODWeatherTab();
  else if (id === 'seeding-futures') loadSeedingFuturesTab();
  else if (id === 'nfl-futures') loadNFLFuturesTab();
  else if (id === 'march-madness') loadMarchMadnessTab();
  else if (id === 'platoon-splits') loadPlatoonSplitsTab();
  else if (id === 'catcher-framing') loadCatcherFramingTab();
  else if (id === 'stolen-bases') loadStolenBasesTab();
  else if (id === 'k-props') loadKPropsTab();
  else if (id === 'live-tracker') loadLiveTrackerTab();
  else if (id === 'od-lines') loadODLinesTab();
  else if (id === 'line-shop') loadLineShopTab();
}

// ==================== DAILY PICKS ENGINE ====================

async function loadDailyPicks() {
  const wrap = document.getElementById('tab-content');
  try {
    const bankroll = 1000;
    const resp = await fetch(`${API}/api/picks/today?bankroll=${bankroll}&fresh=true`);
    const data = await resp.json();
    
    if (data.error) {
      wrap.innerHTML = `<div class="card"><h2>⚠️ Error</h2><p>${data.error}</p></div>`;
      return;
    }

    const picks = data.picks || [];
    const summary = data.summary || {};
    const advice = data.bankrollAdvice || {};
    
    let html = '';
    
    // Hero banner
    html += `<div class="card" style="background:linear-gradient(135deg,#0a0e17,#1a1a2e);border:2px solid var(--green);position:relative;overflow:hidden">
      <div style="position:absolute;top:-20px;right:-20px;font-size:120px;opacity:0.05">🎯</div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">
        <div>
          <h2 style="font-size:24px;margin-bottom:4px">🎯 Today's Picks — ${data.date}</h2>
          <p style="color:var(--text2)">Aggregated from all models • ${summary.totalGamesScanned || 0} games scanned • ${summary.totalPicksFound || 0} value spots found</p>
        </div>
        <button class="refresh-btn" onclick="loadDailyPicks()" style="background:var(--green);color:#000">🔄 Refresh Picks</button>
      </div>
    </div>`;
    
    // Summary stats
    html += `<div class="stats-grid">
      <div class="stat"><div class="val">${picks.length}</div><div class="label">Top Picks</div></div>
      <div class="stat"><div class="val">${summary.averageEdge ? (summary.averageEdge * 100).toFixed(1) + '%' : '0%'}</div><div class="label">Avg Edge</div></div>
      <div class="stat"><div class="val">${summary.averageConfidence || 0}</div><div class="label">Avg Confidence</div></div>
      <div class="stat"><div class="val">$${advice.totalExpectedProfit || 0}</div><div class="label">Expected Profit</div></div>
      <div class="stat"><div class="val">${advice.expectedROI || 0}%</div><div class="label">Expected ROI</div></div>
      <div class="stat"><div class="val">${advice.riskPercent || 0}%</div><div class="label">Bankroll at Risk</div></div>
    </div>`;
    
    // Sport breakdown
    if (summary.bySport && Object.keys(summary.bySport).length > 0) {
      html += '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">';
      for (const [sport, count] of Object.entries(summary.bySport)) {
        const emoji = sport === 'NBA' ? '🏀' : sport === 'MLB' ? '⚾' : '🏒';
        const cls = sport === 'NBA' ? 'badge-nba' : sport === 'MLB' ? 'badge-mlb' : 'badge-nhl';
        html += `<span class="badge ${cls}" style="font-size:13px;padding:5px 12px">${emoji} ${sport}: ${count} picks</span>`;
      }
      html += '</div>';
    }
    
    if (picks.length === 0) {
      html += '<div class="empty"><p style="font-size:18px">No value picks found right now</p><p style="color:var(--text3);margin-top:8px">Check back when more games are posted or lower the minimum edge</p></div>';
      wrap.innerHTML = html;
      return;
    }
    
    // Individual pick cards
    for (const pick of picks) {
      const tierColor = pick.tier.includes('LOCK') ? '#22c55e' : pick.tier.includes('STRONG') ? '#3b82f6' : pick.tier.includes('SOLID') ? '#60a5fa' : pick.tier.includes('LEAN') ? '#eab308' : '#6b7280';
      const edgePct = (pick.edge * 100).toFixed(1);
      const sportEmoji = pick.sport === 'NBA' ? '🏀' : pick.sport === 'MLB' ? '⚾' : '🏒';
      
      html += `<div class="card" style="border-left:4px solid ${tierColor};position:relative">`;
      
      // Header
      html += `<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:20px">${sportEmoji}</span>
            <span style="font-size:18px;font-weight:800">${pick.pick}</span>
            <span class="badge" style="background:${tierColor}20;color:${tierColor};font-size:12px;padding:4px 10px">${pick.tier}</span>
          </div>
          <div style="color:var(--text2);font-size:13px">${pick.game || ''} • ${pick.market}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:28px;font-weight:800;color:${tierColor}">${pick.confidence}</div>
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase">Confidence</div>
        </div>
      </div>`;
      
      // Key metrics row
      html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:12px;padding:12px;background:var(--bg3);border-radius:8px">`;
      html += `<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--green)">+${edgePct}%</div><div style="font-size:10px;color:var(--text3)">EDGE</div></div>`;
      if (pick.modelProb) html += `<div style="text-align:center"><div style="font-size:18px;font-weight:700">${(pick.modelProb * 100).toFixed(1)}%</div><div style="font-size:10px;color:var(--text3)">MODEL PROB</div></div>`;
      if (pick.bookProb) html += `<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--text2)">${(pick.bookProb * 100).toFixed(1)}%</div><div style="font-size:10px;color:var(--text3)">BOOK PROB</div></div>`;
      if (pick.ml) html += `<div style="text-align:center"><div style="font-size:18px;font-weight:700">${pick.ml > 0 ? '+' : ''}${pick.ml}</div><div style="font-size:10px;color:var(--text3)">BEST LINE</div></div>`;
      if (pick.ev) html += `<div style="text-align:center"><div style="font-size:18px;font-weight:700;color:${pick.ev > 0 ? 'var(--green)' : 'var(--red)'}">${pick.ev > 0 ? '+' : ''}${pick.ev}</div><div style="font-size:10px;color:var(--text3)">EV/$100</div></div>`;
      html += `</div>`;
      
      // Totals-specific info
      if (pick.market === 'total' && pick.modelTotal && pick.bookTotal) {
        html += `<div style="padding:8px 12px;background:var(--bg3);border-radius:6px;margin-bottom:12px;font-size:13px">
          📊 Model projects <strong>${pick.modelTotal} total runs</strong> vs book line <strong>${pick.bookTotal}</strong>
          (diff: <span class="${pick.diff > 0 ? 'positive' : 'negative'}">${pick.diff > 0 ? '+' : ''}${pick.diff}</span>)
        </div>`;
      }
      
      // Kelly sizing
      if (pick.kelly) {
        const alloc = advice.allocations ? advice.allocations.find(a => a.pick === pick.pick) : null;
        html += `<div style="padding:8px 12px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:6px;margin-bottom:12px;font-size:13px">
          💰 Kelly: Full ${(pick.kelly.full * 100).toFixed(1)}% | Half ${(pick.kelly.half * 100).toFixed(1)}% | Quarter ${(pick.kelly.quarter * 100).toFixed(1)}%`;
        if (alloc) html += ` → <strong>Wager $${alloc.wager}</strong> ${alloc.riskReward ? `(${alloc.riskReward})` : ''}`;
        html += `</div>`;
      }
      
      // Pitcher info (MLB)
      if (pick.pitcher) {
        html += `<div style="padding:6px 12px;background:rgba(34,197,94,.08);border-radius:6px;margin-bottom:8px;font-size:12px">
          ⚾ Pitcher: <strong>${pick.pitcher.name}</strong> (${pick.pitcher.tier || 'N/A'}, Rating: ${pick.pitcher.rating || 'N/A'})
        </div>`;
      }
      
      // Umpire info (MLB totals)
      if (pick.umpire && pick.umpire.note) {
        html += `<div style="padding:6px 12px;background:rgba(234,179,8,.08);border-radius:6px;margin-bottom:8px;font-size:12px">
          👨‍⚖️ ${pick.umpire.note}
        </div>`;
      }
      
      // Monte Carlo total (MLB/NHL totals)
      if (pick.mcTotal && pick.market === 'total') {
        html += `<div style="padding:6px 12px;background:rgba(168,85,247,.08);border-radius:6px;margin-bottom:8px;font-size:12px">
          🎲 Monte Carlo sim: ${pick.mcTotal.toFixed(1)} total runs (10K sims)
        </div>`;
      }
      
      // Reasons
      if (pick.reasons && pick.reasons.length > 0) {
        html += '<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">';
        for (const reason of pick.reasons) {
          const warn = reason.startsWith('⚠️');
          html += `<span style="font-size:11px;padding:3px 8px;border-radius:4px;background:${warn ? 'rgba(239,68,68,.1)' : 'rgba(156,163,175,.1)'};color:${warn ? 'var(--red)' : 'var(--text2)'}">${reason}</span>`;
        }
        html += '</div>';
      }
      
      html += `</div>`;
    }
    
    // Bankroll advice card
    if (advice.allocations && advice.allocations.length > 0) {
      html += `<div class="card" style="border:1px solid rgba(59,130,246,.3)">
        <h2>💼 Bankroll Allocation ($${advice.bankroll})</h2>
        <table>
          <tr><th>Pick</th><th>Wager</th><th>Expected Profit</th><th>Risk/Reward</th></tr>`;
      for (const a of advice.allocations) {
        html += `<tr>
          <td><strong>${a.pick}</strong></td>
          <td>$${a.wager}</td>
          <td class="positive">+$${a.expectedProfit}</td>
          <td>${a.riskReward || '-'}</td>
        </tr>`;
      }
      html += `<tr style="border-top:2px solid var(--border);font-weight:700">
        <td>TOTAL</td>
        <td>$${advice.totalWager}</td>
        <td class="positive">+$${advice.totalExpectedProfit}</td>
        <td>${advice.expectedROI}% ROI</td>
      </tr>`;
      html += '</table></div>';
    }
    
    wrap.innerHTML = html;
    
  } catch (e) {
    wrap.innerHTML = `<div class="card"><h2>⚠️ Error loading picks</h2><p>${e.message}</p><button class="refresh-btn" onclick="loadDailyPicks()">🔄 Retry</button></div>`;
  }
}

async function loadToday() {
  const wrap = document.getElementById('tab-content');
  try {
    const data = await api(`/api/today?sport=${currentSport}`);
    todayData = data;
    document.getElementById('last-updated').textContent = `Last updated: ${new Date(data.updated).toLocaleTimeString()} • ${data.count} games`;
    if (!data.games || data.games.length === 0) {
      wrap.innerHTML = '<div class="empty">No games found today. Check back later or try a different sport.</div>';
      return;
    }
    renderTodayGames(data.games);
  } catch (e) {
    wrap.innerHTML = `<div class="empty">Error loading games: ${e.message}<br><br>The Odds API key may not be configured. Set ODDS_API_KEY environment variable.</div>`;
  }
}

function renderTodayGames(games) {
  const wrap = document.getElementById('tab-content');
  const filtered = minEdge > 0 ? games.filter(g => g.edge.best >= minEdge) : games;
  const valueBets = games.filter(g => g.edge.best > 3);

  let html = '';

  // Summary stats
  html += `<div class="stats-grid">
    <div class="stat"><div class="val">${games.length}</div><div class="label">Games Today</div></div>
    <div class="stat"><div class="val" style="color:var(--green)">${valueBets.length}</div><div class="label">Value Bets (3%+)</div></div>
    <div class="stat"><div class="val">${games.filter(g=>g.sport==='NBA').length}</div><div class="label">🏀 NBA</div></div>
    <div class="stat"><div class="val">${games.filter(g=>g.sport==='MLB').length}</div><div class="label">⚾ MLB</div></div>
    <div class="stat"><div class="val">${games.filter(g=>g.sport==='NHL').length}</div><div class="label">🏒 NHL</div></div>
  </div>`;

  // Filters
  html += `<div class="filter-row">
    <label>Min Edge:</label>
    <select onchange="minEdge=+this.value;renderTodayGames(todayData.games)">
      <option value="0" ${minEdge===0?'selected':''}>All Games</option>
      <option value="2" ${minEdge===2?'selected':''}>2%+</option>
      <option value="3" ${minEdge===3?'selected':''}>3%+</option>
      <option value="5" ${minEdge===5?'selected':''}>5%+</option>
      <option value="8" ${minEdge===8?'selected':''}>8%+</option>
    </select>
    <button class="refresh-btn" onclick="loadToday()">🔄 Refresh Odds</button>
  </div>`;

  // Game cards
  for (const game of filtered) {
    const hasEdge = game.edge.best > 3;
    const gameTime = new Date(game.commence).toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    const sportBadge = game.sport === 'NBA' ? 'badge-nba' : game.sport === 'MLB' ? 'badge-mlb' : 'badge-nhl';
    const sportEmoji = game.sport === 'NBA' ? '🏀' : game.sport === 'MLB' ? '⚾' : '🏒';

    html += `<div class="game-card ${hasEdge ? 'has-edge' : ''}">`;

    // Header
    html += `<div class="game-header">
      <div>
        <span class="badge ${sportBadge}">${sportEmoji} ${game.sport}</span>
        ${game.weather && game.sport === 'MLB' ? `<span style="font-size:11px;margin-left:6px;padding:2px 6px;border-radius:4px;background:${game.weather.dome ? 'var(--bg3)' : Math.abs(game.weather.totalImpact || 0) > 2 ? 'rgba(255,152,0,0.15)' : 'var(--bg3)'};color:${game.weather.dome ? 'var(--text2)' : (game.weather.totalImpact || 0) > 2 ? '#ff9800' : (game.weather.totalImpact || 0) < -2 ? '#2196f3' : 'var(--text2)'}">${game.weather.dome ? '🏠 Dome' : `${game.weather.temp ? game.weather.temp.toFixed(0)+'°F' : ''} ${game.weather.wind ? '💨'+game.weather.wind.toFixed(0)+'mph' : ''} ${(game.weather.totalImpact||0) !== 0 ? '('+(game.weather.totalImpact>0?'+':'')+game.weather.totalImpact+'%)' : ''}`}</span>` : ''}
        <span class="game-teams" style="margin-left:8px">${game.away} <span class="at">@</span> ${game.home}</span>
      </div>
      <div class="game-time">${gameTime}</div>
    </div>`;

    // Model prediction
    if (game.prediction) {
      const awayColor = game.prediction.awayWinProb > 50 ? 'var(--green)' : 'var(--text2)';
      const homeColor = game.prediction.homeWinProb > 50 ? 'var(--green)' : 'var(--text2)';
      html += `<div class="game-model">
        <div class="model-side">
          <div class="team">${game.away}</div>
          <div class="prob" style="color:${awayColor}">${game.prediction.awayWinProb}%</div>
          <div style="font-size:11px;color:var(--text3)">Model Win Prob</div>
        </div>
        <div class="model-vs">VS</div>
        <div class="model-side">
          <div class="team">${game.home}</div>
          <div class="prob" style="color:${homeColor}">${game.prediction.homeWinProb}%</div>
          <div style="font-size:11px;color:var(--text3)">Model Win Prob</div>
        </div>
      </div>`;
    } else {
      html += `<div style="text-align:center;padding:12px;color:var(--text3);font-size:12px">Model prediction unavailable for this matchup</div>`;
    }

    // Sportsbook odds grid
    const bookNames = Object.keys(game.books);
    if (bookNames.length > 0) {
      html += `<div style="margin-bottom:8px;font-size:11px;color:var(--text3)">MONEYLINES ACROSS BOOKS</div>`;
      html += `<div class="books-grid">`;
      for (const bookName of bookNames) {
        const bk = game.books[bookName];
        const isBestHome = game.bestLine.home.book === bookName;
        const isBestAway = game.bestLine.away.book === bookName;
        const isBest = isBestHome || isBestAway;
        html += `<div class="book-cell ${isBest ? 'best' : ''}">
          ${isBest ? '<div class="best-tag">BEST</div>' : ''}
          <div class="book-name">${bookName}</div>
          <div style="display:flex;justify-content:space-around">
            <div>
              <div style="font-size:9px;color:var(--text3)">${game.away}</div>
              <div class="book-ml" style="color:${bk.awayML > 0 ? 'var(--green)' : 'var(--red)'}">${bk.awayML > 0 ? '+' : ''}${bk.awayML || '—'}</div>
            </div>
            <div>
              <div style="font-size:9px;color:var(--text3)">${game.home}</div>
              <div class="book-ml" style="color:${bk.homeML > 0 ? 'var(--green)' : 'var(--red)'}">${bk.homeML > 0 ? '+' : ''}${bk.homeML || '—'}</div>
            </div>
          </div>
          ${bk.spread !== undefined ? `<div class="book-spread">Spread: ${bk.spread > 0 ? '+' : ''}${bk.spread}</div>` : ''}
          ${bk.total !== undefined ? `<div class="book-total">O/U: ${bk.total}</div>` : ''}
        </div>`;
      }
      html += `</div>`;
    }

    // Edge banner
    if (hasEdge && game.prediction) {
      const pickTeam = game.edge.pick;
      const pickEdge = game.edge.best;
      const pickSide = game.edge.pickSide;
      const bestBook = pickSide === 'home' ? game.bestLine.home.book : game.bestLine.away.book;
      const bestML = pickSide === 'home' ? game.bestLine.home.ml : game.bestLine.away.ml;
      const confidence = pickEdge >= 8 ? 'HIGH' : pickEdge >= 5 ? 'MEDIUM' : 'LOW';
      const confBadge = confidence === 'HIGH' ? 'badge-high' : confidence === 'MEDIUM' ? 'badge-med' : 'badge-low';

      // Kelly criterion
      const modelProb = pickSide === 'home' ? game.prediction.homeWinProb / 100 : game.prediction.awayWinProb / 100;
      const decimalOdds = bestML > 0 ? (bestML / 100) + 1 : (100 / Math.abs(bestML)) + 1;
      const kelly = ((modelProb * decimalOdds - 1) / (decimalOdds - 1));
      const halfKelly = Math.max(0, kelly / 2);
      const suggestedBet = Math.round(halfKelly * 1000);

      // Sportsbook links
      const bookLinks = {
        'DraftKings': 'https://sportsbook.draftkings.com',
        'FanDuel': 'https://sportsbook.fanduel.com',
        'BetMGM': 'https://sports.betmgm.com',
        'Caesars': 'https://www.caesars.com/sportsbook-and-casino',
        'PointsBet': 'https://pointsbet.com',
        'BetRivers': 'https://www.betrivers.com',
        'Bovada': 'https://www.bovada.lv',
        'BetOnline.ag': 'https://www.betonline.ag',
        'MyBookie.ag': 'https://www.mybookie.ag',
        'Barstool Sportsbook': 'https://www.barstoolsportsbook.com',
        'WynnBET': 'https://www.wynnbet.com',
        'SuperBook': 'https://co.superbook.com',
        'Unibet': 'https://www.unibet.com',
        'TwinSpires': 'https://www.twinspires.com',
        'FOX Bet': 'https://www.foxbet.com',
        'SI Sportsbook': 'https://www.sisportsbook.com',
        'LowVig.ag': 'https://www.lowvig.ag',
        'Betway': 'https://www.betway.com'
      };
      const betLink = bookLinks[bestBook] || '#';

      html += `<div class="edge-banner">
        <div>
          <div class="edge-pick">🔥 ${pickTeam} ML (${bestML > 0 ? '+' : ''}${bestML}) — ${bestBook}</div>
          <div class="edge-details">
            Edge: +${pickEdge.toFixed(1)}% • <span class="badge ${confBadge}">${confidence}</span> • 
            Half-Kelly: $${suggestedBet} on $1K bankroll •
            EV: $${((modelProb * decimalOdds - 1) * 100).toFixed(0)}/100
          </div>
        </div>
        <a href="${betLink}" target="_blank" rel="noopener" class="bet-btn">Bet Now →</a>
      </div>`;
    }

    html += `</div>`;
  }

  if (filtered.length === 0) {
    html += '<div class="empty">No games match your filter. Try lowering the minimum edge.</div>';
  }

  wrap.innerHTML = html;
}

        <td class="${r.luck>0?'positive':r.luck<-0.02?'negative':'neutral'}">${r.luck>0?'+':''}${(r.luck*100)?.toFixed(1)||r.luck?.toFixed(1)||'—'}%</td>

    if (currentSport === 'all' || currentSport === 'nhl') {

        <td>${r.rank}</td><td style="font-weight:600">${r.abbr} ${r.name}</td><td>${r.record||'—'}</td>
        <td>${r.gf?.toFixed(1)||'—'}</td><td>${r.ga?.toFixed(1)||'—'}</td>
        <td>${r.pp?.toFixed(1)||'—'}%</td><td>${r.pk?.toFixed(1)||'—'}%</td>
        <td>${r.sv?.toFixed(1)||'—'}%</td>
        <td>${(r.pythWinPct*100)?.toFixed(1)||'—'}%</td>
        <td class="${r.luck>0?'positive':r.luck<-2?'negative':'neutral'}">${r.luck>0?'+':''}${r.luck?.toFixed(1)||'—'}%</td>
        <td style="font-weight:700">${r.power?.toFixed(1)||'—'}</td>`);
    }
    wrap.innerHTML = html || '<div class="empty">No ratings available for selected sport.</div>';
  } catch (e) { wrap.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

function renderRatings(title, ratings, headers, rowFn) {
  let html = `<div class="card"><h2>${title}</h2>`;
  html += `<div style="overflow-x:auto"><table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>`;
  (ratings||[]).forEach((r,i) => { r.rank = i+1; html += `<tr>${rowFn(r)}</tr>`; });
  html += `</tbody></table></div></div>`;
  return html;
}

let pitcherCache = {};

async function onTeamChange(sport, side) {
  if (sport !== 'mlb') return;
  const teamAbbr = document.getElementById(side === 'away' ? 'away-team' : 'home-team').value;
  const selectId = side === 'away' ? 'away-pitcher' : 'home-pitcher';
  const sel = document.getElementById(selectId);
  if (!sel || !teamAbbr) return;
  sel.innerHTML = '<option value="">— Team Average —</option>';
  try {
    if (!pitcherCache[teamAbbr]) {
      const d = await api(`/api/model/mlb/pitchers/${teamAbbr}`);
      pitcherCache[teamAbbr] = d.rotation || [];
    }
    const rotation = pitcherCache[teamAbbr];
    rotation.forEach(p => {
      const tier = p.rating >= 75 ? '🔥' : p.rating >= 65 ? '⭐' : p.rating >= 55 ? '✅' : p.rating >= 45 ? '⚪' : '⬇️';
      const opt = new Option(`${tier} ${p.name} (${p.era} ERA, ${p.fip} FIP, Rating: ${p.rating})`, p.name);
      sel.add(opt);
    });
  } catch (e) { console.error('Failed to load pitchers for', teamAbbr); }
}

async function loadRotations() {
  const display = document.getElementById('rotations-display');
  if (!display) return;
  display.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const d = await api('/api/model/mlb/pitchers');
    // Group by team
    const byTeam = {};
    (d.pitchers || []).forEach(p => {
      if (!byTeam[p.team]) byTeam[p.team] = [];
      byTeam[p.team].push(p);
    });
    let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">';
    const sortedTeams = Object.keys(byTeam).sort();
    for (const team of sortedTeams) {
      const rotation = byTeam[team];
      const avgRating = (rotation.reduce((s,p) => s + p.rating, 0) / rotation.length).toFixed(0);
      html += `<div style="background:var(--bg3);border-radius:8px;padding:12px">
        <div style="font-weight:700;font-size:14px;margin-bottom:8px">${team} <span style="color:var(--text3);font-weight:400;font-size:11px">Avg: ${avgRating}</span></div>`;
      rotation.forEach((p, i) => {
        const tierColor = p.rating >= 75 ? 'var(--green)' : p.rating >= 65 ? 'var(--accent2)' : p.rating >= 55 ? 'var(--yellow)' : p.rating >= 45 ? 'var(--text2)' : 'var(--red)';
        const tierLabel = p.rating >= 75 ? 'ACE' : p.rating >= 65 ? 'STRONG' : p.rating >= 55 ? 'SOLID' : p.rating >= 45 ? 'AVG' : 'BELOW';
        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;${i === 0 ? 'font-weight:600' : ''}">
          <span>${p.hand === 'L' ? '(L)' : '(R)'} ${p.name}</span>
          <span><span style="color:var(--text3)">${p.era} ERA</span> <span style="font-weight:700;color:${tierColor};margin-left:4px">${p.rating}</span> <span class="badge" style="font-size:8px;background:${tierColor}20;color:${tierColor}">${tierLabel}</span></span>
        </div>`;
      });
      html += '</div>';
    }
    html += '</div>';
    display.innerHTML = html;
  } catch (e) { display.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

async function populateTeamSelectors(sport) {
  try {
    const d = await api(`/api/model/${sport}/ratings`);
    const sel1 = document.getElementById('away-team'), sel2 = document.getElementById('home-team');
    (d.ratings||[]).forEach((r,i) => {
      const label = sport === 'mlb' ? `${r.abbr} — ${r.name} (${r.aceName ? r.aceName + ' ' + r.aceRating : ''})` : `${r.abbr} — ${r.name}`;
      const opt1 = new Option(label, r.abbr);
      const opt2 = new Option(label, r.abbr);
      sel1.add(opt1); sel2.add(opt2);
      if (i === 1) sel2.selectedIndex = i;
    });
    // For MLB, load initial pitchers
    if (sport === 'mlb') {
      setTimeout(() => {
        onTeamChange('mlb', 'away');
        onTeamChange('mlb', 'home');
      }, 100);
    }
  } catch (e) {}
}

async function runPredict(sport) {
  const away = document.getElementById('away-team').value;
  const home = document.getElementById('home-team').value;
  const result = document.getElementById('predict-result');
  result.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    let url = `/api/model/${sport}/predict?away=${away}&home=${home}`;
    if (sport === 'nba') {
      const ab2b = document.getElementById('away-b2b')?.checked;
      const hb2b = document.getElementById('home-b2b')?.checked;
      url += `&awayB2B=${ab2b}&homeB2B=${hb2b}`;
    }
    if (sport === 'mlb') {
      const awayP = document.getElementById('away-pitcher')?.value;
      const homeP = document.getElementById('home-pitcher')?.value;
      if (awayP) url += `&awayPitcher=${encodeURIComponent(awayP)}`;
      if (homeP) url += `&homePitcher=${encodeURIComponent(homeP)}`;
    }
    const pred = await api(url);
    if (pred.error) { result.innerHTML = `<div class="empty">${pred.error}</div>`; return; }
    
    let html = `<div class="game-model">
      <div class="model-side">
        <div class="team">${away}</div>
        <div class="prob" style="color:${(pred.awayWinProb||pred.away?.winProb||50)>50?'var(--green)':'var(--text2)'}">${(pred.awayWinProb||pred.away?.winProb||50).toFixed?.(1)||(pred.awayWinProb||pred.away?.winProb||50)}%</div>
        <div style="font-size:14px;font-weight:600;color:var(--text2);margin-top:2px">${pred.awayML > 0 ? '+' : ''}${pred.awayML || ''}</div>
      </div>
      <div class="model-vs">VS</div>
      <div class="model-side">
        <div class="team">${home}</div>
        <div class="prob" style="color:${(pred.homeWinProb||pred.home?.winProb||50)>50?'var(--green)':'var(--text2)'}">${(pred.homeWinProb||pred.home?.winProb||50).toFixed?.(1)||(pred.homeWinProb||pred.home?.winProb||50)}%</div>
        <div style="font-size:14px;font-weight:600;color:var(--text2);margin-top:2px">${pred.homeML > 0 ? '+' : ''}${pred.homeML || ''}</div>
      </div>
    </div>`;

    // MLB-specific: pitcher info + totals
    if (sport === 'mlb') {
      // Pitcher matchup card
      if (pred.awayPitcher || pred.homePitcher) {
        html += `<div class="card" style="margin-top:12px"><h2>⚾ Pitcher Matchup</h2>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:start">`;
        
        if (pred.awayPitcher) {
          const ap = pred.awayPitcher;
          const tierColor = ap.rating >= 75 ? 'var(--green)' : ap.rating >= 65 ? 'var(--accent2)' : ap.rating >= 55 ? 'var(--yellow)' : 'var(--text2)';
          html += `<div style="text-align:center">
            <div style="font-size:11px;color:var(--text3)">${away} STARTER</div>
            <div style="font-size:16px;font-weight:700;margin:4px 0">${ap.name}</div>
            <div style="font-size:28px;font-weight:800;color:${tierColor}">${ap.rating}</div>
            <div style="font-size:11px;color:${tierColor};font-weight:600">${ap.tier}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:8px">
              ${ap.hand}HP • ${ap.era} ERA • ${ap.fip} FIP<br>
              ${ap.whip} WHIP • ${ap.k9} K/9
            </div>
          </div>`;
        } else {
          html += `<div style="text-align:center;color:var(--text3)"><div style="font-size:11px">${away} STARTER</div><div style="margin-top:8px">Team Average</div></div>`;
        }
        
        html += `<div style="text-align:center;color:var(--text3);font-weight:600;padding-top:20px">VS</div>`;
        
        if (pred.homePitcher) {
          const hp = pred.homePitcher;
          const tierColor = hp.rating >= 75 ? 'var(--green)' : hp.rating >= 65 ? 'var(--accent2)' : hp.rating >= 55 ? 'var(--yellow)' : 'var(--text2)';
          html += `<div style="text-align:center">
            <div style="font-size:11px;color:var(--text3)">${home} STARTER</div>
            <div style="font-size:16px;font-weight:700;margin:4px 0">${hp.name}</div>
            <div style="font-size:28px;font-weight:800;color:${tierColor}">${hp.rating}</div>
            <div style="font-size:11px;color:${tierColor};font-weight:600">${hp.tier}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:8px">
              ${hp.hand}HP • ${hp.era} ERA • ${hp.fip} FIP<br>
              ${hp.whip} WHIP • ${hp.k9} K/9
            </div>
          </div>`;
        } else {
          html += `<div style="text-align:center;color:var(--text3)"><div style="font-size:11px">${home} STARTER</div><div style="margin-top:8px">Team Average</div></div>`;
        }
        html += `</div></div>`;
      }

      // Run projections
      html += `<div class="card" style="margin-top:12px"><h2>📊 Run Projections</h2>
      <div class="stats-grid">
        <div class="stat"><div class="val">${pred.awayExpRuns}</div><div class="label">${away} Exp Runs</div></div>
        <div class="stat"><div class="val">${pred.homeExpRuns}</div><div class="label">${home} Exp Runs</div></div>
        <div class="stat"><div class="val" style="color:var(--yellow)">${pred.totalRuns}</div><div class="label">Total</div></div>
        <div class="stat"><div class="val">${pred.f5Total}</div><div class="label">F5 Total</div></div>
        <div class="stat"><div class="val">${pred.parkFactor}x</div><div class="label">Park Factor</div></div>
      </div></div>`;

      // Poisson Totals
      if (pred.totals && pred.totals.lines) {
        html += `<div class="card" style="margin-top:12px"><h2>🎲 Poisson Totals Model</h2>
        <p style="color:var(--text2);font-size:12px;margin-bottom:12px">Projected Total: <strong style="color:var(--yellow)">${pred.totals.projTotal}</strong> runs</p>
        <div style="overflow-x:auto"><table><thead><tr><th>Line</th><th>Over %</th><th>Over ML</th><th>Under %</th><th>Under ML</th><th>Edge</th></tr></thead><tbody>`;
        for (const [line, data] of Object.entries(pred.totals.lines)) {
          const overPct = (data.over * 100).toFixed(1);
          const underPct = (data.under * 100).toFixed(1);
          const bestSide = data.over > data.under ? 'over' : 'under';
          const edgePct = Math.abs(data.over - 0.5) * 100;
          html += `<tr>
            <td style="font-weight:700">${line}</td>
            <td style="color:${bestSide === 'over' ? 'var(--green)' : 'var(--text2)'}${bestSide === 'over' ? ';font-weight:600' : ''}">${overPct}%</td>
            <td>${data.overML > 0 ? '+' : ''}${data.overML}</td>
            <td style="color:${bestSide === 'under' ? 'var(--green)' : 'var(--text2)'}${bestSide === 'under' ? ';font-weight:600' : ''}">${underPct}%</td>
            <td>${data.underML > 0 ? '+' : ''}${data.underML}</td>
            <td class="${edgePct > 5 ? 'positive' : 'neutral'}">${edgePct > 5 ? '+' : ''}${edgePct.toFixed(1)}%</td>
          </tr>`;
        }
        html += `</tbody></table></div>`;

        // Likely scores
        if (pred.totals.likelyScores && pred.totals.likelyScores.length > 0) {
          html += `<div style="margin-top:12px"><div style="font-size:11px;color:var(--text3);margin-bottom:6px">MOST LIKELY FINAL SCORES</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">`;
          pred.totals.likelyScores.forEach((s, i) => {
            const bg = i === 0 ? 'var(--accent)' : 'var(--bg3)';
            const color = i === 0 ? '#fff' : 'var(--text)';
            html += `<div style="background:${bg};color:${color};padding:6px 10px;border-radius:6px;font-size:12px;font-weight:${i===0?'700':'500'}">
              ${s.score} <span style="opacity:.7">${s.prob}%</span>
            </div>`;
          });
          html += `</div></div>`;
        }
        html += `</div>`;
      }
    }

    // ==================== F5 (First 5 Innings) NB Model (v60.0) ====================
    if (pred.f5 && pred.f5.model === 'negative-binomial-f5' && sport === 'mlb') {
      const f5 = pred.f5;
      html += `<div class="card" style="margin-top:12px"><h2>⏱️ First 5 Innings Model (NB)</h2>
      <p style="color:var(--text2);font-size:12px;margin-bottom:12px">Negative Binomial scoring model — exact probability matrix for F5 outcomes</p>
      <div class="stats-grid">
        <div class="stat"><div class="val" style="color:var(--yellow)">${f5.total}</div><div class="label">F5 Total</div></div>
        <div class="stat"><div class="val">${f5.awayRuns}</div><div class="label">${away} F5 Runs</div></div>
        <div class="stat"><div class="val">${f5.homeRuns}</div><div class="label">${home} F5 Runs</div></div>
        <div class="stat"><div class="val">${(f5.drawProb * 100).toFixed(1)}%</div><div class="label">F5 Draw</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0">
        <div style="background:var(--card2);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:10px;color:var(--text3)">${away} F5 WIN</div>
          <div style="font-size:18px;font-weight:700;color:var(--accent2)">${(f5.awayWinProb * 100).toFixed(1)}%</div>
          <div style="font-size:11px;color:var(--text3)">${f5.awayML > 0 ? '+' : ''}${f5.awayML}</div>
        </div>
        <div style="background:var(--card2);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:10px;color:var(--text3)">DRAW</div>
          <div style="font-size:18px;font-weight:700;color:var(--yellow)">${(f5.drawProb * 100).toFixed(1)}%</div>
          <div style="font-size:11px;color:var(--text3)">${f5.threeWay?.drawML > 0 ? '+' : ''}${f5.threeWay?.drawML || '-'}</div>
        </div>
        <div style="background:var(--card2);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:10px;color:var(--text3)">${home} F5 WIN</div>
          <div style="font-size:18px;font-weight:700;color:var(--green)">${(f5.homeWinProb * 100).toFixed(1)}%</div>
          <div style="font-size:11px;color:var(--text3)">${f5.homeML > 0 ? '+' : ''}${f5.homeML}</div>
        </div>
      </div>`;
      
      // F5 totals lines
      if (f5.totals) {
        html += `<div style="overflow-x:auto;margin-top:8px"><table><thead><tr><th>F5 Line</th><th>Over %</th><th>Over ML</th><th>Under %</th><th>Under ML</th></tr></thead><tbody>`;
        for (const line of [3.5, 4, 4.5, 5, 5.5, 6, 6.5]) {
          const d = f5.totals[line];
          if (!d) continue;
          const overPct = (d.over * 100).toFixed(1);
          const underPct = (d.under * 100).toFixed(1);
          const best = d.over > d.under ? 'over' : 'under';
          html += `<tr>
            <td style="font-weight:700">${line}</td>
            <td style="color:${best === 'over' ? 'var(--green)' : 'var(--text2)'}${best === 'over' ? ';font-weight:600' : ''}">${overPct}%</td>
            <td>${d.overML > 0 ? '+' : ''}${d.overML}</td>
            <td style="color:${best === 'under' ? 'var(--green)' : 'var(--text2)'}${best === 'under' ? ';font-weight:600' : ''}">${underPct}%</td>
            <td>${d.underML > 0 ? '+' : ''}${d.underML}</td>
          </tr>`;
        }
        html += `</tbody></table></div>`;
      }
      html += `</div>`;
    }
    
    // ==================== Run Line Analysis (v60.0) ====================
    if (pred.altRunLines && sport === 'mlb') {
      html += `<div class="card" style="margin-top:12px"><h2>📏 Run Line Analysis (NB)</h2>
      <p style="color:var(--text2);font-size:12px;margin-bottom:12px">Exact probabilities from Negative Binomial score matrix — replaces normal approximation</p>
      <div style="overflow-x:auto"><table><thead><tr><th>Run Line</th><th>${home} Cover %</th><th>${home} ML</th><th>${away} Cover %</th><th>${away} ML</th></tr></thead><tbody>`;
      
      const rlData = pred.altRunLines;
      for (const spread of ['-1.5', '-2.5', '-3.5']) {
        const h = rlData.home?.[spread];
        if (!h) continue;
        const hPct = (h.homeCover * 100).toFixed(1);
        const aPct = (h.awayCover * 100).toFixed(1);
        html += `<tr>
          <td style="font-weight:700">${spread} / +${Math.abs(parseFloat(spread))}</td>
          <td style="color:${h.homeCover > 0.5 ? 'var(--green)' : 'var(--text2)'}${h.homeCover > 0.5 ? ';font-weight:600' : ''}">${hPct}%</td>

        </tr>`;
      }
      html += `</tbody></table></div></div>`;
    }
    
    // ==================== Conviction Score (v60.0) ====================

      const cv = pred.conviction;
      const gradeColors = { 'A+': '#00e676', 'A': '#4caf50', 'B+': '#8bc34a', 'B': '#cddc39', 'C+': '#ffeb3b', 'C': '#ff9800', 'D': '#ff5722', 'F': '#f44336' };
      const color = gradeColors[cv.grade] || 'var(--text2)';
      html += `<div class="card" style="margin-top:12px"><h2>🎯 Conviction Score</h2>

          <div style="font-size:24px;font-weight:800;color:${color}">${cv.score}</div>
          <div style="font-size:11px;color:${color}">${cv.grade}</div>
        </div>
        <div>
          <div style="font-size:16px;font-weight:700;color:${color}">${cv.action}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">Kelly fraction: ${(cv.kellyFraction * 100).toFixed(0)}%</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text2)">`;
      for (const b of (cv.breakdown || [])) {
        const pColor = b.points >= 10 ? 'var(--green)' : b.points >= 5 ? 'var(--yellow)' : 'var(--text3)';
        html += `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bg3)">
          <span>${b.detail}</span>
          <span style="color:${pColor};font-weight:600">+${b.points}</span>
        </div>`;
      }
      html += `</div></div>`;
    }

    // Monte Carlo simulation results (MLB only)
    if (pred.monteCarlo && sport === 'mlb') {
      const mc = pred.monteCarlo;
      html += `<div class="card" style="margin-top:12px"><h2>🎲 Monte Carlo Simulation (10K games)</h2>`;
      
      // Win probability comparison
      html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0">`;
      html += `<div style="background:var(--card2);border-radius:8px;padding:12px;text-align:center">
        <div style="font-size:11px;color:var(--text3)">ANALYTICAL WIN%</div>
        <div style="font-size:20px;font-weight:700;color:var(--accent2)">${(pred.homeWinProb * 100).toFixed(1)}% / ${(pred.awayWinProb * 100).toFixed(1)}%</div>
      </div>`;
      html += `<div style="background:var(--card2);border-radius:8px;padding:12px;text-align:center">
        <div style="font-size:11px;color:var(--text3)">MC SIM WIN%</div>
        <div style="font-size:20px;font-weight:700;color:var(--green)">${(mc.homeWinProb * 100).toFixed(1)}% / ${(mc.awayWinProb * 100).toFixed(1)}%</div>
      </div>`;
      html += `</div>`;
      
      // Blended line
      if (pred.blendedHomeWinProb) {
        html += `<div style="text-align:center;margin:8px 0;padding:10px;background:linear-gradient(135deg,var(--card2),rgba(76,175,80,0.1));border-radius:8px;border:1px solid var(--green)">
          <div style="font-size:11px;color:var(--text3)">BLENDED (60% MC + 40% ANALYTICAL)</div>
          <div style="font-size:22px;font-weight:800;color:var(--green)">${home} ${(pred.blendedHomeWinProb * 100).toFixed(1)}% | ${away} ${(pred.blendedAwayWinProb * 100).toFixed(1)}%</div>
          <div style="font-size:13px;color:var(--text2)">${pred.blendedHomeML > 0 ? '+' : ''}${pred.blendedHomeML} / ${pred.blendedAwayML > 0 ? '+' : ''}${pred.blendedAwayML}</div>
        </div>`;
      }
      
      // Total runs distribution
      const tr = mc.totalRuns;
      html += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0">`;
      html += `<div style="background:var(--card2);border-radius:6px;padding:8px;text-align:center">
        <div style="font-size:10px;color:var(--text3)">MEAN</div>
        <div style="font-size:18px;font-weight:700">${tr.mean}</div>
      </div>`;
      html += `<div style="background:var(--card2);border-radius:6px;padding:8px;text-align:center">
        <div style="font-size:10px;color:var(--text3)">MEDIAN</div>
        <div style="font-size:18px;font-weight:700">${tr.median}</div>
      </div>`;
      html += `<div style="background:var(--card2);border-radius:6px;padding:8px;text-align:center">
        <div style="font-size:10px;color:var(--text3)">P10-P90</div>
        <div style="font-size:18px;font-weight:700">${tr.p10}-${tr.p90}</div>
      </div>`;
      html += `<div style="background:var(--card2);border-radius:6px;padding:8px;text-align:center">
        <div style="font-size:10px;color:var(--text3)">STD DEV</div>
        <div style="font-size:18px;font-weight:700">${tr.std}</div>
      </div>`;
      html += `</div>`;
      
      // Top scores
      if (mc.topScores) {
        html += `<div style="margin:12px 0"><span style="font-size:12px;color:var(--text3)">MOST LIKELY SCORES: </span>`;
        mc.topScores.slice(0, 6).forEach(s => {
          html += `<span style="display:inline-block;margin:2px 4px;padding:3px 8px;background:var(--card2);border-radius:4px;font-size:12px;font-weight:600">${s.score} (${s.prob}%)</span>`;
        });
        html += `</div>`;
      }
      
      // Margin distribution
      if (mc.marginDist) {
        const md = mc.marginDist;

async function loadRotationsTab() {
  const wrap = document.getElementById('tab-content');
  try {
    const d = await api('/api/model/mlb/pitchers');
    const top = await api('/api/model/mlb/pitchers/top?n=20');
    
    // Group by team
    const byTeam = {};
    (d.pitchers || []).forEach(p => {
      if (!byTeam[p.team]) byTeam[p.team] = [];
      byTeam[p.team].push(p);
    });

    let html = '';

    // Top 20 Pitchers
    html += `<div class="card"><h2>🔥 Top 20 Starting Pitchers</h2>
    <p style="color:var(--text2);font-size:12px;margin-bottom:12px">Composite rating based on FIP, xFIP, WHIP, K/9, BB/9, HR/9, and workload</p>
    <div style="overflow-x:auto"><table><thead><tr><th>#</th><th>Pitcher</th><th>Team</th><th>Hand</th><th>ERA</th><th>FIP</th><th>xFIP</th><th>WHIP</th><th>K/9</th><th>BB/9</th><th>WAR</th><th>Rating</th><th>Tier</th></tr></thead><tbody>`;
    (top.pitchers || []).forEach((p, i) => {
      const tierColor = p.rating >= 75 ? 'var(--green)' : p.rating >= 65 ? 'var(--accent2)' : p.rating >= 55 ? 'var(--yellow)' : 'var(--text2)';
      const tier = p.rating >= 75 ? 'ACE' : p.rating >= 65 ? 'STRONG' : p.rating >= 55 ? 'SOLID' : p.rating >= 45 ? 'AVERAGE' : 'BELOW';
      html += `<tr>
        <td style="font-weight:700">${i+1}</td>
        <td style="font-weight:600">${p.name}</td>
        <td>${p.team}</td>
        <td>${p.hand}</td>
        <td>${p.era}</td>
        <td>${p.fip}</td>
        <td>${p.xfip}</td>
        <td>${p.whip}</td>
        <td>${p.k9}</td>
        <td>${p.bb9}</td>
        <td>${p.war}</td>
        <td style="font-weight:800;color:${tierColor};font-size:16px">${p.rating}</td>
        <td><span class="badge" style="background:${tierColor}20;color:${tierColor}">${tier}</span></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;

    // Team Rotations Grid
    html += `<div class="card"><h2>⚾ All 30 Team Rotations</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px">`;
    const sortedTeams = Object.keys(byTeam).sort((a, b) => {
      const avgA = byTeam[a].reduce((s,p) => s + p.rating, 0) / byTeam[a].length;
      const avgB = byTeam[b].reduce((s,p) => s + p.rating, 0) / byTeam[b].length;
      return avgB - avgA;
    });
    for (const team of sortedTeams) {
      const rotation = byTeam[team];
      const avgRating = (rotation.reduce((s,p) => s + p.rating, 0) / rotation.length).toFixed(0);
      const avgColor = avgRating >= 65 ? 'var(--green)' : avgRating >= 55 ? 'var(--accent2)' : avgRating >= 50 ? 'var(--yellow)' : 'var(--text2)';
      html += `<div style="background:var(--bg3);border-radius:8px;padding:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-weight:700;font-size:15px">${team}</span>
          <span style="font-size:20px;font-weight:800;color:${avgColor}">${avgRating}</span>
        </div>`;
      rotation.forEach((p, i) => {
        const tierColor = p.rating >= 75 ? 'var(--green)' : p.rating >= 65 ? 'var(--accent2)' : p.rating >= 55 ? 'var(--yellow)' : p.rating >= 45 ? 'var(--text2)' : 'var(--red)';
        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border);${i===0?'font-weight:600':''}">
          <span>${p.hand === 'L' ? '<span style="color:var(--accent2)">L</span>' : 'R'} ${p.name}</span>
          <span style="display:flex;gap:8px;align-items:center">
            <span style="color:var(--text3)">${p.era} ERA</span>
            <span style="color:var(--text3)">${p.fip} FIP</span>
            <span style="font-weight:700;color:${tierColor};min-width:25px;text-align:right">${p.rating}</span>
          </span>
        </div>`;
      });
      html += '</div>';
    }
    html += '</div></div>';

    wrap.innerHTML = html;
  } catch (e) { wrap.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

async function loadLines() {
  const wrap = document.getElementById('tab-content');
  try {
    const sportParam = currentSport === 'all' ? 'all' : currentSport;
    const [movementRes, sharpRes, statusRes] = await Promise.all([
      fetch(`/api/lines/${sportParam}`).then(r => r.json()),
      fetch('/api/lines/sharp?sport=' + sportParam).then(r => r.json()),
      fetch('/api/lines/status').then(r => r.json())
    ]);

    let html = '<div class="section">';
    html += '<h2>📈 Line Movement Tracker</h2>';

    // Status bar
    html += `<div class="card" style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;padding:12px 16px">
      <span>🎯 <strong>${statusRes.gamesTracked || 0}</strong> games tracked</span>
      <span>📸 <strong>${statusRes.totalSnapshots || 0}</strong> snapshots</span>
      <span>⚡ <strong>${statusRes.signalBreakdown?.steam || 0}</strong> steam</span>
      <span>🔥 <strong>${statusRes.signalBreakdown?.rlm || 0}</strong> RLM</span>
      <span>🐌 <strong>${statusRes.signalBreakdown?.stale || 0}</strong> stale</span>
      <button onclick="fetch('/api/lines/snapshot').then(()=>loadLines())" style="margin-left:auto;padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer">📸 Take Snapshot</button>
    </div>`;

    // Sharp money signals
    if (sharpRes.signals && sharpRes.signals.length > 0) {
      html += '<h3 style="margin-top:16px">🦈 Sharp Money Signals</h3>';
      html += '<table><thead><tr><th>Badge</th><th>Type</th><th>Sport</th><th>Game</th><th>Signal</th></tr></thead><tbody>';
      for (const s of sharpRes.signals) {
        const rowClass = s.type === 'STEAM' ? 'style="background:rgba(255,165,0,0.1)"' : s.type === 'RLM' ? 'style="background:rgba(255,50,50,0.1)"' : '';
        html += `<tr ${rowClass}>
          <td style="font-size:20px;text-align:center">${s.badge}</td>
          <td><strong>${s.type}</strong></td>
          <td>${s.sport}</td>
          <td>${s.game}</td>
          <td>${s.description}</td>
        </tr>`;
      }
      html += '</tbody></table>';
    } else {
      html += '<div class="card" style="padding:20px;text-align:center;color:var(--text2)">No sharp money signals detected yet. Signals appear after multiple snapshots when lines move significantly.</div>';
    }

    // Line movement table
    if (movementRes.games && movementRes.games.length > 0) {
      html += '<h3 style="margin-top:16px">📊 Line Movement</h3>';
      html += '<table><thead><tr><th>Sport</th><th>Game</th><th>Open Spread</th><th>Curr Spread</th><th>Move</th><th>Open Total</th><th>Curr Total</th><th>Move</th><th>Signals</th><th>Snaps</th></tr></thead><tbody>';
      for (const g of movementRes.games) {
        const spreadArrow = g.movement.spread > 0 ? '↑' : g.movement.spread < 0 ? '↓' : '—';
        const totalArrow = g.movement.total > 0 ? '↑' : g.movement.total < 0 ? '↓' : '—';
        const spreadColor = Math.abs(g.movement.spread || 0) >= 1 ? 'color:#ff6b6b' : '';
        const totalColor = Math.abs(g.movement.total || 0) >= 1 ? 'color:#ff6b6b' : '';
        const badges = (g.signals || []).map(s => s.badge).join(' ');
        html += `<tr>
          <td>${g.sport}</td>
          <td><strong>${g.game}</strong></td>
          <td>${g.opening.spread ?? '—'}</td>
          <td>${g.current.spread ?? '—'}</td>
          <td style="${spreadColor};font-weight:600">${spreadArrow} ${g.movement.spread != null ? (g.movement.spread > 0 ? '+' : '') + g.movement.spread : '—'}</td>
          <td>${g.opening.total ?? '—'}</td>
          <td>${g.current.total ?? '—'}</td>
          <td style="${totalColor};font-weight:600">${totalArrow} ${g.movement.total != null ? (g.movement.total > 0 ? '+' : '') + g.movement.total : '—'}</td>
          <td>${badges || '—'}</td>
          <td>${g.snapshots}</td>
        </tr>`;
      }
      html += '</tbody></table>';
    } else {
      html += '<div class="card" style="padding:20px;text-align:center;color:var(--text2)">No line movement data yet. Click "Take Snapshot" to start tracking, or wait for automatic snapshots every 30 minutes.</div>';
    }

    html += '</div>';
    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div class="card" style="padding:20px;color:#ff6b6b">Error loading line movement data: ${e.message}</div>`;
  }
}

async function loadWeatherTab() {
  const wrap = document.getElementById('tab-content');
  try {
    // Fetch weather-enriched MLB games + all-parks weather
    const [gamesResp, parksResp] = await Promise.all([
      fetch('/api/mlb/weather-games').then(r => r.json()).catch(() => ({ games: [] })),
      fetch('/api/weather').then(r => r.json()).catch(() => ({ parks: [] }))
    ]);

    const games = gamesResp.games || [];
    const parks = parksResp.parks || [];

    let html = '<div class="card"><h2>⛅ MLB Weather Impact</h2>';
    html += '<p style="color:var(--text2);font-size:13px;margin-bottom:16px">Weather-adjusted run projections for today\'s MLB games. Temperature, wind, and humidity affect ball carry and run scoring at outdoor parks.</p>';

    // Today's games with weather
    if (games.length > 0) {
      html += '<h3 style="margin:16px 0 8px">🏟️ Today\'s MLB Games — Weather Impact</h3>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px">';
      
      for (const g of games) {
        const w = g.weather || {};
        const dome = w.dome;
        const temp = w.weather?.temp;
        const wind = w.weather?.wind;
        const impact = w.totalImpact || 0;
        
        // Color based on impact
        let impactColor = 'var(--text2)';
        let impactIcon = '⚖️';
        if (impact > 3) { impactColor = '#f44336'; impactIcon = '🔥'; }
        else if (impact > 1) { impactColor = '#ff9800'; impactIcon = '☀️'; }
        else if (impact < -3) { impactColor = '#2196f3'; impactIcon = '🥶'; }
        else if (impact < -1) { impactColor = '#42a5f5'; impactIcon = '🌤️'; }

        const gameTime = g.commence ? new Date(g.commence).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : '';
        
        html += `<div style="background:var(--bg2);border-radius:10px;padding:14px;border-left:4px solid ${impactColor}">`;
        html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">`;
        html += `<strong>${g.away} @ ${g.home}</strong>`;
        html += `<span style="font-size:12px;color:var(--text2)">${gameTime}</span>`;
        html += `</div>`;
        
        // Park info
        html += `<div style="font-size:12px;color:var(--text2);margin-bottom:8px">${w.park || 'Unknown park'}${dome ? ' 🏠 Dome' : ''}</div>`;

        if (dome) {
          html += `<div style="font-size:13px">🏠 <strong>Indoor — No Weather Impact</strong></div>`;
        } else {
          // Weather conditions
          html += `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px">`;
          if (temp !== undefined) html += `<span style="font-size:13px">🌡️ ${temp.toFixed(0)}°F</span>`;
          if (wind !== undefined) html += `<span style="font-size:13px">💨 ${wind.toFixed(0)} mph</span>`;
          if (w.weather?.humidity) html += `<span style="font-size:13px">💧 ${w.weather.humidity}%</span>`;
          html += `</div>`;
          
          // Impact
          html += `<div style="font-size:14px;font-weight:600;color:${impactColor}">${impactIcon} ${w.description || 'N/A'} (${impact > 0 ? '+' : ''}${impact}%)</div>`;
          
          // Weather factors breakdown
          if (w.factors && w.factors.length > 0) {
            html += `<div style="margin-top:6px;font-size:11px;color:var(--text2)">`;
            for (const f of w.factors) {
              html += `<div>${f.note} → ${f.impact > 0 ? '+' : ''}${f.impact}%</div>`;
            }
            html += `</div>`;
          }
        }
        
        // Totals impact
        if (g.bookTotal && !dome) {
          html += `<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--bg3);font-size:13px">`;
          html += `<div>📊 Book Total: <strong>${g.bookTotal}</strong>`;
          if (g.adjustedTotal && g.adjustedTotal !== g.bookTotal) {
            const diff = g.totalDiff;
            html += ` → Weather-Adjusted: <strong style="color:${diff > 0 ? '#f44336' : '#2196f3'}">${g.adjustedTotal}</strong>`;
            html += ` <span style="font-size:11px;color:${diff > 0 ? '#f44336' : '#2196f3'}">(${diff > 0 ? '+' : ''}${diff})</span>`;
          }
          html += `</div>`;
          
          // Model total comparison
          if (g.prediction && g.predNoWeather) {
            const shift = g.weatherEdge?.totalShift || 0;
            if (Math.abs(shift) > 0.05) {
              html += `<div style="font-size:12px;color:var(--text2);margin-top:4px">Model: ${g.predNoWeather.totalRuns?.toFixed(1) || '?'} → ${g.prediction.totalRuns?.toFixed(1) || '?'} (weather ${shift > 0 ? '+' : ''}${shift.toFixed(2)} runs)</div>`;
            }
          }
          html += `</div>`;
        }

        html += `</div>`;
      }
      html += '</div>';
    } else {
      html += '<p style="color:var(--text2);text-align:center;padding:30px">No MLB games today or weather data unavailable</p>';
    }

    // All parks overview
    if (parks.length > 0) {
      html += '<h3 style="margin:24px 0 8px">🗺️ All Ballpark Conditions</h3>';
      html += '<div style="overflow-x:auto"><table><thead><tr>';
      html += '<th>Team</th><th>Park</th><th>Type</th><th>Temp</th><th>Wind</th><th>Humidity</th><th>Impact</th><th>Description</th>';
      html += '</tr></thead><tbody>';
      
      for (const p of parks) {
        const impact = p.totalImpact || 0;
        let impactColor = 'var(--text)';
        if (impact > 3) impactColor = '#f44336';
        else if (impact > 1) impactColor = '#ff9800';
        else if (impact < -3) impactColor = '#2196f3';
        else if (impact < -1) impactColor = '#42a5f5';
        
        html += `<tr>`;
        html += `<td><strong>${p.team}</strong></td>`;
        html += `<td style="font-size:11px">${p.park}</td>`;
        html += `<td>${p.dome ? '🏠' : '☀️'}</td>`;
        html += `<td>${p.weather?.temp ? p.weather.temp.toFixed(0) + '°F' : (p.dome ? '72°F' : '—')}</td>`;
        html += `<td>${p.weather?.wind ? p.weather.wind.toFixed(0) + ' mph' : (p.dome ? 'N/A' : '—')}</td>`;
        html += `<td>${p.weather?.humidity ? p.weather.humidity + '%' : (p.dome ? 'N/A' : '—')}</td>`;
        html += `<td style="color:${impactColor};font-weight:600">${impact > 0 ? '+' : ''}${impact}%</td>`;
        html += `<td style="font-size:11px">${p.description || '—'}</td>`;
        html += `</tr>`;
      }
      
      html += '</tbody></table></div>';
    }

    html += '</div>';
    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div class="card"><p style="color:#f44336">Error loading weather: ${e.message}</p></div>`;
  }
}

async function loadBacktest() {
  const wrap = document.getElementById('tab-content');
  try {
    let html = '';
    if (currentSport === 'all' || currentSport === 'nba') {
      const d = await api('/api/backtest/nba');
      html += renderBacktest('🏀 NBA Backtest', d);
    }
    if (currentSport === 'all' || currentSport === 'mlb') {
      const d = await api('/api/backtest/mlb');
      html += renderBacktest('⚾ MLB Backtest', d);
    }
    if (currentSport === 'all' || currentSport === 'nhl') {
      const d = await api('/api/backtest/nhl?types=ml,total,puckline');
      html += renderBacktestV2('🏒 NHL Backtest v2.0', d);

    wrap.innerHTML = html || '<div class="empty">No backtest data.</div>';
