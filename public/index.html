}

function renderBacktestV2(title, data) {
  if (!data || data.error) return `<div class="card"><h2>${title}</h2><p class="empty">${data?.error || 'No data'}</p></div>`;
  
  let html = `<div class="card"><h2>${title}</h2>`;
  html += `<p style="color:var(--text2);margin-bottom:12px;font-size:12px">📊 ${data.dataSource || 'Unknown'} — ${data.totalGames} games analyzed</p>`;
  
  // Main stats
  html += `<div class="stats-grid">
    <div class="stat"><div class="val">${data.totalGames}</div><div class="label">Total Games</div></div>
    <div class="stat"><div class="val">${data.totalBets}</div><div class="label">ML Bets</div></div>
    <div class="stat"><div class="val" style="color:${(data.roi||0)>0?'var(--green)':'var(--red)'}">${data.roi>0?'+':''}${data.roi?.toFixed(1)}%</div><div class="label">ML ROI</div></div>
    <div class="stat"><div class="val">${data.wins}-${data.losses}</div><div class="label">Record</div></div>
    <div class="stat"><div class="val">${data.winRate?.toFixed(1)}%</div><div class="label">Win Rate</div></div>
    <div class="stat"><div class="val" style="color:${(data.profit||0)>0?'var(--green)':'var(--red)'}">${data.profit>0?'+':''}$${data.profit}</div><div class="label">Profit ($100 flat)</div></div>
  </div>`;
  
  // Totals + Puck Line results
  if (data.totals || data.puckline) {
    html += `<h3 style="margin:16px 0 8px;font-size:14px">📈 Multi-Market Results</h3>`;
    html += `<table><thead><tr><th>Market</th><th>Bets</th><th>Win%</th><th>ROI</th><th>Profit</th></tr></thead><tbody>`;
    html += `<tr><td>Moneyline</td><td>${data.totalBets}</td><td>${data.winRate?.toFixed(1)}%</td><td style="color:${(data.roi||0)>0?'var(--green)':'var(--red)'}">${data.roi>0?'+':''}${data.roi?.toFixed(1)}%</td><td style="color:${(data.profit||0)>0?'var(--green)':'var(--red)'}">${data.profit>0?'+':''}$${data.profit}</td></tr>`;
    if (data.totals && data.totals.bets > 0) {
      html += `<tr><td>Totals (O/U)</td><td>${data.totals.bets}</td><td>${data.totals.winRate}%</td><td style="color:${data.totals.roi>0?'var(--green)':'var(--red)'}">${data.totals.roi>0?'+':''}${data.totals.roi}%</td><td style="color:${data.totals.profit>0?'var(--green)':'var(--red)'}">${data.totals.profit>0?'+':''}$${data.totals.profit}</td></tr>`;
    }
    if (data.puckline && data.puckline.bets > 0) {
      html += `<tr><td>Puck Line (±1.5)</td><td>${data.puckline.bets}</td><td>${data.puckline.winRate}%</td><td style="color:${data.puckline.roi>0?'var(--green)':'var(--red)'}">${data.puckline.roi>0?'+':''}${data.puckline.roi}%</td><td style="color:${data.puckline.profit>0?'var(--green)':'var(--red)'}">${data.puckline.profit>0?'+':''}$${data.puckline.profit}</td></tr>`;
    }
    html += `</tbody></table>`;
  }
  
  // Edge Tiers
  if (data.edgeTiers && data.edgeTiers.length) {
    html += `<h3 style="margin:16px 0 8px;font-size:14px">🎯 Edge Tier Analysis</h3>`;
    html += `<table><thead><tr><th>Tier</th><th>Bets</th><th>Win%</th><th>ROI</th><th>Profit</th></tr></thead><tbody>`;
    for (const t of data.edgeTiers) {
      if (t.bets === 0) continue;
      html += `<tr><td>${t.tier}</td><td>${t.bets}</td><td>${t.winRate}%</td><td style="color:${t.roi>0?'var(--green)':'var(--red)'}">${t.roi>0?'+':''}${t.roi}%</td><td style="color:${t.profit>0?'var(--green)':'var(--red)'}">${t.profit>0?'+':''}$${t.profit}</td></tr>`;
    }
    html += `</tbody></table>`;
  }
  
  // Monthly Breakdown
  if (data.monthly && data.monthly.length) {
    html += `<h3 style="margin:16px 0 8px;font-size:14px">📅 Monthly Breakdown</h3>`;
    html += `<table><thead><tr><th>Month</th><th>Bets</th><th>Win%</th><th>ROI</th><th>Profit</th></tr></thead><tbody>`;
    for (const m of data.monthly) {
      html += `<tr><td>${m.month}</td><td>${m.bets}</td><td>${m.winRate}%</td><td style="color:${m.roi>0?'var(--green)':'var(--red)'}">${m.roi>0?'+':''}${m.roi}%</td><td style="color:${m.profit>0?'var(--green)':'var(--red)'}">${m.profit>0?'+':''}$${m.profit}</td></tr>`;
    }
    html += `</tbody></table>`;
  }
  
  // Streaks & Drawdown
  if (data.streaks) {
    html += `<div class="stats-grid" style="margin-top:12px">
      <div class="stat"><div class="val positive">${data.streaks.maxWinStreak}</div><div class="label">Max Win Streak</div></div>
      <div class="stat"><div class="val negative">${data.streaks.maxLossStreak}</div><div class="label">Max Loss Streak</div></div>
      <div class="stat"><div class="val negative">$${data.maxDrawdown}</div><div class="label">Max Drawdown</div></div>
    </div>`;
  }
  
  // Team Breakdown (top 5 and bottom 5)
  if (data.teamBreakdown && data.teamBreakdown.length) {
    html += `<h3 style="margin:16px 0 8px;font-size:14px">🏆 Best/Worst Teams</h3>`;
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
    
    html += `<div><h4 style="color:var(--green);font-size:12px;margin-bottom:4px">💰 Most Profitable</h4><table><thead><tr><th>Team</th><th>Bets</th><th>ROI</th><th>P/L</th></tr></thead><tbody>`;
    for (const t of data.teamBreakdown.filter(t => t.profit > 0).slice(0, 8)) {
      html += `<tr><td>${t.team}</td><td>${t.bets}</td><td class="positive">+${t.roi}%</td><td class="positive">+$${t.profit}</td></tr>`;
    }
    html += `</tbody></table></div>`;
    
    html += `<div><h4 style="color:var(--red);font-size:12px;margin-bottom:4px">💸 Least Profitable</h4><table><thead><tr><th>Team</th><th>Bets</th><th>ROI</th><th>P/L</th></tr></thead><tbody>`;
    for (const t of data.teamBreakdown.filter(t => t.profit < 0).slice(-8).reverse()) {
      html += `<tr><td>${t.team}</td><td>${t.bets}</td><td class="negative">${t.roi}%</td><td class="negative">-$${Math.abs(t.profit)}</td></tr>`;
    }
    html += `</tbody></table></div></div>`;
  }
  
  // Profit Curve (ASCII sparkline)
  if (data.profitCurve && data.profitCurve.length > 0) {
    html += `<h3 style="margin:16px 0 8px;font-size:14px">📈 Profit Curve</h3>`;
    const profits = data.profitCurve.map(p => p.profit);
    const min = Math.min(...profits, 0);
    const max = Math.max(...profits);
    const range = max - min || 1;
    const width = Math.min(profits.length, 80);
    const step = Math.max(1, Math.floor(profits.length / width));
    
    html += `<div style="background:var(--bg2);padding:12px;border-radius:8px;font-family:monospace;font-size:11px;line-height:1.5">`;
    // Simple bar chart
    const bars = [];
    for (let i = 0; i < profits.length; i += step) {
      const p = profits[i];
      const pct = ((p - min) / range * 100).toFixed(0);
      bars.push({ profit: p, pct });
    }
    html += `<div style="display:flex;align-items:end;height:80px;gap:1px">`;
    for (const b of bars) {
      const color = b.profit >= 0 ? 'var(--green)' : 'var(--red)';
      html += `<div style="flex:1;background:${color};height:${Math.max(2, b.pct)}%;border-radius:1px 1px 0 0;min-width:2px" title="$${b.profit}"></div>`;
    }
    html += `</div>`;
    html += `<div style="display:flex;justify-content:space-between;color:var(--text2);margin-top:4px"><span>Bet 1</span><span>Final: ${profits[profits.length-1] > 0 ? '+' : ''}$${profits[profits.length-1]}</span><span>Bet ${profits.length}</span></div>`;
    html += `</div>`;
  }
  
  // Game-by-game results (recent bets only)
  const mlGames = (data.games || []).filter(g => g.type === 'ml');
  if (mlGames.length > 0) {
    html += `<h3 style="margin:16px 0 8px;font-size:14px">🎲 Recent Bets (${mlGames.length} total)</h3>`;
    html += `<div style="max-height:400px;overflow-y:auto"><table><thead><tr><th>Date</th><th>Game</th><th>Score</th><th>Pick</th><th>Edge</th><th>ML</th><th>Result</th><th>P/L</th></tr></thead><tbody>`;
    for (const b of mlGames.slice(-50).reverse()) {
      const score = `${b.awayGoals}-${b.homeGoals}${b.periodType !== 'REG' ? ' ('+b.periodType+')' : ''}`;
      html += `<tr>
        <td>${b.date || '—'}</td>
        <td style="font-weight:600">${b.away} @ ${b.home}</td>
        <td>${score}</td>
        <td>${b.betSide === 'home' ? b.home : b.away}</td>
        <td class="positive">+${(b.betEdge*100).toFixed(1)}%</td>
        <td>${b.betML > 0 ? '+' : ''}${b.betML}</td>
        <td class="${b.won ? 'positive' : 'negative'}">${b.won ? '✅' : '❌'}</td>
        <td class="${b.profit >= 0 ? 'positive' : 'negative'}">${b.profit > 0 ? '+' : ''}$${b.profit}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }
  
  html += `</div>`;
  return html;
}

function renderBacktest(title, data) {
  if (!data || data.error) return `<div class="card"><h2>${title}</h2><p class="empty">${data?.error || 'No data'}</p></div>`;
  let html = `<div class="card"><h2>${title}</h2>`;
  html += `<div class="stats-grid">
    <div class="stat"><div class="val">${data.totalGames || data.games || '—'}</div><div class="label">Games</div></div>
    <div class="stat"><div class="val ${(data.roi||0)>0?'positive':'negative'}" style="color:${(data.roi||0)>0?'var(--green)':'var(--red)'}">${data.roi?.toFixed(1)||'—'}%</div><div class="label">ROI</div></div>
    <div class="stat"><div class="val">${data.record || (data.wins && data.losses ? data.wins+'-'+data.losses : '—')}</div><div class="label">Record</div></div>
    <div class="stat"><div class="val">${data.accuracy?.toFixed(1) || data.mlAccuracy?.toFixed(1) || '—'}%</div><div class="label">Accuracy</div></div>
  </div>`;
  if (data.bets && data.bets.length > 0) {
    html += `<div style="max-height:400px;overflow-y:auto"><table><thead><tr><th>Game</th><th>Score</th><th>Pick</th><th>Edge</th><th>Result</th><th>P/L</th></tr></thead><tbody>`;
    for (const b of data.bets.slice(0, 50)) {
      html += `<tr>
        <td style="font-weight:600">${b.game || b.matchup || '—'}</td>
        <td>${b.score || '—'}</td>
        <td>${b.pick || b.side || '—'}</td>
        <td class="positive">+${b.edge?.toFixed(1) || '—'}%</td>
        <td class="${b.result === 'W' || b.won ? 'positive' : 'negative'}">${b.result || (b.won ? 'W' : 'L')}</td>
        <td class="${(b.pl || b.profit || 0) >= 0 ? 'positive' : 'negative'}">${(b.pl || b.profit || 0) >= 0 ? '+' : ''}$${(b.pl || b.profit || 0).toFixed(0)}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }
  html += `</div>`;
  return html;
}

async function loadTrends() {
  const wrap = document.getElementById('tab-content');
  try {
    const sport = currentSport === 'all' ? 'nba' : currentSport;
    const [rolling, injData] = await Promise.all([
      api(`/api/rolling/${sport}`),
      api(`/api/injuries/${sport}`)
    ]);

    let html = '';

    // Rolling stats section
    html += `<div class="card"><h2>🔥 Rolling Form — ${sport.toUpperCase()} (L10)</h2>`;
    html += `<p style="color:var(--text2);font-size:12px;margin-bottom:12px">Recent performance trends sorted by net rating. Rolling stats are blended into model predictions.</p>`;

    const teams = rolling.teams || rolling.data || [];
    if (teams.length > 0) {
      html += `<div style="overflow-x:auto"><table><thead><tr>
        <th>Team</th><th>Trend</th><th>Streak</th><th>L5</th><th>L10</th><th>Avg Scored</th><th>Avg Allowed</th><th>Net Rating</th><th>Model Adj</th>
      </tr></thead><tbody>`;

      for (const t of teams) {
        const data = t.data || t;
        const team = t.team || t.abbr || '';
        const l10 = data.l10 || {};
        const l5 = data.l5 || {};
        const trendEmoji = data.trend || '➡️';
        const streak = data.streak || '—';
        const netRating = data.rollingNetRating || 0;
        const netColor = netRating > 0 ? '#22c55e' : netRating < 0 ? '#ef4444' : 'var(--text2)';

        // Get the model adjustment
        const adjResp = data.adjustment || {};
        const adj = adjResp.adjFactor || (data.rollingNetRating ? (data.rollingNetRating * 0.35).toFixed(2) : '0');

        html += `<tr>
          <td style="font-weight:700">${team}</td>
          <td style="font-size:16px">${trendEmoji}</td>
          <td style="font-weight:600">${streak}</td>
          <td>${l5.record || '—'}</td>
          <td>${l10.record || '—'}</td>
          <td>${l10.avgScored || '—'}</td>
          <td>${l10.avgAllowed || '—'}</td>
          <td style="color:${netColor};font-weight:700">${netRating > 0 ? '+' : ''}${netRating}</td>
          <td style="color:${netColor}">${typeof adj === 'number' ? (adj > 0 ? '+' : '') + adj : adj}</td>
        </tr>`;
      }
      html += `</tbody></table></div>`;
    } else {
      html += `<div class="empty">No rolling stats available. Try refreshing data.</div>`;
    }
    html += `</div>`;

    // Injuries section
    html += `<div class="card" style="margin-top:16px"><h2>🏥 Injury Report — ${sport.toUpperCase()}</h2>`;
    html += `<p style="color:var(--text2);font-size:12px;margin-bottom:12px">Star player injuries factored into model predictions. Impact values adjust team ratings.</p>`;

    const injTeams = Object.entries(injData || {}).filter(([k,v]) => v && v.starPlayersOut && v.starPlayersOut.length > 0);
    if (injTeams.length > 0) {
      html += `<div style="display:grid;gap:12px">`;
      for (const [team, data] of injTeams) {
        const impact = data.totalImpact || 0;
        const impactColor = impact >= 3 ? '#ef4444' : impact >= 1 ? '#eab308' : 'var(--text3)';
        html += `<div style="background:var(--bg3);border-radius:12px;padding:14px;border-left:4px solid ${impactColor}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div style="font-weight:700;font-size:16px">${team}</div>
            <div style="color:${impactColor};font-weight:700;font-size:13px">Impact: -${impact.toFixed(1)}</div>
          </div>`;
        for (const p of (data.starPlayersOut || [])) {
          const statusColor = p.isOut ? '#ef4444' : '#eab308';
          html += `<div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
            <span style="color:${statusColor};font-size:11px;font-weight:600;min-width:60px">${p.isOut ? '❌ OUT' : '❓ DTD'}</span>
            <span style="font-weight:600;font-size:13px">${p.player}</span>
            <span style="color:var(--text3);font-size:11px">Impact: ${p.impact}</span>
            ${p.detail ? `<span style="color:var(--text3);font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.detail.substring(0, 100)}</span>` : ''}
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    } else {
      html += `<div class="empty">No significant injuries reported or data not yet loaded.</div>`;
    }
    html += `</div>`;

    // Refresh button
    html += `<div style="text-align:center;margin-top:16px">
      <button onclick="refreshTrends()" style="background:var(--accent);color:white;border:none;padding:10px 24px;border-radius:8px;cursor:pointer;font-weight:600">🔄 Refresh Rolling Stats & Injuries</button>
    </div>`;

    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div class="empty">Error loading trends: ${e.message}</div>`;
  }
}

async function refreshTrends() {
  try {
    await Promise.all([
      fetch('/api/rolling/refresh', { method: 'POST' }),
      fetch('/api/injuries/refresh', { method: 'POST' })
    ]);
    loadTrends();
  } catch (e) {
    alert('Refresh failed: ' + e.message);
  }
}

  }
}

async function loadOpeningDay() {
  const wrap = document.getElementById('tab-content');
  try {
    const data = await api('/api/model/mlb/opening-day');
    if (!data.games || data.games.length === 0) {
      wrap.innerHTML = '<div class="empty">No Opening Day projections available.</div>';
      return;
    }
    renderOpeningDay(data);
  } catch (e) { wrap.innerHTML = `<div class="empty">Error: ${e.message}</div>`; }
}

      if (game.liveOdds) {
        const homeEdge = game.liveOdds.homeEdge;
        const awayEdge = game.liveOdds.awayEdge;

        if (bestEdge > 0.02) {
          const pickSide = (homeEdge || 0) > (awayEdge || 0) ? 'home' : 'away';
          const pickTeam = pickSide === 'home' ? game.home : game.away;
          const pickML = pickSide === 'home' ? game.liveOdds.bestHome.ml : game.liveOdds.bestAway.ml;

      <th>Game</th><th>Day</th><th>Away SP</th><th>Home SP</th><th>Proj Total</th><th>O/U 8.5</th><th>F5 Total</th><th>Best Play</th>

  for (const game of data.games) {
    const ou85 = game.totals && game.totals.lines && game.totals.lines['8.5'];
    const overPct = ou85 ? (ou85.over * 100).toFixed(0) : '—';

      <td>O ${overPct}% / U ${underPct}%</td>
      <td>${game.prediction.f5Total}</td>

  html += `</tbody></table></div></div>`;

  // ==================== K PROPS SECTION ====================

  // SGP Correlated Parlays section
  html += `<div class="card" style="margin-top:24px">

    <p style="color:var(--text2);font-size:12px;margin-bottom:12px">Correlated same-game parlays — K props × ML × totals with correlation adjustments</p>
    <div id="od-sgp-content"><div class="loading"><div class="spinner"></div></div></div>
  </div>`;

  wrap.innerHTML = html;

  // Load K Props + SGPs async
  loadODKProps();
  loadODSGPs();
}

  const el = document.getElementById('od-sgp-content');
  if (!el) return;
  try {
    const data = await api('/api/opening-day/sgp');
    if (!data.topSGPs || data.topSGPs.length === 0) {
      el.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text2)">No SGP data available.</div>';
      return;
    }
    
    let html = '';
    
    // Summary stats
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px">';

    html += '<div style="background:var(--bg2);border-radius:10px;padding:12px;text-align:center">';
    html += '<div style="font-size:24px;font-weight:900;color:#eab308">' + data.averageEV + '%</div>';
    html += '<div style="font-size:10px;color:var(--text2)">Avg EV</div></div>';
    html += '<div style="background:var(--bg2);border-radius:10px;padding:12px;text-align:center">';
    html += '<div style="font-size:24px;font-weight:900;color:var(--accent)">' + data.gamesScanned + '</div>';

    html += '</div>';
    
    // Top SGPs
    html += '<div style="display:grid;gap:12px">';
    for (const sgp of data.topSGPs.slice(0, 12)) {
      const gradeColor = sgp.grade === 'A+' ? '#22c55e' : sgp.grade === 'A' ? '#22c55e' : sgp.grade === 'B+' ? '#eab308' : '#94a3b8';

      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
      html += '<div style="font-weight:700;font-size:14px">' + (sgp.game || '') + '</div>';
      html += '<div style="display:flex;gap:8px;align-items:center">';
      html += '<span style="font-size:20px;font-weight:900;color:' + gradeColor + '">' + sgp.grade + '</span>';
      html += '<span style="font-size:16px;font-weight:800;color:#eab308">' + oddsStr + '</span>';
      html += '</div></div>';
      
      // Legs
      for (const leg of sgp.legs) {
        const legColor = leg.type === 'k_prop' ? '#a78bfa' : leg.type === 'ml' ? '#3b82f6' : '#eab308';
        html += '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px">';
        html += '<span style="background:' + legColor + '20;color:' + legColor + ';padding:2px 6px;border-radius:4px;font-weight:600;font-size:10px">' + leg.type.toUpperCase() + '</span>';
        html += '<span>' + leg.label + '</span>';
        html += '<span style="color:var(--text3);margin-left:auto">' + leg.modelProb + '%</span>';
        html += '</div>';
      }
      
      // Stats row
      html += '<div style="display:flex;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px">';
      html += '<span>Win: <strong>' + sgp.modelWinProb + '%</strong></span>';
      html += '<span>Edge: <strong style="color:#22c55e">+' + sgp.edge + '%</strong></span>';
      html += '<span>EV: <strong style="color:#eab308">' + sgp.ev + '%</strong></span>';
      html += '<span>Kelly: <strong>' + sgp.kelly + '%</strong></span>';
      if (sgp.correlationBoost && parseFloat(sgp.correlationBoost) > 0) {
        html += '<span style="color:#a78bfa">Corr: +' + sgp.correlationBoost + '%</span>';
      }
      html += '</div>';
      html += '</div>';
    }
    html += '</div>';
    
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = '<div style="text-align:center;color:var(--text3)">SGP Builder unavailable: ' + e.message + '</div>';
  }
}

    html += '</tbody></table></div>';

  } catch (e) {

  }

// ==================== PLAYER PROPS TAB ====================

let propsData = null;
let propsView = 'value'; // 'value', 'players', 'calc'

async function loadProps() {
  const wrap = document.getElementById('tab-content');
  const sport = currentSport === 'all' ? 'nba' : currentSport;
  
  let html = `<div class="card"><h2 style="margin-bottom:15px">🎰 Player Props${sport ? ' — ' + sport.toUpperCase() : ''}</h2>`;
  html += `<div style="display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap">`;
  html += `<button class="tab ${propsView==='value'?'active':''}" onclick="propsView='value';loadProps()">💰 Value Props</button>`;
  html += `<button class="tab ${propsView==='players'?'active':''}" onclick="propsView='players';loadProps()">👤 Player Projections</button>`;
  html += `<button class="tab ${propsView==='calc'?'active':''}" onclick="propsView='calc';loadProps()">🧮 Prop Calculator</button>`;
  html += `</div>`;

  if (propsView === 'value') {
    html += `<p style="color:var(--text3);font-size:13px;margin-bottom:12px">Scanning ${sport.toUpperCase()} prop markets for +EV opportunities...</p>`;
    html += `<div id="props-value-content"><div class="loading"><div class="spinner"></div></div></div>`;
    html += `</div>`;
    wrap.innerHTML = html;
    // Fetch value props
    try {
      const data = await api('/api/props/scan/' + sport);
      propsData = data;
      renderPropsValue(data);
    } catch (e) {
      document.getElementById('props-value-content').innerHTML = renderPropsOffline(sport);
    }
  } else if (propsView === 'players') {
    try {
      const data = await api('/api/props/players/' + sport);
      html += renderPlayersGrid(data, sport);
    } catch (e) {
      html += `<p style="color:var(--neg)">Error loading players: ${e.message}</p>`;
    }
    html += `</div>`;
    wrap.innerHTML = html;
  } else if (propsView === 'calc') {
    html += renderPropCalc(sport);
    html += `</div>`;
    wrap.innerHTML = html;
  }
}

function renderPropsOffline(sport) {
  // Show player projections when live props unavailable
  let html = `<div style="padding:12px;background:var(--bg3);border-radius:8px;margin-bottom:15px">`;
  html += `<p style="color:var(--warn);font-weight:600">⚠️ Live props require Odds API event-level access. Showing model projections.</p>`;
  html += `<p style="color:var(--text3);font-size:12px;margin-top:4px">Use the Prop Calculator tab to manually check lines against our model.</p>`;
  html += `</div>`;
  html += `<div id="offline-players"></div>`;
  // Load players
  fetch(API + '/api/props/players/' + sport).then(r => r.json()).then(data => {
    document.getElementById('offline-players').innerHTML = renderPlayersGrid(data, sport);
  }).catch(() => {});
  return html;
}

function renderPropsValue(data) {
  const el = document.getElementById('props-value-content');
  if (!el) return;
  let html = '';
  
  html += `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:15px">`;
  html += `<div style="background:var(--bg3);padding:10px 15px;border-radius:8px;flex:1;min-width:120px">`;
  html += `<div style="font-size:11px;color:var(--text3)">EVENTS SCANNED</div>`;
  html += `<div style="font-size:22px;font-weight:700">${data.eventsScanned || 0}/${data.eventsAvailable || 0}</div></div>`;
  html += `<div style="background:var(--bg3);padding:10px 15px;border-radius:8px;flex:1;min-width:120px">`;
  html += `<div style="font-size:11px;color:var(--text3)">TOTAL PROPS</div>`;
  html += `<div style="font-size:22px;font-weight:700">${data.totalProps || 0}</div></div>`;
  html += `<div style="background:var(--bg3);padding:10px 15px;border-radius:8px;flex:1;min-width:120px">`;
  html += `<div style="font-size:11px;color:var(--text3)">VALUE BETS</div>`;
  html += `<div style="font-size:22px;font-weight:700;color:var(--pos)">${data.valueCount || 0}</div></div>`;
  html += `</div>`;
  
  if (data.valueBets && data.valueBets.length > 0) {
    html += `<div style="overflow-x:auto"><table><thead><tr>`;
    html += `<th>Player</th><th>Prop</th><th>Line</th><th>Proj</th><th>Signal</th><th>Edge</th><th>Conf</th><th>Book</th><th>Over</th><th>Under</th>`;
    html += `</tr></thead><tbody>`;
    for (const vb of data.valueBets.slice(0, 50)) {
      const edgeColor = vb.confidence === 'HIGH' ? 'var(--pos)' : vb.confidence === 'MEDIUM' ? 'var(--warn)' : 'var(--text3)';
      const signalEmoji = vb.signal === 'OVER' ? '⬆️' : '⬇️';
      html += `<tr>`;
      html += `<td style="font-weight:600">${vb.player}</td>`;
      html += `<td>${vb.marketLabel || vb.abbr}</td>`;
      html += `<td>${vb.line}</td>`;
      html += `<td>${vb.projection !== null ? vb.projection : '—'}</td>`;
      html += `<td style="font-weight:700;color:${edgeColor}">${signalEmoji} ${vb.signal}</td>`;
      html += `<td style="font-weight:700;color:${edgeColor}">+${vb.edge}%</td>`;
      html += `<td><span style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:${vb.confidence==='HIGH'?'rgba(0,200,83,0.15);color:var(--pos)':vb.confidence==='MEDIUM'?'rgba(255,179,0,0.15);color:var(--warn)':'rgba(120,120,120,0.15);color:var(--text3)'}">${vb.confidence}</span></td>`;
      html += `<td style="font-size:11px">${vb.book || '—'}</td>`;
      html += `<td style="font-size:11px">${vb.overPrice ? (vb.overPrice > 0 ? '+' : '') + vb.overPrice : '—'}</td>`;
      html += `<td style="font-size:11px">${vb.underPrice ? (vb.underPrice > 0 ? '+' : '') + vb.underPrice : '—'}</td>`;
      html += `</tr>`;
    }
    html += `</tbody></table></div>`;
  } else {
    html += `<p style="color:var(--text3);text-align:center;padding:20px">No value props found above threshold. Try scanning more events or lowering minimum edge.</p>`;
  }
  
  if (data.games && data.games.length > 0) {
    html += `<div style="margin-top:15px"><h3 style="font-size:14px;margin-bottom:8px">📋 Scanned Games</h3>`;
    for (const g of data.games) {
      html += `<div style="font-size:12px;color:var(--text3);padding:3px 0">${g.away} @ ${g.home} — ${g.propsCount} props found</div>`;
    }
    html += `</div>`;
  }
  
  el.innerHTML = html;
}

function renderPlayersGrid(data, sport) {
  if (!data || !data.players || data.players.length === 0) {
    return `<p style="color:var(--text3)">No players available for ${sport.toUpperCase()}</p>`;
  }
  
  // Data source indicator
  const liveCount = data.liveCount || data.players.filter(p => p.source === 'live').length;
  const totalCount = data.players.length;
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">`;
  html += `<div style="font-size:12px;color:var(--text3)">${totalCount} players`;
  if (liveCount > 0) {
    html += ` • <span style="color:var(--green);font-weight:600">${liveCount} live from ESPN</span>`;
    html += ` • <span style="color:var(--text3)">${totalCount - liveCount} static baseline</span>`;
  }
  html += `</div>`;
  html += `<div style="display:flex;gap:6px;align-items:center">`;
  html += `<input type="text" id="player-search" placeholder="Search players..." oninput="filterPlayersTable()" style="padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;width:180px">`;
  html += `</div></div>`;
  
  html += `<div style="overflow-x:auto"><table id="players-table"><thead><tr>`;
  
  if (sport === 'nba') {
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(0)">Player ⇅</th>`;
    html += `<th>Team</th>`;
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(2)">PPG ⇅</th>`;
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(3)">RPG ⇅</th>`;
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(4)">APG ⇅</th>`;
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(5)">PRA ⇅</th>`;
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(6)">3PM ⇅</th>`;
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(7)">STL ⇅</th>`;
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(8)">BLK ⇅</th>`;
    html += `<th>Source</th>`;
    html += `</tr></thead><tbody>`;
    // Sort by PPG
    const sorted = data.players.sort((a, b) => (b.ppg || 0) - (a.ppg || 0));
    for (const p of sorted) {
      const pra = ((p.ppg||0)+(p.rpg||0)+(p.apg||0)).toFixed(1);
      const isLive = p.source === 'live';
      const srcBadge = isLive 
        ? `<span style="padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(34,197,94,.15);color:var(--green)">LIVE</span>`
        : `<span style="padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(156,163,175,.15);color:var(--text3)">STATIC</span>`;
      html += `<tr class="player-row" style="cursor:pointer" onclick="showPlayerDetail('${encodeURIComponent(p.name)}','${sport}')">`;
      html += `<td style="font-weight:600">${p.name}</td>`;
      html += `<td><span class="badge badge-nba">${p.team||'—'}</span></td>`;
      html += `<td style="color:var(--green);font-weight:700">${p.ppg ? p.ppg.toFixed(1) : '—'}</td>`;
      html += `<td>${p.rpg ? p.rpg.toFixed(1) : '—'}</td>`;
      html += `<td>${p.apg ? p.apg.toFixed(1) : '—'}</td>`;
      html += `<td style="font-weight:600;color:var(--accent2)">${pra}</td>`;
      html += `<td>${p.threes ? p.threes.toFixed(1) : '—'}</td>`;
      html += `<td>${p.steals ? p.steals.toFixed(1) : '—'}</td>`;
      html += `<td>${p.blocks ? p.blocks.toFixed(1) : '—'}</td>`;
      html += `<td>${srcBadge}</td>`;
      html += `</tr>`;
    }
  } else if (sport === 'mlb') {
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(0)">Player ⇅</th>`;
    html += `<th>Team</th>`;
    html += `<th>Type</th>`;
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(3)">Key Stat ⇅</th>`;
    html += `<th>ERA/OPS</th>`;
    html += `<th>Source</th>`;
    html += `</tr></thead><tbody>`;
    const sorted = data.players.sort((a, b) => {
      if (a.type !== b.type) return a.type === 'pitcher' ? -1 : 1;
      return (b.kPer || b.hPer || 0) - (a.kPer || a.hPer || 0);
    });
    for (const p of sorted) {
      const isLive = p.source === 'live';
      const srcBadge = isLive 
        ? `<span style="padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(34,197,94,.15);color:var(--green)">LIVE</span>`
        : `<span style="padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(156,163,175,.15);color:var(--text3)">STATIC</span>`;
      const typeColor = p.type==='pitcher' ? 'rgba(66,133,244,0.15);color:#4285f4' : 'rgba(234,67,53,0.15);color:#ea4335';
      const keyStat = p.type==='pitcher' ? `${p.kPer || 0} K/game` : `${p.hPer || 0} H/game`;
      const extraStat = p.type==='pitcher' ? (p.era ? p.era.toFixed(2) + ' ERA' : '—') : (p.ops ? p.ops.toFixed(3) + ' OPS' : (p.avg ? p.avg.toFixed(3) + ' AVG' : '—'));
      
      html += `<tr class="player-row" style="cursor:pointer" onclick="showPlayerDetail('${encodeURIComponent(p.name)}','${sport}')">`;
      html += `<td style="font-weight:600">${p.name}</td>`;
      html += `<td><span class="badge badge-mlb">${p.team||'—'}</span></td>`;

      html += `<td style="font-weight:600">${keyStat}</td>`;
      html += `<td style="font-size:11px;color:var(--text2)">${extraStat}</td>`;
      html += `<td>${srcBadge}</td>`;
      html += `</tr>`;
    }
  } else if (sport === 'nhl') {
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(0)">Player ⇅</th>`;
    html += `<th>Team</th>`;
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(2)">Goals ⇅</th>`;
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(3)">Assists ⇅</th>`;
    html += `<th style="cursor:pointer" onclick="sortPlayersTable(4)">Points ⇅</th>`;
    html += `<th>Source</th>`;
    html += `</tr></thead><tbody>`;
    const sorted = data.players.sort((a, b) => (b.points || 0) - (a.points || 0));
    for (const p of sorted) {
      const isLive = p.source === 'live';
      const srcBadge = isLive 
        ? `<span style="padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(34,197,94,.15);color:var(--green)">LIVE</span>`
        : `<span style="padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(156,163,175,.15);color:var(--text3)">STATIC</span>`;
      html += `<tr class="player-row" style="cursor:pointer" onclick="showPlayerDetail('${encodeURIComponent(p.name)}','${sport}')">`;
      html += `<td style="font-weight:600">${p.name}</td>`;
      html += `<td><span class="badge badge-nhl">${p.team||'—'}</span></td>`;
      html += `<td style="color:var(--green);font-weight:700">${p.goals || '—'}</td>`;
      html += `<td>${p.assists || '—'}</td>`;
      html += `<td style="font-weight:600;color:var(--accent2)">${p.points || '—'}</td>`;
      html += `<td>${srcBadge}</td>`;
      html += `</tr>`;
    }
  }
  
  html += `</tbody></table></div>`;
  return html;
}

async function showPlayerDetail(encodedName, sport) {
  const name = decodeURIComponent(encodedName);
  try {
    const data = await api('/api/props/projection/' + sport + '/' + encodedName);
    const wrap = document.getElementById('tab-content');
    let html = `<div class="card">`;
    html += `<div style="display:flex;align-items:center;gap:12px;margin-bottom:15px">`;
    html += `<button onclick="loadProps()" style="padding:6px 12px;border-radius:6px;background:var(--bg3);color:var(--text);font-size:12px">← Back</button>`;
    html += `<h2 style="margin:0">${data.player}</h2>`;
    html += `<span style="padding:4px 10px;border-radius:6px;background:var(--accent);color:#fff;font-size:12px;font-weight:600">${data.team}</span>`;
    html += `</div>`;
    
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:15px">`;
    const statLabels = sport === 'nba' ? {
      points: 'Points', rebounds: 'Rebounds', assists: 'Assists', threes: '3PM',
      steals: 'Steals', blocks: 'Blocks', turnovers: 'Turnovers', pra: 'PRA',
      pts_reb: 'PTS+REB', pts_ast: 'PTS+AST', reb_ast: 'REB+AST'
    } : {
      strikeouts: 'Strikeouts', hits: 'Hits', home_runs: 'Home Runs', total_bases: 'Total Bases',
      rbis: 'RBIs', runs: 'Runs', batter_ks: 'Batter Ks', walks: 'Walks',
      stolen_bases: 'Stolen Bases', hits_allowed: 'Hits Allowed', outs: 'Outs', pitcher_walks: 'Pitcher BB'
    };
    
    for (const [key, label] of Object.entries(statLabels)) {
      if (data.stats[key] === undefined) continue;
      const val = data.stats[key];
      html += `<div style="background:var(--bg3);padding:10px;border-radius:8px;text-align:center">`;
      html += `<div style="font-size:11px;color:var(--text3);text-transform:uppercase">${label}</div>`;
      html += `<div style="font-size:24px;font-weight:700;color:var(--pos)">${typeof val === 'number' ? val.toFixed(1) : val}</div>`;
      html += `<div style="font-size:10px;color:var(--text3)">per game avg</div>`;
      html += `</div>`;
    }
    html += `</div>`;
    
    html += `<p style="font-size:11px;color:var(--text3)">Source: ${data.source}</p>`;
    html += `</div>`;
    wrap.innerHTML = html;
  } catch (e) {
    alert('Player not found: ' + name);
  }
}

function renderPropCalc(sport) {
  let html = `<h3 style="font-size:14px;margin-bottom:12px">🧮 Prop Calculator</h3>`;
  html += `<p style="color:var(--text3);font-size:12px;margin-bottom:15px">Enter a player, stat, and book line to get our model's edge estimate.</p>`;
  
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px">`;
  html += `<div><label style="font-size:12px;color:var(--text3)">Player Name</label>`;
  html += `<input type="text" id="calc-player" placeholder="e.g. Luka Doncic" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--bg3);background:var(--bg2);color:var(--text);font-size:13px;box-sizing:border-box"></div>`;
  
  const stats = sport === 'nba' ? 
    ['points','rebounds','assists','threes','pra','steals','blocks','turnovers','pts_reb','pts_ast','reb_ast'] :
    ['strikeouts','hits','home_runs','total_bases','rbis','runs','batter_ks','walks','stolen_bases'];
  html += `<div><label style="font-size:12px;color:var(--text3)">Stat</label>`;
  html += `<select id="calc-stat" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--bg3);background:var(--bg2);color:var(--text);font-size:13px;box-sizing:border-box">`;
  for (const s of stats) html += `<option value="${s}">${s.replace(/_/g,' ')}</option>`;
  html += `</select></div>`;
  
  html += `<div><label style="font-size:12px;color:var(--text3)">Book Line (O/U)</label>`;
  html += `<input type="number" id="calc-line" step="0.5" placeholder="e.g. 28.5" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--bg3);background:var(--bg2);color:var(--text);font-size:13px;box-sizing:border-box"></div>`;
  
  html += `<div><label style="font-size:12px;color:var(--text3)">Over Odds (American)</label>`;
  html += `<input type="number" id="calc-over" placeholder="e.g. -110" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--bg3);background:var(--bg2);color:var(--text);font-size:13px;box-sizing:border-box"></div>`;
  
  html += `<div><label style="font-size:12px;color:var(--text3)">Under Odds (American)</label>`;
  html += `<input type="number" id="calc-under" placeholder="e.g. -110" style="width:100%;padding:8px;border-radius:6px;border:1px solid var(--bg3);background:var(--bg2);color:var(--text);font-size:13px;box-sizing:border-box"></div>`;
  
  html += `</div>`;
  html += `<button onclick="runPropCalc('${sport}')" style="margin-top:12px;padding:10px 24px;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;font-size:14px;border:none;cursor:pointer">Calculate Edge</button>`;
  html += `<div id="calc-result" style="margin-top:15px"></div>`;
  return html;
}

async function runPropCalc(sport) {
  const player = document.getElementById('calc-player').value.trim();
  const stat = document.getElementById('calc-stat').value;
  const line = document.getElementById('calc-line').value;
  const overOdds = document.getElementById('calc-over').value;
  const underOdds = document.getElementById('calc-under').value;
  
  if (!player || !line) { alert('Enter player name and line'); return; }
  
  const el = document.getElementById('calc-result');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  
  try {
    let url = `/api/props/calc?player=${encodeURIComponent(player)}&sport=${sport}&stat=${stat}&line=${line}`;
    if (overOdds) url += `&overOdds=${overOdds}`;
    if (underOdds) url += `&underOdds=${underOdds}`;
    const data = await api(url);
    
    let html = `<div style="background:var(--bg3);padding:15px;border-radius:10px">`;
    html += `<h3 style="margin:0 0 10px 0;font-size:16px">${data.player} — ${data.stat.replace(/_/g,' ')}</h3>`;
    html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px">`;
    
    html += `<div style="text-align:center"><div style="font-size:11px;color:var(--text3)">PROJECTION</div>`;
    html += `<div style="font-size:28px;font-weight:700;color:var(--accent)">${data.projection}</div></div>`;
    
    html += `<div style="text-align:center"><div style="font-size:11px;color:var(--text3)">LINE</div>`;
    html += `<div style="font-size:28px;font-weight:700">${data.line}</div></div>`;
    
    const diff = (data.projection - data.line).toFixed(1);
    const diffColor = diff > 0 ? 'var(--pos)' : diff < 0 ? 'var(--neg)' : 'var(--text)';
    html += `<div style="text-align:center"><div style="font-size:11px;color:var(--text3)">DIFF</div>`;
    html += `<div style="font-size:28px;font-weight:700;color:${diffColor}">${diff > 0 ? '+' : ''}${diff}</div></div>`;
    
    html += `</div>`;
    
    // Model probabilities
    html += `<div style="display:flex;gap:20px;justify-content:center;margin-bottom:12px">`;
    html += `<div style="text-align:center"><span style="font-size:12px;color:var(--text3)">Over: </span><span style="font-weight:700;color:${data.modelOver > 55 ? 'var(--pos)' : 'var(--text)'}">${data.modelOver}%</span></div>`;
    html += `<div style="text-align:center"><span style="font-size:12px;color:var(--text3)">Under: </span><span style="font-weight:700;color:${data.modelUnder > 55 ? 'var(--pos)' : 'var(--text)'}">${data.modelUnder}%</span></div>`;
    html += `</div>`;
    
    // Edge display
    if (data.overEdge !== undefined || data.underEdge !== undefined) {
      html += `<div style="display:flex;gap:20px;justify-content:center;padding-top:10px;border-top:1px solid var(--bg2)">`;
      if (data.overEdge !== undefined) {
        const ec = data.overEdge > 3 ? 'var(--pos)' : data.overEdge > 0 ? 'var(--warn)' : 'var(--neg)';
        html += `<div style="text-align:center">`;
        html += `<div style="font-size:11px;color:var(--text3)">OVER EDGE</div>`;
        html += `<div style="font-size:20px;font-weight:700;color:${ec}">${data.overEdge > 0 ? '+' : ''}${data.overEdge}%</div>`;
        html += `<div style="font-size:12px;font-weight:600;color:${ec}">${data.overSignal || ''}</div>`;
        html += `</div>`;
      }
      if (data.underEdge !== undefined) {
        const ec = data.underEdge > 3 ? 'var(--pos)' : data.underEdge > 0 ? 'var(--warn)' : 'var(--neg)';
        html += `<div style="text-align:center">`;
        html += `<div style="font-size:11px;color:var(--text3)">UNDER EDGE</div>`;
        html += `<div style="font-size:20px;font-weight:700;color:${ec}">${data.underEdge > 0 ? '+' : ''}${data.underEdge}%</div>`;
        html += `<div style="font-size:12px;font-weight:600;color:${ec}">${data.underSignal || ''}</div>`;
        html += `</div>`;
      }
      html += `</div>`;
    }
    
    html += `</div>`;
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<p style="color:var(--neg)">Error: ${e.message}. Make sure the player name exactly matches our database.</p>`;
  }
}

async function loadSGPTab() {
  const wrap = document.getElementById('tab-content');
  try {
    const sport = currentSport === 'all' ? 'mlb' : currentSport;
    const resp = await fetch(`${API}/api/sgp/scan/${sport}`);
    const data = await resp.json();

    if (data.error) {
      wrap.innerHTML = `<div class="card"><h2>⚠️ SGP Error</h2><p>${data.error}</p></div>`;
      return;
    }

    let html = '<div class="card"><h2>🎲 Same-Game Parlay Builder</h2>';
    html += '<p style="color:var(--text2);margin-bottom:16px">Finds correlated SGP legs that books misprice. Uses Gaussian copula correlation model — books assume independence, we don\'t.</p>';

    // Summary stats
    const s = data.summary || {};
    html += '<div class="stats-grid">';
    html += `<div class="stat"><div class="val">${s.gamesScanned || 0}</div><div class="label">Games Scanned</div></div>`;
    html += `<div class="stat"><div class="val">${s.totalCombos || 0}</div><div class="label">SGP Combos</div></div>`;
    html += `<div class="stat"><div class="val">${s.highConfidence || 0}</div><div class="label">High Confidence</div></div>`;
    html += `<div class="stat"><div class="val" style="color:var(--green)">${s.bestEV ? s.bestEV + '%' : '—'}</div><div class="label">Best EV</div></div>`;
    html += `<div class="stat"><div class="val">${s.avgEV ? s.avgEV + '%' : '—'}</div><div class="label">Avg EV</div></div>`;
    html += '</div>';

    // Combos table
    const combos = data.combos || [];
    if (combos.length === 0) {
      html += '<p style="color:var(--text2);text-align:center;padding:30px">No SGP opportunities found. This can happen if no odds are available or no games have enough edge.</p>';
      html += '<p style="color:var(--text3);text-align:center;font-size:12px">Try loading specific games: <code>/api/sgp/game/LAD/COL?sport=mlb</code></p>';
    } else {
      html += '<table><thead><tr>';
      html += '<th>Game</th><th>SGP Combo</th><th>Legs</th><th>Correlation</th><th>True Prob</th><th>Book Prob</th>';
      html += '<th>Edge</th><th>EV%</th><th>Fair</th><th>Book</th><th>½ Kelly</th><th>Conf</th>';
      html += '</tr></thead><tbody>';

      for (const c of combos) {
        const edgeClass = c.comboEdge > 0.05 ? 'positive' : c.comboEdge > 0.02 ? 'neutral' : 'negative';
        const confBadge = c.confidence >= 60 ? 'badge-high' : c.confidence >= 40 ? 'badge-med' : 'badge-low';
        const corrColor = c.correlation > 0.3 ? 'var(--green)' : c.correlation > 0.1 ? 'var(--yellow)' : 'var(--text2)';

        html += '<tr>';
        html += `<td><strong>${c.game || '—'}</strong></td>`;
        html += `<td style="max-width:220px">${c.description || '—'}</td>`;
        html += `<td>${c.numLegs || c.legs?.length || '?'}</td>`;
        html += `<td style="color:${corrColor}">${(c.correlation * 100).toFixed(0)}%</td>`;
        html += `<td>${(c.trueJointProb * 100).toFixed(1)}%</td>`;
        html += `<td>${(c.bookJointProb * 100).toFixed(1)}%</td>`;
        html += `<td class="${edgeClass}">${(c.comboEdge * 100).toFixed(1)}%</td>`;
        html += `<td class="positive" style="font-weight:700">${c.ev > 0 ? '+' : ''}${c.ev}%</td>`;
        html += `<td>${c.fairOdds > 0 ? '+' : ''}${c.fairOdds}</td>`;
        html += `<td>${c.bookOdds > 0 ? '+' : ''}${c.bookOdds}</td>`;
        html += `<td>${(c.halfKelly * 100).toFixed(2)}%</td>`;
        html += `<td><span class="badge ${confBadge}">${c.confidence}</span></td>`;
        html += '</tr>';

        // Reasoning row
        if (c.reasoning) {
          html += `<tr><td colspan="12" style="padding:4px 10px 12px;border-bottom:2px solid var(--border);color:var(--text2);font-size:11px">`;
          html += `💡 ${c.reasoning}`;
          // Show leg details
          if (c.legs && c.legs.length > 0) {
            html += '<br>';
            for (const leg of c.legs) {
              const legEdge = (leg.edge * 100).toFixed(1);
              const legClass = leg.edge > 0.03 ? 'positive' : leg.edge > 0 ? 'neutral' : 'negative';
              html += `<span style="display:inline-block;margin:3px 8px 0 0;padding:2px 6px;background:var(--bg3);border-radius:4px;font-size:10px">`;
              html += `${leg.pick} <span class="${legClass}">${leg.edge > 0 ? '+' : ''}${legEdge}%</span> | Model: ${(leg.modelProb * 100).toFixed(1)}%`;
              html += `</span>`;
            }
          }
          html += '</td></tr>';
        }
      }
      html += '</tbody></table>';
    }

    html += '</div>';

    // How it works card
    html += '<div class="card"><h2>📐 How SGP Correlation Works</h2>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px">';

    html += '<div style="background:var(--bg3);padding:16px;border-radius:8px">';
    html += '<h3 style="font-size:14px;margin-bottom:8px">🎯 The Edge</h3>';
    html += '<p style="font-size:12px;color:var(--text2)">Books price SGP legs as <strong>independent events</strong> (P(A∩B) = P(A)×P(B)). But outcomes within a game are correlated. A team winning ML is 72% correlated with covering the run line. We model true joint probabilities using Gaussian copulas.</p>';
    html += '</div>';

    html += '<div style="background:var(--bg3);padding:16px;border-radius:8px">';
    html += '<h3 style="font-size:14px;margin-bottom:8px">🔗 Key Correlations</h3>';
    html += '<p style="font-size:12px;color:var(--text2)">';
    html += '• <strong>ML + Run Line:</strong> 72% correlated<br>';
    html += '• <strong>ML + F5 Result:</strong> 55% correlated<br>';
    html += '• <strong>Over/Under + F5 Total:</strong> 65% correlated<br>';
    html += '• <strong>Ace Start + Under:</strong> 25% correlated<br>';
    html += '• <strong>Wind Out + Over:</strong> 20% correlated';
    html += '</p></div>';

    html += '<div style="background:var(--bg3);padding:16px;border-radius:8px">';
    html += '<h3 style="font-size:14px;margin-bottom:8px">💰 SGP Juice vs Edge</h3>';
    html += '<p style="font-size:12px;color:var(--text2)">Books charge 15-22% juice on SGPs vs 4-5% on straight bets. But when correlation is strong (>30%), the mispricing from assuming independence often <strong>exceeds the juice</strong>. That\'s our edge.</p>';
    html += '</div>';

    html += '</div></div>';

    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div class="card"><h2>⚠️ Error</h2><p>${e.message}</p></div>`;
  }
}

function renderPolyValue(data) {
  if (!data) return '<p>No data</p>';
  if (data.error) return `<p style="color:var(--neg)">${data.error}</p>`;
  
  let html = '';
  
  // Summary card
  html += `<div class="card" style="background:linear-gradient(135deg,rgba(80,200,120,0.15),rgba(130,80,223,0.1));border:1px solid rgba(80,200,120,0.3);padding:16px;margin-bottom:16px">`;
  html += `<div style="display:flex;justify-content:space-between;align-items:center">`;
  html += `<div><strong style="font-size:18px">🎯 Model vs Market Edge Scanner</strong><br><span style="color:var(--text3)">Our models vs Polymarket crowd prices</span></div>`;
  html += `<div style="text-align:right"><span style="font-size:24px;font-weight:700;color:var(--pos)">${data.valueBetsFound || 0}</span><br><span style="color:var(--text3)">value bets found</span></div>`;
  html += `</div>`;
  html += `<div style="margin-top:10px;display:flex;gap:12px;flex-wrap:wrap">`;
  html += `<span class="badge" style="background:rgba(130,80,223,0.2);color:#a880ff">📊 ${data.totalMarkets || 0} markets scanned</span>`;
  html += `<span class="badge" style="background:rgba(80,200,120,0.2);color:#80cc80">✅ ${data.matched || 0} matched to models</span>`;
  html += `<span class="badge" style="background:rgba(255,150,50,0.2);color:#ffaa50">❓ ${data.unmatched || 0} unmatched</span>`;
  html += `</div></div>`;
  
  // Value bets
  const valueBets = data.valueBets || [];
  if (valueBets.length === 0) {
    html += `<div class="card" style="padding:20px;text-align:center;color:var(--text3)">`;
    html += `<p style="font-size:16px">No value bets found right now</p>`;
    html += `<p style="font-size:13px">This means Polymarket prices are currently in line with our models. Check back when more markets are active.</p>`;
    html += `</div>`;
    return html;
  }
  
  // Filter: value vs fade
  const buys = valueBets.filter(v => v.rawEdge > 0);
  const fades = valueBets.filter(v => v.rawEdge < 0);
  
  // Value bets (positive edge — BUY opportunities)
  if (buys.length > 0) {
    html += `<div class="card" style="margin-bottom:16px;padding:16px">`;
    html += `<h3 style="margin:0 0 12px 0;color:var(--pos)">🟢 BUY — Model Says Underpriced (${buys.length})</h3>`;
    html += `<div style="display:flex;flex-direction:column;gap:8px">`;
    
    for (const bet of buys.slice(0, 15)) {
      html += renderValueBetCard(bet, 'buy');
    }
    html += `</div></div>`;
  }
  
  // Fade bets (negative edge — FADE opportunities)
  if (fades.length > 0) {
    html += `<div class="card" style="margin-bottom:16px;padding:16px">`;
    html += `<h3 style="margin:0 0 12px 0;color:var(--neg)">🔴 FADE — Model Says Overpriced (${fades.length})</h3>`;
    html += `<div style="display:flex;flex-direction:column;gap:8px">`;
    
    for (const bet of fades.slice(0, 10)) {
      html += renderValueBetCard(bet, 'fade');
    }
    html += `</div></div>`;
  }
  
  return html;
}

function renderValueBetCard(bet, type) {
  const edgeColor = bet.rawEdge > 0 ? 'var(--pos)' : 'var(--neg)';
  const bgColor = bet.rawEdge > 0 ? 'rgba(80,200,120,0.05)' : 'rgba(200,80,80,0.05)';
  
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:${bgColor};border-radius:8px;border-left:3px solid ${edgeColor};cursor:pointer" onclick="window.open('${bet.url}','_blank')">`;
  html += `<div style="flex:1;min-width:0">`;
  html += `<div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${bet.signal || ''} ${bet.question}</div>`;
  html += `<div style="display:flex;gap:12px;margin-top:4px;font-size:12px;flex-wrap:wrap">`;
  html += `<span style="color:var(--text3)">${(bet.sport || '').toUpperCase()}</span>`;
  html += `<span>Market: <strong>${bet.impliedProb}%</strong></span>`;
  if (bet.modelProb) html += `<span>Model: <strong style="color:${edgeColor}">${bet.modelProb}%</strong></span>`;
  html += `<span>Outcome: <strong>${bet.outcome}</strong></span>`;
  if (bet.volume24hr) html += `<span style="color:var(--text3)">$${formatNumber(bet.volume24hr)} vol</span>`;
  html += `</div>`;
  if (bet.kelly && type === 'buy') {
    html += `<div style="font-size:11px;color:var(--text3);margin-top:3px">Kelly: ${(bet.kelly.half * 100).toFixed(1)}% (half) • ${(bet.kelly.quarter * 100).toFixed(1)}% (quarter)</div>`;
  }
  html += `</div>`;
  html += `<div style="text-align:right;min-width:70px">`;
  html += `<span style="font-size:20px;font-weight:700;color:${edgeColor}">${bet.edge > 0 ? '+' : ''}${bet.edge}%</span>`;
  html += `<br><span style="font-size:11px;color:var(--text3)">edge</span>`;
  html += `</div></div>`;
  return html;
}

        html += `</div>`;

  html += '</div>';
  return html;
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.substring(0, len) + '...' : str;
}

function formatNumber(n) {
  if (!n || isNaN(n)) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return Math.round(n).toString();
}

        html += `<td style="color:${d.over > 0.55 ? '#2ecc71' : d.over < 0.45 ? '#e74c3c' : 'var(--text)'}">${(d.over * 100).toFixed(1)}%</td>`;

async function scanAltLines(sport) {
  const result = document.getElementById('alt-scan-result');
  result.innerHTML = '<div class="loading"><div class="spinner"></div><p>Scanning alt lines vs live odds... (uses API quota)</p></div>';
  
  try {
    const endpoint = sport === 'all' ? `${API}/api/alt-lines/scan` : `${API}/api/alt-lines/scan/${sport}`;
    const resp = await fetch(endpoint);
    const data = await resp.json();
    
    if (data.error) {
      result.innerHTML = `<p style="color:#e74c3c">${data.error}</p>`;
      return;
    }
    
    let html = '';
    
    // Summary stats
    const totalBets = data.totalValueBets || 0;
    const highConf = data.highConfidence || 0;
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin:16px 0">';
    html += `<div class="card" style="text-align:center"><div style="font-size:24px;font-weight:700;color:#2ecc71">${totalBets}</div><div style="color:var(--text2);font-size:12px">Value Bets Found</div></div>`;
    html += `<div class="card" style="text-align:center"><div style="font-size:24px;font-weight:700;color:#e74c3c">${highConf}</div><div style="color:var(--text2);font-size:12px">High Confidence</div></div>`;
    if (data.avgEdge) html += `<div class="card" style="text-align:center"><div style="font-size:24px;font-weight:700">${(data.avgEdge * 100).toFixed(1)}%</div><div style="color:var(--text2);font-size:12px">Avg Edge</div></div>`;
    if (data.avgEV) html += `<div class="card" style="text-align:center"><div style="font-size:24px;font-weight:700">$${data.avgEV}</div><div style="color:var(--text2);font-size:12px">Avg EV/100</div></div>`;
    html += '</div>';
    
    // Top bets table
    const topBets = data.topBets || [];
    if (topBets.length > 0) {
      html += '<h4 style="margin:16px 0 8px">🏆 Top Value Bets</h4>';
      html += '<div style="overflow-x:auto"><table><thead><tr><th>Pick</th><th>Game</th><th>Market</th><th>Book ML</th><th>Model Prob</th><th>Edge</th><th>EV/$100</th><th>Confidence</th><th>Kelly</th></tr></thead><tbody>';
      for (const bet of topBets) {
        const confColor = bet.confidence === 'HIGH' ? '#2ecc71' : bet.confidence === 'MEDIUM' ? '#f39c12' : '#95a5a6';
        html += `<tr>`;
        html += `<td><strong>${bet.pick}</strong></td>`;
        html += `<td style="font-size:11px">${bet.game || ''}</td>`;
        html += `<td style="font-size:11px">${bet.market}</td>`;
        html += `<td>${bet.bookML > 0 ? '+' : ''}${bet.bookML}</td>`;
        html += `<td>${(bet.modelProb * 100).toFixed(1)}%</td>`;
        html += `<td style="color:#2ecc71;font-weight:600">${(bet.edge * 100).toFixed(1)}%</td>`;
        html += `<td style="color:#2ecc71;font-weight:600">$${bet.ev?.toFixed(1) || '-'}</td>`;
        html += `<td style="color:${confColor};font-weight:600">${bet.confidence}</td>`;
        html += `<td style="font-size:11px">${bet.kelly ? (bet.kelly.half * 100).toFixed(1) + '%' : '-'}</td>`;
        html += `</tr>`;
      }
      html += '</tbody></table></div>';
    } else {
      html += '<p style="color:var(--text2);text-align:center;padding:20px">No alt line value bets found. Markets may be closed or efficiently priced right now.</p>';
    }
    
    // By sport (for all-sports scan)
    if (data.bySport) {
      html += '<h4 style="margin:16px 0 8px">📊 Breakdown by Sport</h4>';
      for (const [s, sportData] of Object.entries(data.bySport)) {
        const emoji = s === 'mlb' ? '⚾' : s === 'nba' ? '🏀' : '🏒';
        html += `<div class="card" style="margin-bottom:8px">`;
        html += `<strong>${emoji} ${s.toUpperCase()}</strong>: ${sportData.totalValueBets || 0} value bets`;
        if (sportData.gamesChecked) html += ` (${sportData.gamesChecked} games scanned)`;
        if (sportData.highConfidence) html += ` — <span style="color:#2ecc71">${sportData.highConfidence} HIGH</span>`;
        html += '</div>';
      }
    }
    
    html += `<p style="color:var(--text2);font-size:11px;margin-top:12px">Scanned at ${data.scannedAt || new Date().toISOString()}</p>`;
    result.innerHTML = html;
  } catch (e) {
    result.innerHTML = `<p style="color:#e74c3c">Error: ${e.message}</p>`;
  }
}

async function lookupStatcastPitcher() {
  const name = document.getElementById('statcast-pitcher-name').value.trim();
  if (!name) return;
  const el = document.getElementById('statcast-pitcher-result');
  el.innerHTML = '<p>Looking up...</p>';
  try {
    const resp = await fetch(API + '/api/statcast/pitcher/' + encodeURIComponent(name));
    const data = await resp.json();
    if (data.error) {
      el.innerHTML = `<p style="color:var(--red)">${data.error}</p>`;
      return;
    }
    const regColor = data.regressionDirection === 'LUCKY_DUE_FOR_REGRESSION' ? 'var(--red)' : 
                     data.regressionDirection === 'UNLUCKY_DUE_FOR_IMPROVEMENT' ? 'var(--green)' : 'var(--text2)';
    el.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:8px">
        <div class="stat"><div class="val">${data.era.toFixed(2)}</div><div class="label">ERA (actual)</div></div>

        <div class="stat"><div class="val">${data.xslg.toFixed(3)}</div><div class="label">xSLG Against</div></div>

    return;
  }
  
  if (arbView === 'overview') html += renderArbOverview(arbScanData);
  else if (arbView === 'arbs') html += renderArbList(arbScanData);
  else if (arbView === 'lowhold') html += renderLowHoldList(arbScanData);
  else if (arbView === 'middles') html += renderMiddlesList(arbScanData);
  else if (arbView === 'stale') html += renderStaleList(arbScanData);
  
  html += '</div>';
  wrap.innerHTML = html;
}

async function runArbScan(force) {
  try {
    const url = `/api/arb/scan${force ? '?force=true' : ''}`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.error) {
      arbScanData = data;
      loadArbTab();
    }
  } catch (e) { console.error('Arb scan failed:', e); }
}

async function calcArb() {
  const odds1 = document.getElementById('arb-odds1').value;
  const odds2 = document.getElementById('arb-odds2').value;
  const stake = document.getElementById('arb-stake').value;
  const resultDiv = document.getElementById('arb-result');
  
  try {
    const resp = await fetch(`/api/arb/calc?odds1=${odds1}&odds2=${odds2}&stake=${stake}`);
    const data = await resp.json();
    
    let html = '';
    if (data.isArb) {
      html += '<div style="background:rgba(34,197,94,0.15);border:2px solid #22c55e;border-radius:8px;padding:16px;margin-bottom:12px">';
      html += '<div style="font-size:20px;font-weight:700;color:#22c55e;margin-bottom:8px">💰 ARBITRAGE DETECTED!</div>';
      html += `<div>Profit: <strong style="color:#22c55e">${data.arb.profitPct}%</strong></div>`;
    } else {
      html += '<div style="background:var(--bg2);border-radius:8px;padding:16px;margin-bottom:12px">';
      html += '<div style="font-size:16px;font-weight:600;margin-bottom:8px">No Arb — Standard Market</div>';
    }
    
    html += `<div style="margin-top:8px">Hold: <strong>${data.hold ? data.hold.holdPct.toFixed(2) + '%' : 'N/A'}</strong></div>`;
    html += `<div>Combined implied: <strong>${data.hold ? (data.hold.combined * 100).toFixed(2) + '%' : 'N/A'}</strong></div>`;
    html += `<div>Side 1 implied: ${data.hold ? (data.hold.implied1 * 100).toFixed(1) + '%' : 'N/A'}</div>`;
    html += `<div>Side 2 implied: ${data.hold ? (data.hold.implied2 * 100).toFixed(1) + '%' : 'N/A'}</div>`;
    html += '</div>';
    
    if (data.stakes) {
      html += '<div style="background:var(--bg2);border-radius:8px;padding:16px">';
      html += '<div style="font-weight:600;margin-bottom:8px">Optimal Stakes</div>';
      html += `<div>Side 1: <strong>$${data.stakes.stake1.toFixed(2)}</strong> at ${odds1} → payout $${data.stakes.payout1.toFixed(2)}</div>`;
      html += `<div>Side 2: <strong>$${data.stakes.stake2.toFixed(2)}</strong> at ${odds2} → payout $${data.stakes.payout2.toFixed(2)}</div>`;
      html += `<div style="margin-top:8px;font-weight:700;color:#22c55e">Guaranteed profit: $${data.stakes.guaranteedProfit.toFixed(2)} (${data.stakes.profitPct}%)</div>`;
      html += '</div>';
    }
    
    resultDiv.innerHTML = html;
  } catch (e) {
    resultDiv.innerHTML = '<div style="color:#ef4444">Calculation failed: ' + e.message + '</div>';
  }
}

        if (e.sources.analytical) sourceInfo += `A:${(e.sources.analytical.homeWinProb*100).toFixed(0)}%`;
        if (e.sources.ml) sourceInfo += ` ML:${(e.sources.ml.homeWinProb*100).toFixed(0)}%`;
        if (e.sources.monteCarlo) sourceInfo += ` MC:${(e.sources.monteCarlo.homeWinProb*100).toFixed(0)}%`;
        if (e.sources.book) sourceInfo += ` BK:${(e.sources.book.homeWinProb*100).toFixed(0)}%`;
        html += `<td style="padding:10px 8px;font-size:11px;color:#94a3b8">${sourceInfo}</td>`;
        html += '</tr>';
      }
      
      html += '</tbody></table></div>';
    } else {
      html += '<div style="text-align:center;padding:40px;color:#94a3b8">No games found for this sport. Markets may not be open yet.</div>';
    }
    
    html += '</div>';
    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div style="text-align:center;padding:40px;color:#ef4444">Error: ${e.message}<br><button onclick="loadEdgeScanner()" style="margin-top:12px;padding:8px 24px;background:#6366f1;color:white;border:none;border-radius:6px;cursor:pointer">Retry</button></div>`;
  }
}

async function loadTracker() {
  const wrap = document.getElementById('tab-content');
  let html = '<div class="section">';
  html += '<h2>📋 Bet Tracker + CLV</h2>';
  html += '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">';
  html += `<button class="tab ${trackerView==='dashboard'?'active':''}" onclick="trackerView='dashboard';loadTracker()">📊 Dashboard</button>`;
  html += `<button class="tab ${trackerView==='log'?'active':''}" onclick="trackerView='log';loadTracker()">➕ Log Bet</button>`;
  html += `<button class="tab ${trackerView==='history'?'active':''}" onclick="trackerView='history';loadTracker()">📜 History</button>`;
  html += `<button class="tab ${trackerView==='grade'?'active':''}" onclick="trackerView='grade';loadTracker()">✅ Auto-Grade</button>`;
  html += '</div>';

  try {
    if (trackerView === 'dashboard') {
      html += await renderTrackerDashboard();
    } else if (trackerView === 'log') {
      html += renderBetForm();
    } else if (trackerView === 'history') {
      html += await renderBetHistory();
    } else if (trackerView === 'grade') {
      html += await renderAutoGrade();
    }
  } catch (e) {
    html += `<div class="card" style="border-left:3px solid #ff4444">Error: ${e.message}</div>`;
  }

  html += '</div>';
  wrap.innerHTML = html;
}

async function submitBet(e) {
  e.preventDefault();
  const body = {
    sport: document.getElementById('bet-sport').value,
    market: document.getElementById('bet-market').value,
    pick: document.getElementById('bet-pick').value,
    game: document.getElementById('bet-game').value || null,
    odds: parseInt(document.getElementById('bet-odds').value),
    stake: parseFloat(document.getElementById('bet-stake').value),
    gameDate: document.getElementById('bet-date').value,
    modelProb: document.getElementById('bet-modelprob').value ? parseFloat(document.getElementById('bet-modelprob').value) : null,
    modelEdge: document.getElementById('bet-edge').value ? parseFloat(document.getElementById('bet-edge').value) : null,
    book: document.getElementById('bet-book').value || null,
    confidence: document.getElementById('bet-conf').value || null,
    notes: document.getElementById('bet-notes').value || null,
  };
  
  try {
    const resp = await fetch(API + '/bets', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await resp.json();
    if (data.success) {
      document.getElementById('bet-result').innerHTML = '<div style="color:#4ade80;padding:12px;background:#1a2e1a;border-radius:6px">✅ Bet #' + data.bet.id + ' logged: ' + data.bet.pick + ' @ ' + data.bet.odds + ' ($' + data.bet.stake + ')</div>';
      document.getElementById('bet-form').reset();
      document.getElementById('bet-date').value = new Date().toISOString().split('T')[0];
    } else {
      document.getElementById('bet-result').innerHTML = '<div style="color:#ff4444">Error: ' + (data.error || 'Unknown') + '</div>';
    }
  } catch (err) {
    document.getElementById('bet-result').innerHTML = '<div style="color:#ff4444">Error: ' + err.message + '</div>';
  }
}

async function setBankroll(e) {
  e.preventDefault();
  const val = parseFloat(document.getElementById('bankroll-input').value);
  if (!val || val <= 0) return;
  await fetch(API + '/bets/bankroll', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ bankroll: val }) });
  loadTracker();
}

  }
  
  html += '<div class="card">';

  html += '</div>';

function renderBetTable(bets) {
  let html = '<div style="overflow-x:auto">';
  html += '<table style="font-size:13px"><thead><tr><th>#</th><th>Date</th><th>Sport</th><th>Pick</th><th>Odds</th><th>Stake</th><th>Edge</th><th>Result</th><th>P&L</th><th>CLV</th><th>Actions</th></tr></thead><tbody>';
  
  for (const b of bets) {
    const resultColor = b.result === 'win' ? '#4ade80' : b.result === 'loss' ? '#ff4444' : b.result === 'push' ? '#fbbf24' : '#888';
    const resultIcon = b.result === 'win' ? '✅' : b.result === 'loss' ? '❌' : b.result === 'push' ? '➖' : '⏳';
    const plColor = (b.profit || 0) >= 0 ? '#4ade80' : '#ff4444';
    const clvDisplay = b.clv ? (b.clv.cents > 0 ? '+' : '') + b.clv.cents + '¢' : '—';
    const clvColor = b.clv ? (b.clv.cents > 0 ? '#4ade80' : b.clv.cents < 0 ? '#ff4444' : '#888') : '#888';
    
    html += `<tr>
      <td>${b.id}</td>
      <td style="white-space:nowrap">${b.gameDate || '—'}</td>
      <td>${b.sport?.toUpperCase() || '—'}</td>
      <td><strong>${b.pick}</strong>${b.game ? '<br><span style="color:#888;font-size:11px">' + b.game + '</span>' : ''}</td>
      <td>${b.odds > 0 ? '+' : ''}${b.odds}</td>
      <td>$${b.stake}</td>
      <td>${b.modelEdge ? (b.modelEdge * 100).toFixed(1) + '%' : '—'}</td>
      <td style="color:${resultColor}">${resultIcon} ${b.result || 'pending'}</td>
      <td style="color:${b.result ? plColor : '#888'}">${b.result ? (b.profit >= 0 ? '+' : '') + '$' + (b.profit || 0).toFixed(2) : '—'}</td>
      <td style="color:${clvColor}">${clvDisplay}</td>
      <td>
        ${!b.result ? `<button onclick="quickGrade(${b.id},'win')" style="padding:2px 6px;background:#1a2e1a;color:#4ade80;border:1px solid #4ade80;border-radius:4px;cursor:pointer;font-size:11px" title="Grade as Win">W</button>
        <button onclick="quickGrade(${b.id},'loss')" style="padding:2px 6px;background:#2e1a1a;color:#ff4444;border:1px solid #ff4444;border-radius:4px;cursor:pointer;font-size:11px" title="Grade as Loss">L</button>
        <button onclick="quickGrade(${b.id},'push')" style="padding:2px 6px;background:#2e2e1a;color:#fbbf24;border:1px solid #fbbf24;border-radius:4px;cursor:pointer;font-size:11px" title="Grade as Push">P</button>` : ''}
        <button onclick="deleteBetConfirm(${b.id})" style="padding:2px 6px;background:#1e293b;color:#888;border:1px solid #334155;border-radius:4px;cursor:pointer;font-size:11px" title="Delete">🗑️</button>
      </td>
    </tr>`;
  }
  
  html += '</tbody></table></div>';
  return html;
}

async function quickGrade(betId, result) {
  const closingOdds = prompt('Closing odds (optional, for CLV tracking):');
  const opts = { result };
  if (closingOdds && !isNaN(parseInt(closingOdds))) {
    opts.closingOdds = parseInt(closingOdds);
  }
  
  await fetch(API + '/bets/' + betId + '/grade', { 
    method: 'POST', 
    headers: { 'Content-Type': 'application/json' }, 
    body: JSON.stringify(opts) 
  });
  loadTracker();
}

async function deleteBetConfirm(betId) {
  if (!confirm('Delete bet #' + betId + '?')) return;
  await fetch(API + '/bets/' + betId, { method: 'DELETE' });
  loadTracker();
}

    let html = `<div style="padding:12px;background:#1e293b;border-radius:8px">`;
    html += `<div style="font-weight:600;margin-bottom:8px">📊 Auto-Grade Results for ${date}</div>`;
    html += `<div>Graded: ${data.graded} | Skipped: ${data.skipped} | Total pending: ${data.total}</div>`;
    
    if (data.results && data.results.length > 0) {
      html += '<div style="margin-top:12px">';
      for (const r of data.results) {
        const icon = r.status === 'graded' ? (r.result === 'win' ? '✅' : r.result === 'loss' ? '❌' : '➖') :
                     r.status === 'in-progress' ? '⏳' : r.status === 'no-match' ? '❓' : '⚠️';
        const color = r.status === 'graded' ? (r.result === 'win' ? '#4ade80' : '#ff4444') : '#888';
        html += `<div style="padding:4px 0;color:${color}">${icon} Bet #${r.id}: ${r.pick} — ${r.status}${r.profit !== undefined ? ' (' + (r.profit >= 0 ? '+' : '') + '$' + r.profit.toFixed(2) + ')' : ''}${r.reason ? ' (' + r.reason + ')' : ''}</div>`;
      }
      html += '</div>';
    }
    
    html += '</div>';
    el.innerHTML = html;
    
    // Refresh the page after a delay
    setTimeout(() => loadTracker(), 3000);
  } catch (err) {
    el.innerHTML = '<div style="color:#ff4444">Error: ' + err.message + '</div>';
  }
}

async function analyzeSeries() {

  if (!higher || !lower || higher === lower) {
    resultDiv.innerHTML = '<p style="color:#f59e0b">Select two different teams</p>';
    return;

  resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  
  try {
    const resp = await fetch(`${API}/api/playoffs/series?higher=${higher}&lower=${lower}`);

async function loadFuturesValue() {
  const content = document.getElementById('futures-value-content');
  if (!content) return;
  content.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:8px;color:#888;font-size:12px">Scanning live championship futures across NBA, NHL, MLB...</p></div>';
  
  try {
    const resp = await fetch(`${API}/api/futures/scan?minEdge=0.03&sims=10000`);
    const data = await resp.json();
    
    if (data.error) {
      content.innerHTML = `<p style="color:#ff4444">Error: ${data.error}</p>`;
      return;
    }
    
    let html = '';
    
    // Summary stats
    const totalBets = data.totalCount || 0;
    const highConf = data.highConfidence || 0;
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:16px">
      <div style="background:var(--bg2);padding:10px;border-radius:8px;text-align:center">
        <div style="font-size:22px;font-weight:bold;color:#22c55e">${totalBets}</div>

      </div>
      <div style="background:var(--bg2);padding:10px;border-radius:8px;text-align:center">
        <div style="font-size:22px;font-weight:bold;color:#e94560">${highConf}</div>
        <div style="font-size:10px;color:#888">High Confidence</div>
      </div>`;
    
    // Per-sport summaries
    for (const sport of ['nba', 'nhl', 'mlb']) {
      const s = data.sports?.[sport];
      if (s && !s.error) {
        html += `<div style="background:var(--bg2);padding:10px;border-radius:8px;text-align:center">
          <div style="font-size:22px;font-weight:bold;color:#3b82f6">${s.count || 0}</div>
          <div style="font-size:10px;color:#888">${sport.toUpperCase()} Edges</div>
        </div>`;
      }
    }
    html += `</div>`;

    for (const sport of ['nba', 'nhl', 'mlb']) {

        if (s?.error) html += `<p style="color:#888;font-size:12px">${sport.toUpperCase()}: ${s.error}</p>`;

      const emoji = sport === 'nba' ? '🏀' : sport === 'nhl' ? '🏒' : '⚾';
      html += `<div style="margin-bottom:16px">
        <h4 style="margin:0 0 8px;color:#22c55e">${emoji} ${sport.toUpperCase()} Championship Futures</h4>`;

      html += `<div style="overflow-x:auto"><table><thead><tr>

      </tr></thead><tbody>`;
      
      for (const bet of s.valueBets) {
        const edgeColor = bet.edge >= 10 ? '#22c55e' : bet.edge >= 5 ? '#f59e0b' : '#3b82f6';
        const confColor = bet.confidence === 'HIGH' ? '#22c55e' : bet.confidence === 'MEDIUM' ? '#f59e0b' : '#888';
        const oddsStr = bet.bestOdds > 0 ? '+' + bet.bestOdds : bet.bestOdds;
        
        html += `<tr>
          <td><strong>${bet.team}</strong> <span style="color:#888;font-size:10px">${bet.teamName}</span></td>

          <td style="color:${edgeColor};font-weight:bold">${bet.edge}%</td>
          <td style="font-family:monospace;color:${bet.bestOdds > 0 ? '#22c55e' : '#e94560'}">${oddsStr}</td>

          <td style="font-weight:bold">$${bet.wager}</td>

async function fetchHistorical() {
  const wrap = document.getElementById('tab-content');
  const btn = wrap.querySelector('.refresh-btn');
  if (btn) btn.textContent = '⏳ Fetching...';
  try {
    const result = await api('/api/historical/fetch');
    alert(`Fetched ${result.games} games! Home win rate: ${result.homeWinRate}%, Avg total: ${result.avgTotal}`);
    loadMLTab();
  } catch (e) {
    alert('Error: ' + e.message);
    loadMLTab();
  }
}

async function trainMLModel() {
  const el = document.getElementById('ml-train-result');
  el.innerHTML = '<div class="spinner" style="margin:8px 0"></div> Training...';
  try {
    const result = await api('/api/ml/train');
    let html = '<div style="padding:12px;background:var(--bg3);border-radius:8px">';
    html += `<div style="color:#22c55e;font-weight:bold;margin-bottom:8px">✅ Model Trained!</div>`;
    html += `<div style="font-size:14px;color:#aaa">Games: ${result.games} | Accuracy: ${result.ensemble?.accuracy ? (result.ensemble.accuracy * 100).toFixed(1) + '%' : 'N/A'}</div>`;
    html += `<div style="font-size:14px;color:#aaa">Brier: ${result.ensemble?.brier_score?.toFixed(4) || 'N/A'} | Log Loss: ${result.ensemble?.log_loss?.toFixed(4) || 'N/A'}</div>`;
    if (result.top_features) {
      html += '<div style="margin-top:8px;font-size:12px;font-weight:bold;color:#aaa">Top Features:</div>';
      result.top_features.slice(0, 10).forEach((f, i) => {
        const bar = Math.min(200, f.importance * 1000);
        html += `<div style="display:flex;align-items:center;gap:8px;padding:2px 0;font-size:12px">`;
        html += `<span style="width:180px;color:#aaa">${i+1}. ${f.feature}</span>`;
        html += `<div style="background:#3b82f6;height:8px;width:${bar}px;border-radius:4px"></div>`;
        html += `<span style="color:#888">${f.importance.toFixed(4)}</span>`;
        html += '</div>';
      });
    }
    html += '</div>';
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<p style="color:#ff4444">Error: ${e.message}</p>`;
  }
}

  const away = document.getElementById('ml-away').value.toUpperCase();
  const home = document.getElementById('ml-home').value.toUpperCase();
  if (!away || !home) return alert('Enter team abbreviations');
  
  const el = document.getElementById('ml-predict-result');

  try {
    const result = await api(`/api/ml/predict?away=${away}&home=${home}`);
    let html = '<div style="padding:12px;background:var(--bg3);border-radius:8px">';
    html += `<h4 style="margin:0 0 8px 0">${away} @ ${home}</h4>`;

      html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:8px">`;

async function compareModels() {
  const away = document.getElementById('cmp-away').value.toUpperCase();
  const home = document.getElementById('cmp-home').value.toUpperCase();
  if (!away || !home) return alert('Enter team abbreviations');
  
  const el = document.getElementById('ml-compare-result');
  el.innerHTML = '<div class="spinner" style="margin:8px 0"></div>';
  try {
    const result = await api(`/api/ml/compare/${away}/${home}`);
    let html = '<div style="padding:12px;background:var(--bg3);border-radius:8px">';
    html += `<h4 style="margin:0 0 12px 0">${result.game}</h4>`;

    for (const [key, val] of Object.entries(methods)) {

      html += `<div style="font-size:11px;color:#666">${val.source}</div>`;

    html += '</div>';
    el.innerHTML = html;

  }

      }
      html += '</div>';
    }
    
    // Controls
    html += '<div style="display:flex;gap:8px">';
    html += `<button onclick="fetch('/api/scanner/start',{method:'POST'}).then(()=>loadAutoScannerTab())" style="padding:10px 24px;background:#22c55e;color:#000;font-weight:bold;border:none;border-radius:8px;cursor:pointer">▶ Start</button>`;
    html += `<button onclick="fetch('/api/scanner/stop',{method:'POST'}).then(()=>loadAutoScannerTab())" style="padding:10px 24px;background:#ef4444;color:white;font-weight:bold;border:none;border-radius:8px;cursor:pointer">⏹ Stop</button>`;

  }

async function forceScan(key) {
  try {
    await fetch(`/api/scanner/run/${key}`);

  } catch (e) { alert('Scan failed: ' + e.message); }
}
