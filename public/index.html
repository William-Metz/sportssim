  // Division breakdown with probabilities
  html += '<h3 style="margin-top:24px;margin-bottom:12px">🏟️ Division Projections</h3>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px">';
  for (const [divName, teams] of Object.entries(divs)) {
    html += `<div class="card" style="margin:0"><h4 style="font-size:14px;margin-bottom:10px">${divName}</h4>`;
    for (const t of teams) {
      const bar = Math.min(100, t.divisionPct);
      const barColor = t.divisionPct > 50 ? 'var(--green)' : t.divisionPct > 25 ? 'var(--yellow)' : 'var(--accent)';
      html += `<div style="margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px">
          <span><strong>${t.team}</strong> ${t.projWins}W</span>
          <span style="color:${barColor};font-weight:600">${t.divisionPct}%</span>
        </div>
        <div style="background:var(--bg3);border-radius:3px;height:8px">
          <div style="width:${bar}%;background:${barColor};height:100%;border-radius:3px;transition:width 0.3s"></div>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  html += '</div></div>';
  
  return html;
}

function renderFuturesWorldSeries(data) {
  const bets = data.wsValue?.bets || [];
  const rankings = data.powerRankings || [];
  
  let html = '<div class="card"><h2>🏆 World Series Futures</h2>';
  html += `<p style="color:var(--text2);margin-bottom:16px;font-size:13px">${bets.length} WS value bets found</p>`;
  
  // Value bets
  if (bets.length > 0) {
    html += '<h3 style="color:var(--green);margin-bottom:12px">💰 Value Bets</h3>';
    for (const b of bets) {
      const edgeColor = b.confidence === 'HIGH' ? 'var(--green)' : b.confidence === 'MEDIUM' ? 'var(--yellow)' : 'var(--text3)';
      html += `<div style="background:var(--bg2);border-radius:8px;padding:14px;margin-bottom:10px;border-left:3px solid ${edgeColor}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <strong style="font-size:18px">🏆 ${b.team}</strong>
            <span style="color:var(--text3);font-size:13px;margin-left:8px">${b.name}</span>
            <div style="font-size:13px;color:var(--text2);margin-top:4px">WS Champion ${b.odds > 0 ? '+' : ''}${b.odds}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:22px;font-weight:700;color:${edgeColor}">+${b.edge}%</div>
            <div style="font-size:12px;color:var(--text3)">Sim: ${(b.modelProb * 100).toFixed(1)}% | Book: ${(b.bookProb * 100).toFixed(1)}%</div>
          </div>
        </div>
      </div>`;
    }
  }
  
  // WS odds chart (top 15 teams)
  html += '<h3 style="margin-top:24px;margin-bottom:12px">🏆 Championship Probability</h3>';
  const top15 = rankings.filter(t => t.wsPct > 0).slice(0, 15);
  
  for (const t of top15) {
    const bar = Math.min(100, t.wsPct * 4); // Scale for visual
    const barColor = t.wsPct >= 10 ? 'var(--green)' : t.wsPct >= 5 ? 'var(--yellow)' : 'var(--accent)';
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="width:50px;font-weight:700;font-size:14px">${t.team}</span>
      <div style="flex:1;background:var(--bg2);border-radius:4px;height:24px;position:relative">
        <div style="width:${bar}%;background:${barColor};height:100%;border-radius:4px;transition:width 0.3s"></div>
        <span style="position:absolute;left:8px;top:4px;font-size:12px;font-weight:600;color:var(--text)">${t.wsPct}%</span>
      </div>
      <span style="width:60px;text-align:right;font-size:12px;color:var(--text2)">${t.projWins}W</span>
      <span style="width:50px;text-align:right;font-size:12px;color:var(--text3)">PO:${t.playoffPct}%</span>
    </div>`;
  }
  
  html += '</div>';
  return html;
}

async function loadPlaybook() {
  const wrap = document.getElementById('tab-content');
  wrap.innerHTML = '<div style="text-align:center;padding:60px"><div class="spinner"></div><p style="margin-top:12px;color:#94a3b8">🎯 Building Opening Day Playbook...</p><p style="color:#666;font-size:12px">Aggregating analytical + ML + Statcast + weather + umpire + preseason signals...</p></div>';
  
  try {
    const data = await api(`/api/opening-day-playbook?bankroll=${playbookBankroll}`);
    if (data.error) throw new Error(data.error);
    renderPlaybook(data);
  } catch (e) {
    wrap.innerHTML = `<div style="text-align:center;padding:40px;color:#ef4444">Error: ${e.message}<br><button onclick="loadPlaybook()" style="margin-top:12px;padding:8px 24px;background:#a855f7;color:white;border:none;border-radius:6px;cursor:pointer">Retry</button></div>`;
  }
}

        </div>
      </div>`;
    
    html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">';
    html += '<thead><tr style="border-bottom:2px solid #334155;text-align:left">';

    html += '<th style="padding:10px 8px">Pick</th>';
    html += '<th style="padding:10px 8px">Type</th>';
    html += '<th style="padding:10px 8px">Edge</th>';
    html += '<th style="padding:10px 8px">Model</th>';
    html += '<th style="padding:10px 8px">Book</th>';
    html += '<th style="padding:10px 8px">ML</th>';
    html += '<th style="padding:10px 8px">Wager</th>';
    html += '<th style="padding:10px 8px">EV</th>';
    html += '<th style="padding:10px 8px">Conf</th>';
    html += '<th style="padding:10px 8px">Sources</th>';
    html += '</tr></thead><tbody>';
    
    allBets.forEach((bet, i) => {
      const edgeColor = bet.edge >= 8 ? '#22c55e' : bet.edge >= 5 ? '#eab308' : bet.edge >= 2 ? '#94a3b8' : '#ef4444';
      const confColor = bet.confidence === 'HIGH' ? '#22c55e' : bet.confidence === 'MEDIUM' ? '#eab308' : '#94a3b8';
      const rowBg = bet.confidence === 'HIGH' ? 'background:#0f2a1c' : '';
      
      html += `<tr style="border-bottom:1px solid #1e293b;${rowBg}">`;
      html += `<td style="padding:10px 8px;font-weight:900;color:${edgeColor}">${i+1}</td>`;

      html += `<td style="padding:10px 8px;font-weight:bold;color:${edgeColor}">${bet.pick}</td>`;
      html += `<td style="padding:10px 8px"><span style="background:${bet.type==='ML'?'#6366f130':'#eab30830'};color:${bet.type==='ML'?'#818cf8':'#eab308'};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">${bet.type}</span></td>`;

      html += `<td style="padding:10px 8px">${bet.modelProb || bet.modelTotal || '-'}${bet.modelProb ? '%' : ''}</td>`;
      html += `<td style="padding:10px 8px;color:#94a3b8">${bet.bookProb || bet.bookTotal || '-'}${bet.bookProb ? '%' : ''}</td>`;
      html += `<td style="padding:10px 8px">${bet.ml || '-'}</td>`;
      html += `<td style="padding:10px 8px;font-weight:bold;color:#22c55e">$${bet.wager || '-'}</td>`;
      html += `<td style="padding:10px 8px;color:#eab308;font-weight:bold">+$${bet.ev || '-'}</td>`;
      html += `<td style="padding:10px 8px"><span style="background:${confColor}20;color:${confColor};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700">${bet.confidence}</span></td>`;
      html += `<td style="padding:10px 8px;font-size:11px;color:#94a3b8">${(bet.agreementSources||[]).join(', ') || bet.weatherSupport || '-'}</td>`;
      html += '</tr>';
    });
    
    html += '</tbody></table></div></div>';
  } else {
    html += '<div style="background:#1e293b;border-radius:12px;padding:32px;text-align:center;margin-bottom:24px;color:#94a3b8">No live odds available yet — bets will populate when books open MLB Opening Day lines. Check back closer to March 26!</div>';

  // ===== GAME-BY-GAME BREAKDOWN =====
  html += '<div style="margin-bottom:8px;margin-top:24px;display:flex;align-items:center;gap:8px">';

  for (const game of data.playbook) {
    const gr = game.gameRating;
    const gradeColor = gr.grade.startsWith('A') ? '#22c55e' : gr.grade === 'B' ? '#eab308' : gr.grade === 'C' ? '#f97316' : '#94a3b8';
    const borderColor = gr.grade.startsWith('A') ? '#22c55e' : gr.grade === 'B' ? '#eab308' : '#334155';
    
    html += `<div class="game-card" style="border-left:4px solid ${borderColor}">`;
    
    // Header
    html += `<div class="game-header">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="badge badge-mlb">⚾ Day ${game.day}</span>
        <span class="game-teams">${game.away} <span class="at">@</span> ${game.home}</span>

    // Model prediction bar
    const aProb = (game.signals.analytical.awayWinProb * 100).toFixed(1);
    const hProb = (game.signals.analytical.homeWinProb * 100).toFixed(1);
    const favColor = game.signals.analytical.homeWinProb > game.signals.analytical.awayWinProb ? '#22c55e' : '#3b82f6';
    
    html += `<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:16px;padding:12px;background:var(--bg3);border-radius:8px">
      <div style="text-align:center">
        <div style="font-weight:700">${game.away}</div>
        <div style="font-size:24px;font-weight:900;color:${game.signals.analytical.awayWinProb > game.signals.analytical.homeWinProb ? '#22c55e' : 'var(--text2)'}">${aProb}%</div>
        <div style="font-size:12px;color:var(--text2)">${game.signals.analytical.awayExpRuns} runs</div>
      </div>
      <div style="color:var(--text3);font-size:12px;font-weight:600">VS</div>
      <div style="text-align:center">
        <div style="font-weight:700">${game.home}</div>
        <div style="font-size:24px;font-weight:900;color:${game.signals.analytical.homeWinProb > game.signals.analytical.awayWinProb ? '#22c55e' : 'var(--text2)'}">${hProb}%</div>
        <div style="font-size:12px;color:var(--text2)">${game.signals.analytical.homeExpRuns} runs</div>
      </div>
    </div>`;
    
    // Pitcher matchup
    if (game.awayStarter || game.homeStarter) {
      const ap = game.awayStarter || {};
      const hp = game.homeStarter || {};
      const apColor = (ap.rating||0) >= 75 ? '#22c55e' : (ap.rating||0) >= 65 ? '#60a5fa' : (ap.rating||0) >= 55 ? '#eab308' : 'var(--text2)';
      const hpColor = (hp.rating||0) >= 75 ? '#22c55e' : (hp.rating||0) >= 65 ? '#60a5fa' : (hp.rating||0) >= 55 ? '#eab308' : 'var(--text2)';
      
      html += `<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;padding:12px;background:var(--bg3);border-radius:8px;margin-bottom:12px">
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text3)">AWAY STARTER</div>
          <div style="font-weight:700">${ap.name || 'TBD'}</div>
          <div style="font-size:20px;font-weight:900;color:${apColor}">${ap.rating || '?'}</div>
          <div style="font-size:11px;color:var(--text3)">${ap.era ? `${ap.era} ERA` : ''} ${ap.hand ? `• ${ap.hand}HP` : ''}</div>
        </div>
        <div style="font-size:11px;color:var(--text3)">⚾</div>
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text3)">HOME STARTER</div>
          <div style="font-weight:700">${hp.name || 'TBD'}</div>
          <div style="font-size:20px;font-weight:900;color:${hpColor}">${hp.rating || '?'}</div>
          <div style="font-size:11px;color:var(--text3)">${hp.era ? `${hp.era} ERA` : ''} ${hp.hand ? `• ${hp.hand}HP` : ''}</div>
        </div>
      </div>`;
    }
    
    // Signal badges row
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">';
    
    // ML signal
    if (game.signals.ml) {
      const mlFav = game.signals.ml.homeWinProb > 0.5 ? game.home : game.away;
      const mlProb = Math.max(game.signals.ml.homeWinProb, game.signals.ml.awayWinProb);
      html += `<div style="background:#6366f120;border:1px solid #6366f140;padding:4px 10px;border-radius:6px;font-size:11px">🧠 ML: ${mlFav} ${(mlProb*100).toFixed(0)}% <span style="color:#94a3b8">(${game.signals.ml.confidence || '?'})</span></div>`;
    }
    
    // Calibrated
    if (game.signals.calibrated) {
      const calFav = game.signals.calibrated.homeWinProb > 0.5 ? game.home : game.away;
      const calProb = Math.max(game.signals.calibrated.homeWinProb, game.signals.calibrated.awayWinProb);
      html += `<div style="background:#a855f720;border:1px solid #a855f740;padding:4px 10px;border-radius:6px;font-size:11px">📐 Cal: ${calFav} ${(calProb*100).toFixed(0)}%</div>`;
    }
    
    // Weather
    if (game.signals.weather) {
      const wx = game.signals.weather;
      const wxColor = wx.impact === 'OVER' ? '#22c55e' : wx.impact === 'UNDER' ? '#3b82f6' : '#94a3b8';
      html += `<div style="background:${wxColor}20;border:1px solid ${wxColor}40;padding:4px 10px;border-radius:6px;font-size:11px">⛅ ${wx.temp||'?'}°F ${wx.wind||'?'}mph ${wx.impact} (${((wx.runMultiplier||1)*100-100).toFixed(1)}%)</div>`;

    // Umpire
    if (game.signals.umpire) {
      const ump = game.signals.umpire;
      const umpColor = ump.tendency === 'over' ? '#22c55e' : ump.tendency === 'under' ? '#3b82f6' : '#94a3b8';
      html += `<div style="background:${umpColor}20;border:1px solid ${umpColor}40;padding:4px 10px;border-radius:6px;font-size:11px">👨‍⚖️ ${ump.name||'TBD'}: ${ump.tendency||'?'} (${ump.runsPerGame||'?'} R/G)</div>`;
    }
    
    // Statcast pitcher edge
    if (game.signals.awayPitcherStatcast || game.signals.homePitcherStatcast) {
      const awSC = game.signals.awayPitcherStatcast;
      const hmSC = game.signals.homePitcherStatcast;
      if (awSC) {
        const edge = awSC.era - (awSC.xera || awSC.era);
        const edgeColor = edge > 0.3 ? '#22c55e' : edge < -0.3 ? '#ef4444' : '#94a3b8';
        html += `<div style="background:${edgeColor}20;border:1px solid ${edgeColor}40;padding:4px 10px;border-radius:6px;font-size:11px">🔬 ${game.away} SP: ERA ${awSC.era||'?'} vs xERA ${awSC.xera||'?'}</div>`;
      }
      if (hmSC) {
        const edge = hmSC.era - (hmSC.xera || hmSC.era);
        const edgeColor = edge > 0.3 ? '#22c55e' : edge < -0.3 ? '#ef4444' : '#94a3b8';
        html += `<div style="background:${edgeColor}20;border:1px solid ${edgeColor}40;padding:4px 10px;border-radius:6px;font-size:11px">🔬 ${game.home} SP: ERA ${hmSC.era||'?'} vs xERA ${hmSC.xera||'?'}</div>`;
      }
    }
    
    // Preseason new-team penalty
    if (game.signals.preseason?.awayNewTeamPenalty) {
      html += `<div style="background:#ef444420;border:1px solid #ef444440;padding:4px 10px;border-radius:6px;font-size:11px">⚠️ ${game.away} SP on NEW TEAM (-${(game.signals.preseason.awayNewTeamPenalty*100).toFixed(0)}%)</div>`;
    }
    if (game.signals.preseason?.homeNewTeamPenalty) {
      html += `<div style="background:#ef444420;border:1px solid #ef444440;padding:4px 10px;border-radius:6px;font-size:11px">⚠️ ${game.home} SP on NEW TEAM (-${(game.signals.preseason.homeNewTeamPenalty*100).toFixed(0)}%)</div>`;
    }
    
    // Signal count
    html += `<div style="background:#33415520;border:1px solid #33415540;padding:4px 10px;border-radius:6px;font-size:11px">📡 ${gr.signalCount} signals</div>`;
    
    html += '</div>';
    
    // Live odds comparison (if available)
    if (game.signals.liveOdds) {
      const lo = game.signals.liveOdds;
      html += `<div style="background:var(--bg3);border-radius:8px;padding:12px;margin-bottom:12px">`;
      html += `<div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--text2)">📊 BEST ODDS (${lo.bookCount} books)</div>`;
      html += `<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px">`;
      html += `<div style="text-align:center"><div style="font-size:11px;color:#94a3b8">${game.away}</div><div style="font-size:18px;font-weight:900">${lo.bestAway.ml > 0 ? '+' : ''}${lo.bestAway.ml || '?'}</div><div style="font-size:10px;color:#666">${lo.bestAway.book || ''}</div></div>`;
      html += `<div style="text-align:center"><div style="font-size:11px;color:#94a3b8">${game.home}</div><div style="font-size:18px;font-weight:900">${lo.bestHome.ml > 0 ? '+' : ''}${lo.bestHome.ml || '?'}</div><div style="font-size:10px;color:#666">${lo.bestHome.book || ''}</div></div>`;
      html += `<div style="text-align:center"><div style="font-size:11px;color:#94a3b8">Total</div><div style="font-size:18px;font-weight:900">${lo.bestTotal || '?'}</div></div>`;
      html += '</div></div>';
    }
    
    // Game bets (if any)
    if (game.bets.length > 0) {
      html += `<div style="background:linear-gradient(135deg,rgba(34,197,94,0.08),rgba(34,197,94,0.02));border:1px solid rgba(34,197,94,0.3);border-radius:8px;padding:12px">`;
      for (const bet of game.bets) {
        const confColor = bet.confidence === 'HIGH' ? '#22c55e' : bet.confidence === 'MEDIUM' ? '#eab308' : '#94a3b8';
        html += `<div style="display:flex;align-items:center;gap:12px;padding:6px 0;flex-wrap:wrap">`;
        html += `<div style="font-size:16px;font-weight:900;color:${confColor}">${bet.pick}</div>`;
        html += `<div style="font-size:14px;font-weight:700;color:#22c55e">${bet.edge}% edge</div>`;
        html += `<div style="font-size:12px;color:var(--text2)">Wager: $${bet.wager} → EV: +$${bet.ev}</div>`;
        html += `<span style="background:${confColor}20;color:${confColor};padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700">${bet.confidence}</span>`;
        if (bet.weatherSupport) html += `<span style="font-size:11px;color:#94a3b8">${bet.weatherSupport}</span>`;
        html += '</div>';
      }
      html += '</div>';
    }
    
    html += '</div>'; // close game-card
  }
  
  // Timestamp
  html += `<div style="text-align:center;padding:16px;color:#666;font-size:12px">Generated: ${new Date(data.timestamp).toLocaleString()} • MLB Opening Day: March 26-27, 2026</div>`;
  
  wrap.innerHTML = html;
}

function getMotivationBadge(motivation) {
  const badges = {
    'DESPERATE': '<span style="background:#f44336;color:white;padding:1px 6px;border-radius:3px;font-size:0.8em">🔥 DESPERATE</span>',
    'COMPETING': '<span style="background:#2196f3;color:white;padding:1px 6px;border-radius:3px;font-size:0.8em">💪 COMPETING</span>',
    'COASTING': '<span style="background:#ff9800;color:black;padding:1px 6px;border-radius:3px;font-size:0.8em">🏖️ COASTING</span>',
    'RESTING': '<span style="background:#9c27b0;color:white;padding:1px 6px;border-radius:3px;font-size:0.8em">😴 RESTING</span>',
    'TANKING': '<span style="background:#666;color:white;padding:1px 6px;border-radius:3px;font-size:0.8em">📉 TANKING</span>',
    'REBUILDING': '<span style="background:#795548;color:white;padding:1px 6px;border-radius:3px;font-size:0.8em">🔨 REBUILDING</span>'
  };
  return badges[motivation] || `<span style="background:#333;padding:1px 6px;border-radius:3px;font-size:0.8em">${motivation || 'N/A'}</span>`;
}

        if (bet.allOdds && Object.keys(bet.allOdds).length > 1) {
          const entries = Object.entries(bet.allOdds).sort((a, b) => b[1] - a[1]);
          bookInfo = entries.slice(0, 3).map(([b, o]) => `${b.slice(0, 6)}: ${o > 0 ? '+' : ''}${o}`).join(', ');
        }

        html += `<tr>
          <td><strong>${bet.team}</strong></td>
          <td style="font-family:monospace;color:${bet.bestOdds > 0 ? '#22c55e' : '#e94560'};font-weight:bold">${bet.bestOdds > 0 ? '+' : ''}${bet.bestOdds}</td>
          <td style="font-size:11px">${bet.bestBook}</td>
          <td><strong>${bet.modelProb}%</strong></td>
          <td>${bet.impliedProb}%</td>
          <td style="color:${edgeColor};font-weight:bold">+${bet.edge}%</td>
          <td><span style="background:${confColor}22;color:${confColor};padding:2px 8px;border-radius:4px;font-size:11px">${bet.confidence}</span></td>
          <td>${bet.kellyPct}%</td>
          <td style="color:#22c55e;font-weight:bold">$${bet.wager}</td>
          <td style="color:${bet.expectedValue > 0 ? '#22c55e' : '#ff4444'}">$${bet.expectedValue}</td>
          <td style="font-size:10px;color:#888;max-width:150px;overflow:hidden;text-overflow:ellipsis" title="${bookInfo}">${bet.bookCount} books</td>
        </tr>`;
      }

      html += `</tbody></table></div></div>`;
    }

    // If no value bets found
    if (allBets.length === 0 && (!data.valueBets || data.valueBets.length === 0)) {
      // Check per-sport status
      let statusHtml = '';
      if (data.sports) {
        for (const [s, sData] of Object.entries(data.sports)) {
          const emoji = sportEmoji[s] || '🏆';
          if (sData.error) {
            statusHtml += `<div style="margin:8px 0;padding:8px;background:#1a1a2e;border-radius:6px">
              ${emoji} <strong>${s.toUpperCase()}</strong>: <span style="color:#f59e0b">${sData.error}</span>
            </div>`;
          } else {
            statusHtml += `<div style="margin:8px 0;padding:8px;background:#1a1a2e;border-radius:6px">
              ${emoji} <strong>${s.toUpperCase()}</strong>: ${sData.count || 0} value bets (min 5% edge)
              ${sData.modelProbCount ? ` • ${sData.modelProbCount} teams modeled` : ''}
            </div>`;
          }
        }
      }

      html += `<div class="card">
        <h3>📉 No Value Bets Found Above Threshold</h3>
        <p style="color:#aaa">No championship futures currently show 5%+ edge vs model probabilities. This can mean:</p>
        <ul style="color:#aaa;margin:8px 0">
          <li>Markets are efficient (good — means our model is in line with sharp money)</li>
          <li>ODDS_API_KEY may not be set (check /api/futures/status)</li>
          <li>Futures odds may not be available for all sports yet</li>
        </ul>
        ${statusHtml}
        <div style="margin-top:12px">
          <button onclick="loadChampFuturesTab()" style="padding:8px 16px;background:#f59e0b;color:black;border:none;border-radius:6px;cursor:pointer;font-weight:bold">🔄 Refresh Scan</button>
        </div>
      </div>`;
    }

    // Raw odds comparison section (always show)
    html += `<div class="card">
      <h3>📊 Raw Championship Odds (All Books)</h3>
      <p style="color:#aaa;font-size:12px;margin-bottom:12px">Comparison of futures prices across sportsbooks — best odds highlighted</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">`;
    
    for (const s of ['nba', 'nhl', 'mlb']) {
      html += `<button onclick="loadRawFuturesOdds('${s}')" style="padding:6px 14px;border-radius:6px;border:1px solid #333;background:transparent;color:#aaa;cursor:pointer;font-size:13px">${sportEmoji[s]} ${s.toUpperCase()} Odds</button>`;
    }
    html += `</div><div id="raw-futures-odds"></div></div>`;

    // Status footer
    html += `<div class="card" style="opacity:0.7">
      <div style="font-size:11px;color:#666">
        Powered by The Odds API • Model: Monte Carlo playoff simulation (10K+ iterations per sport) • Kelly: Quarter-Kelly for futures (high variance) • 
        Last scan: ${data.timestamp || 'now'} • 
        NBA Playoffs: 21 days • MLB Opening Day: 5 days
      </div>
    </div>`;

    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div class="card"><h2>⚠️ Futures Scanner Error</h2><p style="color:#f59e0b">${e.message}</p>
      <p style="color:#aaa;margin-top:8px">The futures scanner requires ODDS_API_KEY to be set on the server. Check /api/futures/status.</p>
      <button onclick="loadChampFuturesTab()" style="padding:8px 16px;background:#f59e0b;color:black;border:none;border-radius:6px;cursor:pointer;margin-top:12px;font-weight:bold">🔄 Retry</button>
    </div>`;
  }
}

// Raw futures odds loader (for comparison view)
async function loadRawFuturesOdds(sport) {
  const container = document.getElementById('raw-futures-odds');
  if (!container) return;
  container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  
  try {
    const resp = await fetch(`${API}/api/futures/odds/${sport}`);
    const data = await resp.json();
    
    if (data.error) {
      container.innerHTML = `<p style="color:#f59e0b">${data.error}</p>`;
      return;
    }

    const teams = data.teams || [];
    if (teams.length === 0) {
      container.innerHTML = `<p style="color:#aaa">No odds data available for ${sport.toUpperCase()}</p>`;
      return;
    }

    // Get all unique books
    const allBooks = new Set();
    for (const team of teams) {
      for (const book of Object.keys(team.allOdds || {})) {
        allBooks.add(book);
      }
    }
    const books = [...allBooks].sort();

    let html = `<div style="overflow-x:auto"><table>
      <thead><tr>
        <th>#</th><th>Team</th><th>Consensus</th><th>Best</th>`;
    for (const book of books.slice(0, 6)) {
      html += `<th style="font-size:10px">${book.replace('_', ' ').slice(0, 10)}</th>`;
    }
    html += `</tr></thead><tbody>`;

    teams.slice(0, 30).forEach((team, i) => {
      const bestOdds = team.bestOdds;
      html += `<tr>
        <td>${i + 1}</td>
        <td><strong>${team.abbr}</strong> <span style="color:#888;font-size:11px">${team.name || ''}</span></td>
        <td style="font-size:11px">${team.deViggedProb ? (team.deViggedProb * 100).toFixed(1) + '%' : team.consensusImplied ? (team.consensusImplied * 100).toFixed(1) + '%' : 'N/A'}</td>
        <td style="font-family:monospace;color:#22c55e;font-weight:bold">${bestOdds > 0 ? '+' : ''}${bestOdds} <span style="color:#888;font-size:10px">${team.bestBook || ''}</span></td>`;
      for (const book of books.slice(0, 6)) {
        const odds = (team.allOdds || {})[book];
        if (odds !== undefined) {
          const isBest = odds === bestOdds;
          html += `<td style="font-family:monospace;font-size:11px;${isBest ? 'color:#22c55e;font-weight:bold' : 'color:#aaa'}">${odds > 0 ? '+' : ''}${odds}</td>`;
        } else {
          html += `<td style="color:#333">—</td>`;
        }
      }
      html += `</tr>`;
    });

    html += `</tbody></table></div>`;
    html += `<div style="margin-top:8px;font-size:11px;color:#666">
      Hold: ${data.holdPct || 'N/A'} • ${data.books?.length || 0} books • ${teams.length} teams • Fetched: ${data.fetchedAt ? new Date(data.fetchedAt).toLocaleTimeString() : 'now'}
    </div>`;

    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<p style="color:#f59e0b">Error loading odds: ${e.message}</p>`;
  }
}

async function toggleLineupMonitor(start) {
  try {
    const action = start ? 'start' : 'stop';
    await fetch(`${API}/api/mlb/lineups/monitor/${action}`, { method: 'POST' });
    setTimeout(() => loadLineupsTab(), 500);
  } catch (e) {
    console.error('Monitor toggle error:', e);
  }
}

async function forceLineupScan() {
  const wrap = document.getElementById('tab-content');
  const scanBtn = wrap?.querySelector('button:last-child');
  if (scanBtn) scanBtn.textContent = '⏳ Scanning...';
  try {
    await fetch(`${API}/api/mlb/lineups/scan`);

async function retrainML() {
  const wrap = document.getElementById('content');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<h3>🧠 Retraining ML Model...</h3><p>This may take 30-60 seconds...</p>';
  wrap.prepend(card);
  
  try {
    const result = await fetch('/api/ml/train?force=true', { method: 'POST' }).then(r => r.json());
    card.innerHTML = `<h3>✅ ML Model Retrained</h3><pre style="font-size:11px;overflow-x:auto">${JSON.stringify(result, null, 2).slice(0, 2000)}</pre>`;
  } catch (err) {
    card.innerHTML = `<h3>❌ Training Failed</h3><p>${err.message}</p>`;
  }
}

async function fetchNBAHistory() {
  const wrap = document.getElementById('content');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<h3>🏀 Fetching NBA Season Data...</h3><p>Loading from ESPN (may take 1-2 minutes)...</p>';
  wrap.prepend(card);
  
  try {
    const result = await fetch('/api/nba/validation/fetch?season=2025-26').then(r => r.json());
    card.innerHTML = `<h3>✅ NBA Data Loaded</h3><p>${result.gamesLoaded} games for ${result.season}</p>`;
    setTimeout(loadModelAccuracyTab, 1000);
  } catch (err) {
    card.innerHTML = `<h3>❌ Fetch Failed</h3><p>${err.message}</p>`;
  }
}

      <div style="font-size:14px;color:#888;font-weight:bold">vs</div>

      <span>Fair ML: ${sp.fairOdds?.higher||''}</span>
      <span>Fair ML: ${sp.fairOdds?.lower||''}</span>
    </div>`;

    h += `<div style="font-weight:bold;color:#a855f7;margin-bottom:6px">${s.competitiveness||''}</div>`;
    h += `<div style="font-size:12px;color:#888;margin-bottom:8px">Expected series length: ~${s.expectedLength||'?'} games</div>`;

    // Length distribution
    h += `<div style="margin-bottom:12px"><div style="font-size:12px;color:#aaa;margin-bottom:6px;font-weight:bold">Series Length Distribution</div>`;
    [4,5,6,7].forEach(n => {
      const ed = eld[n] || {};
      h += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="width:35px;font-size:12px;color:#888">In ${n}:</span>
        <div style="flex:1;height:16px;background:#222;border-radius:4px;overflow:hidden;display:flex">
          <div style="width:${ed.higher||0}%;height:100%;background:#22c55e" title="${higher} in ${n}: ${ed.higher||0}%"></div>
          <div style="width:${ed.lower||0}%;height:100%;background:#e94560" title="${lower} in ${n}: ${ed.lower||0}%"></div>
        </div>
        <span style="width:40px;font-size:11px;color:#aaa;text-align:right">${ed.total||0}%</span>
      </div>`;
    });
    h += `</div>`;

    // Key Factors
    h += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px">`;
    if (ge.advantage) {
      const geColor = ge.impact === 'SIGNIFICANT' ? '#22c55e' : ge.impact === 'MODERATE' ? '#f59e0b' : '#888';
      h += `<div style="background:#1a1a2e;padding:10px;border-radius:8px">
        <div style="font-size:10px;color:#aaa;margin-bottom:4px">🥅 Goalie Edge</div>
        <div style="font-weight:bold;color:${geColor}">${ge.advantage} (${ge.impact})</div>
        <div style="font-size:10px;color:#666;margin-top:4px">${ge.higherStarter||''}<br>${ge.lowerStarter||''}</div>
      </div>`;
    }
    if (st.advantage) {
      h += `<div style="background:#1a1a2e;padding:10px;border-radius:8px">
        <div style="font-size:10px;color:#aaa;margin-bottom:4px">⚡ Special Teams</div>
        <div style="font-weight:bold">${st.advantage} (+${st.differential||0})</div>
        <div style="font-size:10px;color:#666;margin-top:4px">${st.impact||''}</div>
      </div>`;
    }
    if (hi.homeIceSwing) {
      h += `<div style="background:#1a1a2e;padding:10px;border-radius:8px">
        <div style="font-size:10px;color:#aaa;margin-bottom:4px">🏠 Home Ice</div>
        <div style="font-weight:bold">Swing: ${hi.homeIceSwing > 0 ? '+' : ''}${hi.homeIceSwing}%</div>
        <div style="font-size:10px;color:#666;margin-top:4px">Home: ${hi.higherAtHome||'?'}% | Road: ${hi.higherOnRoad||'?'}%</div>
      </div>`;
    }
    h += `</div>`;

    // Game by game
    if (mc.gameByGame && mc.gameByGame.length > 0) {
      h += `<div style="margin-top:12px"><div style="font-size:12px;color:#aaa;margin-bottom:6px;font-weight:bold">Game-by-Game Win Probability (${higher})</div>`;
      h += `<div style="display:flex;gap:4px;align-items:flex-end;height:80px">`;
      mc.gameByGame.forEach(g => {
        const pct = g.higherSeedWinPct || 50;
        const barH = Math.max(5, (pct / 100) * 75);
        const color = pct >= 55 ? '#22c55e' : pct >= 45 ? '#f59e0b' : '#e94560';
        const loc = g.location === 'Higher Seed Home' ? 'H' : 'A';
        h += `<div style="flex:1;display:flex;flex-direction:column;align-items:center">
          <div style="font-size:9px;color:#888;margin-bottom:2px">${pct}%</div>
          <div style="width:100%;height:${barH}px;background:${color};border-radius:3px"></div>
          <div style="font-size:9px;color:#666;margin-top:2px">G${g.game} (${loc})</div>
        </div>`;
      });
      h += `</div></div>`;
    }

    h += `</div>`;
    resultDiv.innerHTML = h;
  } catch (err) {
    resultDiv.innerHTML = `<p style="color:#e94560">Error: ${err.message}</p>`;
  }
}

// ==================== NBA SEEDING SIMULATOR TAB ====================

async function loadNBASeedingTab() {
  const wrap = document.getElementById('tab-content');
  try {
    const resp = await fetch(`${API}/api/nba/seeding-sim`);
    const data = await resp.json();
    
    let html = `<div class="card">
      <h2>🎯 NBA Playoff Seeding Simulator</h2>
      <p style="color:#94a3b8">Monte Carlo simulation of remaining ${data.schedule?.gamesRemaining || '~170'} games (${data.simulations?.toLocaleString()} sims) | Source: ${data.schedule?.source || 'N/A'} | Duration: ${data.durationMs}ms</p>
      <div style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap">
        <button class="tab active" onclick="showSeedingView('battles',this)">⚔️ Key Battles</button>
        <button class="tab" onclick="showSeedingView('west',this)">🌅 West</button>
        <button class="tab" onclick="showSeedingView('east',this)">🌆 East</button>
        <button class="tab" onclick="showSeedingView('matchups',this)">🏀 Matchups</button>
        <button class="tab" onclick="showSeedingView('bets',this)">💰 Bets</button>
        <button class="tab" onclick="showSeedingView('divisions',this)">📊 Divisions</button>
      </div>
      <div id="seeding-content"></div>
    </div>`;
    
    wrap.innerHTML = html;
    
    // Store data globally for sub-tab switching
    window._seedingData = data;
    showSeedingView('battles');
    
  } catch (err) {
    wrap.innerHTML = `<div class="card"><h3>❌ Seeding Sim Error</h3><p>${err.message}</p></div>`;
  }
}

function showSeedingView(view, btn) {
  if (btn) {
    document.querySelectorAll('#tab-content .tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }
  const data = window._seedingData;
  if (!data) return;
  
  const el = document.getElementById('seeding-content');
  if (!el) return;
  
  if (view === 'battles') renderSeedingBattles(el, data);
  else if (view === 'west') renderConference(el, data, 'West');
  else if (view === 'east') renderConference(el, data, 'East');
  else if (view === 'matchups') renderMatchups(el, data);
  else if (view === 'bets') renderSeedingBets(el, data);
  else if (view === 'divisions') renderDivisions(el, data);
}

function renderSeedingBattles(el, data) {
  // Get key battles
  const battles = [];
  for (const [conf, teams] of Object.entries(data.conferences)) {
    for (let i = 0; i < teams.length - 1; i++) {
      const t1 = teams[i];
      const t2 = teams[i + 1];
      const gap = t1.projected.avgWins - t2.projected.avgWins;
      if (gap < 2.0 && i < 10) {
        battles.push({ conf, seeds: `${i+1}/${i+2}`, t1, t2, gap });
      }
    }
  }
  battles.sort((a, b) => a.gap - b.gap);
  
  let html = '<h3>⚔️ Tightest Seeding Battles</h3>';
  
  for (const b of battles.slice(0, 12)) {
    const battleType = b.seeds.split('/').map(Number)[0] < 7 ? '🏀 Playoff' : b.seeds.split('/').map(Number)[0] < 11 ? '🎲 Play-In' : '🎰 Lottery';
    html += `<div style="background:#1e293b;border-radius:8px;padding:12px;margin:8px 0">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="color:#fbbf24;font-weight:bold">${b.conf} ${b.seeds} seed battle</span>
        <span style="font-size:0.85em;color:#94a3b8">${battleType} | Gap: ${b.gap.toFixed(1)}W</span>
      </div>
      <div style="display:flex;gap:20px;margin-top:8px">
        <div style="flex:1">
          <div style="font-weight:bold;color:#34d399">${b.t1.abbr}</div>
          <div style="color:#94a3b8;font-size:0.85em">${b.t1.current.w}-${b.t1.current.l} → ${b.t1.projected.avgWins}W proj</div>
          <div style="color:#94a3b8;font-size:0.85em">Playoff: ${b.t1.playoffProb}% | PlayIn: ${b.t1.playInProb}%</div>
        </div>
        <div style="color:#64748b;font-size:1.5em;align-self:center">vs</div>
        <div style="flex:1;text-align:right">
          <div style="font-weight:bold;color:#f87171">${b.t2.abbr}</div>
          <div style="color:#94a3b8;font-size:0.85em">${b.t2.current.w}-${b.t2.current.l} → ${b.t2.projected.avgWins}W proj</div>
          <div style="color:#94a3b8;font-size:0.85em">Playoff: ${b.t2.playoffProb}% | PlayIn: ${b.t2.playInProb}%</div>
        </div>
      </div>
    </div>`;
  }
  
  el.innerHTML = html;
}

function renderConference(el, data, conf) {
  const teams = data.conferences[conf];
  if (!teams) { el.innerHTML = '<p>No data</p>'; return; }
  
  let html = `<h3>${conf === 'West' ? '🌅' : '🌆'} ${conf}ern Conference Projected Standings</h3>`;
  html += `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.9em">
    <thead><tr style="border-bottom:1px solid #334155">
      <th style="text-align:left;padding:6px">#</th>
      <th style="text-align:left;padding:6px">Team</th>
      <th style="text-align:center;padding:6px">Now</th>
      <th style="text-align:center;padding:6px">Left</th>
      <th style="text-align:center;padding:6px">Proj W</th>
      <th style="text-align:center;padding:6px">Range</th>
      <th style="text-align:center;padding:6px">🏀 Playoff</th>
      <th style="text-align:center;padding:6px">🎲 PlayIn</th>
      <th style="text-align:center;padding:6px">🥇 #1</th>
      <th style="text-align:center;padding:6px">⭐ Div Win</th>
      <th style="text-align:center;padding:6px">Power</th>
    </tr></thead><tbody>`;
  
  for (const t of teams) {
    const seedNum = t.seed;
    const rowColor = seedNum <= 6 ? '#0f172a' : seedNum <= 10 ? '#1a1a2e' : '#1e1e1e';
    const borderLeft = seedNum <= 6 ? '3px solid #34d399' : seedNum <= 10 ? '3px solid #fbbf24' : '3px solid #64748b';
    const playoffColor = t.playoffProb >= 90 ? '#34d399' : t.playoffProb >= 50 ? '#fbbf24' : '#f87171';
    
    html += `<tr style="border-bottom:1px solid #1e293b;background:${rowColor};border-left:${borderLeft}">
      <td style="padding:6px;font-weight:bold;color:${seedNum <= 6 ? '#34d399' : seedNum <= 10 ? '#fbbf24' : '#94a3b8'}">${seedNum}</td>
      <td style="padding:6px;font-weight:bold">${t.abbr} <span style="color:#64748b;font-weight:normal;font-size:0.85em">${t.tier}</span></td>
      <td style="text-align:center;padding:6px">${t.current.w}-${t.current.l}</td>
      <td style="text-align:center;padding:6px;color:#94a3b8">${t.current.remaining}</td>
      <td style="text-align:center;padding:6px;font-weight:bold;color:#60a5fa">${t.projected.avgWins}</td>
      <td style="text-align:center;padding:6px;color:#94a3b8;font-size:0.85em">${t.projected.p10Wins}-${t.projected.p90Wins}</td>
      <td style="text-align:center;padding:6px;color:${playoffColor};font-weight:bold">${t.playoffProb}%</td>
      <td style="text-align:center;padding:6px;color:#fbbf24">${t.playInProb}%</td>
      <td style="text-align:center;padding:6px;color:${t.topSeedProb > 0 ? '#c084fc' : '#334155'}">${t.topSeedProb > 0 ? t.topSeedProb + '%' : '—'}</td>
      <td style="text-align:center;padding:6px;color:${t.divisionWinnerProb > 0 ? '#60a5fa' : '#334155'}">${t.divisionWinnerProb > 0 ? t.divisionWinnerProb + '%' : '—'}</td>
      <td style="text-align:center;padding:6px;color:#94a3b8">${t.power.toFixed(1)}</td>
    </tr>`;
  }
  
  html += '</tbody></table></div>';
  
  // Seed probability heatmap for top 10
  html += '<h3 style="margin-top:20px">📊 Seed Probability Distribution</h3>';
  html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:0.8em">';
  html += '<thead><tr style="border-bottom:1px solid #334155"><th style="padding:4px">Team</th>';
  for (let s = 1; s <= 15; s++) {
    html += `<th style="text-align:center;padding:4px">#${s}</th>`;
  }
  html += '</tr></thead><tbody>';
  
  for (const t of teams.slice(0, 12)) {
    html += `<tr style="border-bottom:1px solid #1e293b"><td style="padding:4px;font-weight:bold">${t.abbr}</td>`;
    for (let s = 1; s <= 15; s++) {
      const pct = t.seeds[s] || 0;
      const intensity = Math.min(1, pct / 50);
      const bg = pct > 0 ? `rgba(96,165,250,${intensity})` : 'transparent';
      html += `<td style="text-align:center;padding:4px;background:${bg};color:${pct > 10 ? '#fff' : '#94a3b8'}">${pct > 0 ? pct + '%' : ''}</td>`;
    }
    html += '</tr>';
  }
  
  html += '</tbody></table></div>';
  
  el.innerHTML = html;
}

function renderMatchups(el, data) {
  let html = '<h3>🏀 Projected Round 1 Matchups</h3>';
  html += '<p style="color:#94a3b8;font-size:0.9em">Most likely playoff matchups based on seeding sim</p>';
  
  for (const [key, matchups] of Object.entries(data.matchups || {})) {
    const [conf, round, num] = key.split('_');
    html += `<div style="background:#1e293b;border-radius:8px;padding:12px;margin:8px 0">
      <div style="color:#fbbf24;font-weight:bold;margin-bottom:8px">${conf} Round 1 — Series ${num}</div>`;
    
    for (const m of matchups.slice(0, 5)) {
      const bar = `<div style="background:#334155;border-radius:4px;height:20px;width:200px;display:inline-block;vertical-align:middle">
        <div style="background:#3b82f6;border-radius:4px;height:100%;width:${m.prob}%"></div>
      </div>`;
      html += `<div style="margin:4px 0;display:flex;align-items:center;gap:8px">
        <span style="width:120px;font-weight:bold">${m.matchup}</span>
        ${bar}
        <span style="color:#94a3b8">${m.prob}%</span>
      </div>`;
    }
    
    html += '</div>';
  }
  
  el.innerHTML = html;
}

function renderSeedingBets(el, data) {

        <div style="color:var(--text2);font-size:12px;margin-top:4px">${check.detail}</div>
      </div>`;

    html += '</div>';
    
    // Top edges
    if (data.topEdges && data.topEdges.length > 0) {
      html += '<div class="card"><h3 style="margin-bottom:12px">🎯 Top Opening Day Edges</h3>';
      html += '<table style="width:100%;border-collapse:collapse"><thead><tr>';
      html += '<th style="text-align:left;padding:8px;border-bottom:1px solid var(--border)">Game</th>';
      html += '<th style="text-align:left;padding:8px;border-bottom:1px solid var(--border)">Pick</th>';
      html += '<th style="text-align:right;padding:8px;border-bottom:1px solid var(--border)">Edge</th>';
      html += '<th style="text-align:right;padding:8px;border-bottom:1px solid var(--border)">ML</th>';
      html += '<th style="text-align:left;padding:8px;border-bottom:1px solid var(--border)">Starters</th>';

        html += `<tr>
          <td style="padding:8px;border-bottom:1px solid var(--border)20">${edge.game}</td>
          <td style="padding:8px;border-bottom:1px solid var(--border)20;font-weight:700">${edge.pick}</td>
          <td style="padding:8px;border-bottom:1px solid var(--border)20;text-align:right;color:${edgeColor};font-weight:700">${edge.edge}</td>

    // Errors & warnings
    if (data.errors && data.errors.length > 0) {
      html += '<div class="card" style="border-left:3px solid #ef4444"><h3 style="color:#ef4444;margin-bottom:8px">🚨 Critical Errors</h3>';
      for (const err of data.errors) {
        html += `<p style="padding:4px 0;font-size:13px">${err}</p>`;
      }
      html += '</div>';
    }
    
    if (data.warnings && data.warnings.length > 0) {
      html += '<div class="card" style="border-left:3px solid #eab308"><h3 style="color:#eab308;margin-bottom:8px">⚠️ Warnings</h3>';
      for (const warn of data.warnings) {
        html += `<p style="padding:4px 0;font-size:13px">${warn}</p>`;
      }
      html += '</div>';
    }
    
    wrap.innerHTML = html;
  } catch (e) {
    wrap.innerHTML = `<div class="card"><h2>❌ Error loading validation</h2><p>${e.message}</p></div>`;
  }
}

async function runNFLPredict() {
  const away = document.getElementById('nfl-away').value;
  const home = document.getElementById('nfl-home').value;
  const resultDiv = document.getElementById('nfl-predict-result');
  resultDiv.innerHTML = 'Predicting...';
  
  try {
    const res = await fetch(\`/api/model/nfl/predict?away=\${away}&home=\${home}\`);
    const pred = await res.json();
    
    if (pred.error) {
      resultDiv.innerHTML = `<p style="color:red">${pred.error}</p>`;
      return;
    }
    
    const favored = pred.spread < 0 ? pred.away : pred.home;
    const spreadAbs = Math.abs(pred.spread).toFixed(1);
    
    let html = '<div style="background:#1a1a2e;border-radius:8px;padding:20px;margin-top:12px">';
    html += `<h3 style="margin-top:0">${pred.away} @ ${pred.home}</h3>`;
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;text-align:center">';
    
    html += `<div><div style="font-size:0.8em;color:#888">SPREAD</div><div style="font-size:1.5em;font-weight:bold">${favored} -${spreadAbs}</div></div>`;
    html += `<div><div style="font-size:0.8em;color:#888">TOTAL</div><div style="font-size:1.5em;font-weight:bold">${pred.total}</div></div>`;
    html += `<div><div style="font-size:0.8em;color:#888">HOME WIN PROB</div><div style="font-size:1.5em;font-weight:bold;color:${pred.homeWinProb > 0.5 ? '#4ade80' : '#f87171'}">${(pred.homeWinProb * 100).toFixed(1)}%</div></div>`;
    
    html += '</div>';
    
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px">';
    html += `<div style="background:#222;padding:8px;border-radius:4px"><strong>${pred.away}</strong><br>Rating: ${pred.awayRating} | Proj: ${pred.awayProjWins}W<br>Exp Pts: ${pred.awayExpPts}</div>`;
    html += `<div style="background:#222;padding:8px;border-radius:4px"><strong>${pred.home}</strong><br>Rating: ${pred.homeRating} | Proj: ${pred.homeProjWins}W<br>Exp Pts: ${pred.homeExpPts}</div>`;
    html += '</div>';
    
    html += '</div>';
    resultDiv.innerHTML = html;
  } catch (err) {
    resultDiv.innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
  }
}

async function analyzeFramingMatchup() {
  const away = document.getElementById('framing-away').value;
  const home = document.getElementById('framing-home').value;
  const resultDiv = document.getElementById('framing-result');
  
  try {
    const data = await fetch(`/api/mlb/framing/${away}/${home}`).then(r => r.json());
    
    const tierColor = t => t === 'elite' ? '#22c55e' : t === 'great' ? '#16a34a' : t === 'good' ? '#4ade80' : 
                           t === 'average' ? '#94a3b8' : t === 'below_avg' ? '#f97316' : 
                           t === 'poor' ? '#ef4444' : t === 'terrible' ? '#dc2626' : '#64748b';
    
    resultDiv.innerHTML = `
      <div style="background:#0f172a;border-radius:8px;padding:16px;border:1px solid ${data.isMassiveEdge ? '#22c55e' : data.isEdge ? '#4ade80' : '#334155'}">
        <div style="display:flex;justify-content:space-around;text-align:center;margin-bottom:12px">
          <div>
            <div style="color:#94a3b8;font-size:12px">Away Catcher</div>
            <div style="font-size:18px;font-weight:bold;color:${tierColor(data.awayTier)}">${data.awayCatcher}</div>
            <div style="font-size:24px;color:${data.awayFramingRuns >= 0 ? '#22c55e' : '#ef4444'}">${data.awayFramingRuns >= 0 ? '+' : ''}${data.awayFramingRuns.toFixed(1)}R</div>
            <div style="font-size:11px;color:#64748b">${data.awayTier}</div>
          </div>
          <div style="display:flex;align-items:center;color:#64748b;font-size:20px">VS</div>
          <div>
            <div style="color:#94a3b8;font-size:12px">Home Catcher</div>
            <div style="font-size:18px;font-weight:bold;color:${tierColor(data.homeTier)}">${data.homeCatcher}</div>
            <div style="font-size:24px;color:${data.homeFramingRuns >= 0 ? '#22c55e' : '#ef4444'}">${data.homeFramingRuns >= 0 ? '+' : ''}${data.homeFramingRuns.toFixed(1)}R</div>
            <div style="font-size:11px;color:#64748b">${data.homeTier}</div>
          </div>
        </div>
        <div style="text-align:center;padding:8px;background:#1e293b;border-radius:6px;margin-bottom:8px">
          <div style="font-size:13px;color:#94a3b8">Framing Gap: <span style="color:${Math.abs(data.framingGap) >= 10 ? '#eab308' : '#94a3b8'};font-weight:bold">${Math.abs(data.framingGap).toFixed(1)} runs</span> ${data.framingGap > 0 ? '(HOME advantage)' : data.framingGap < 0 ? '(AWAY advantage)' : '(even)'}</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px">Total runs adj: ${data.totalRunsAdj.toFixed(3)}/game | Home edge: ${(data.homeEdge * 100).toFixed(2)}%</div>
        </div>
        <div style="font-size:13px;color:#eab308">${data.note}</div>
        ${data.bettingImplications && data.bettingImplications.length > 0 ? 
          `<div style="margin-top:8px;padding:8px;background:#22c55e10;border-radius:6px">${data.bettingImplications.map(i => `<div style="color:#22c55e;font-size:12px;margin-bottom:4px">💡 <strong>${i.type}</strong> (${i.strength}): ${i.reason}</div>`).join('')}</div>` : ''}
      </div>
    `;
  } catch (err) {
    resultDiv.innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
  }
}

      const bg = isLive ? '#dc262620' : isUpcoming ? '#1e293b' : '#0f172a';
      const border = isUpset ? 'border-left:3px solid #f97316;' : isLive ? 'border-left:3px solid #dc2626;' : '';
      html += `<div style="background:${bg};border-radius:6px;padding:8px 12px;font-size:12px;${border}">${r}</div>`;
    }
    html += '</div>';
    html += '</div>';
    
    // Upsets and key storylines
    html += '<div style="background:#0f172a;border-radius:8px;padding:16px;margin-top:16px">';
    html += '<h4 style="margin:0 0 8px;color:#f97316">🔥 Key Tournament Storylines</h4>';
    html += '<div style="font-size:13px;color:#94a3b8;line-height:1.8">';

    html += '• <strong style="color:#f97316">11-seed VCU</strong> beat 6-seed UNC 82-78 in OT — defending on Tar Heels in hostile territory<br>';
    html += '• <strong style="color:#f97316">11-seed Texas</strong> beat 3-seed Gonzaga 74-68 in Round 2 — Longhorns on a run<br>';
    html += '• <strong style="color:#4ade80">Michigan</strong> (1 seed) cruising — 101-80 and 95-72 wins. Duke also dominant (81-58 over TCU)<br>';
    html += '• <strong style="color:#4ade80">Houston</strong> defense is ELITE — 78-47 (Rd 1) and 88-57 (Rd 2). AdjD 87.8 = championship-caliber<br>';
    html += '• <strong style="color:#60a5fa">9-seed St. Louis</strong> hammered 8-seed Georgia 102-77 — could be this year\'s Cinderella</div>';

    wrap.innerHTML = html;

async function runNCAAPredict() {
  const away = document.getElementById('ncaa-away').value;
  const home = document.getElementById('ncaa-home').value;
  const round = document.getElementById('ncaa-round').value;
  const resultDiv = document.getElementById('ncaa-predict-result');
  resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  
  try {
    const res = await fetch(`/api/ncaa/predict?away=${away}&home=${home}&round=${encodeURIComponent(round)}`);
    const pred = await res.json();
    
    if (pred.error) {
      resultDiv.innerHTML = `<p style="color:red">${pred.error}</p>`;
      return;
    }
    
    const fav = pred.blendedHomeWinProb > pred.blendedAwayWinProb ? 'home' : 'away';
    const favName = fav === 'home' ? pred.homeName : pred.awayName;
    const favProb = fav === 'home' ? pred.blendedHomeWinProb : pred.blendedAwayWinProb;
    
    let h = '<div style="background:#0f172a;border-radius:10px;padding:20px;margin-top:12px;border-left:4px solid #f97316">';
    h += `<div style="text-align:center;margin-bottom:16px">
      <div style="font-size:12px;color:#f97316;font-weight:bold">${round} • Neutral Court</div>
      <div style="font-size:22px;font-weight:bold;margin:8px 0">(${pred.awaySeed}) ${pred.awayName} vs (${pred.homeSeed}) ${pred.homeName}</div>
      <div style="font-size:14px;color:#94a3b8">${pred.awayRecord} vs ${pred.homeRecord}</div>
    </div>`;
    
    // Big probability display
    h += '<div style="display:flex;justify-content:center;gap:40px;margin-bottom:16px">';
    h += `<div style="text-align:center">
      <div style="font-size:32px;font-weight:bold;color:${pred.blendedAwayWinProb > 0.5 ? '#4ade80' : '#94a3b8'}">${(pred.blendedAwayWinProb*100).toFixed(1)}%</div>
      <div style="font-size:13px">${pred.awayName}</div>
      <div style="font-size:11px;color:#64748b">ML: ${pred.awayML > 0 ? '+' : ''}${pred.awayML}</div>
    </div>`;
    h += `<div style="text-align:center">
      <div style="font-size:32px;font-weight:bold;color:${pred.blendedHomeWinProb > 0.5 ? '#4ade80' : '#94a3b8'}">${(pred.blendedHomeWinProb*100).toFixed(1)}%</div>
      <div style="font-size:13px">${pred.homeName}</div>
      <div style="font-size:11px;color:#64748b">ML: ${pred.homeML > 0 ? '+' : ''}${pred.homeML}</div>
    </div>`;
    h += '</div>';
    
    // Key stats
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px">';
    h += `<div style="background:#1e293b;border-radius:6px;padding:10px;text-align:center">
      <div style="font-size:10px;color:#64748b">SPREAD</div>
      <div style="font-weight:bold;font-size:16px">${pred.spread > 0 ? `${pred.homeName} -${Math.abs(pred.spread)}` : `${pred.awayName} -${Math.abs(pred.spread)}`}</div>
    </div>`;
    h += `<div style="background:#1e293b;border-radius:6px;padding:10px;text-align:center">
      <div style="font-size:10px;color:#64748b">PROJECTED TOTAL</div>
      <div style="font-weight:bold;font-size:16px">${pred.projTotal}</div>
    </div>`;
    h += `<div style="background:#1e293b;border-radius:6px;padding:10px;text-align:center">
      <div style="font-size:10px;color:#64748b">AWAY SCORE</div>
      <div style="font-weight:bold;font-size:16px">${pred.awayProjScore}</div>
    </div>`;
    h += `<div style="background:#1e293b;border-radius:6px;padding:10px;text-align:center">
      <div style="font-size:10px;color:#64748b">HOME SCORE</div>
      <div style="font-weight:bold;font-size:16px">${pred.homeProjScore}</div>
    </div>`;
    h += '</div>';
    
    // Efficiency comparison
    if (pred.efficiency) {
      h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">';
      h += `<div style="background:#1e293b;border-radius:6px;padding:10px">

        <div style="font-size:12px;color:#94a3b8">AdjO: <strong style="color:#4ade80">${pred.efficiency.away.adjO}</strong> | AdjD: <strong style="color:#f87171">${pred.efficiency.away.adjD}</strong></div>
        <div style="font-size:12px;color:#94a3b8">AdjEM: <strong style="color:#f97316">+${pred.efficiency.away.adjEM}</strong> | Tempo: ${pred.efficiency.away.tempo}</div>
      </div>`;
      h += `<div style="background:#1e293b;border-radius:6px;padding:10px">
        <div style="font-weight:bold;margin-bottom:4px">${pred.homeName}</div>
        <div style="font-size:12px;color:#94a3b8">AdjO: <strong style="color:#4ade80">${pred.efficiency.home.adjO}</strong> | AdjD: <strong style="color:#f87171">${pred.efficiency.home.adjD}</strong></div>

      </div>`;
      h += '</div>';
    }
    
    // Matchup insights
    if (pred.matchup && pred.matchup.insights && pred.matchup.insights.length > 0) {

        h += `<div style="font-size:12px;color:#94a3b8;margin:3px 0">${insight}</div>`;
      }
      h += '</div>';
    }
    
    // Historical seed data
    if (pred.historicalAdj) {
      h += `<div style="background:#1e293b;border-radius:6px;padding:10px;margin-top:8px;font-size:12px;color:#94a3b8">

      </div>`;
    }
    
    h += '</div>';
    resultDiv.innerHTML = h;
  } catch (err) {
    resultDiv.innerHTML = `<p style="color:red">Error: ${err.message}</p>`;
  }
}

async function analyzePlatoonMatchup() {
  const away = document.getElementById('platoon-away').value.toUpperCase();
  const home = document.getElementById('platoon-home').value.toUpperCase();
  const aph = document.getElementById('platoon-aph').value;
  const hph = document.getElementById('platoon-hph').value;
  const resultDiv = document.getElementById('platoon-matchup-result');
  
  if (!away || !home) {
    resultDiv.innerHTML = '<p style="color:#f59e0b">Enter both teams</p>';
    return;
  }
  
  resultDiv.innerHTML = '<p style="color:#aaa">Analyzing...</p>';
  
  try {
    const params = new URLSearchParams();
    if (aph) params.set('aph', aph);
    if (hph) params.set('hph', hph);
    
    const res = await fetch(`/api/mlb/platoon/${away}/${home}?${params}`);
    const data = await res.json();
    
    let h = '<div style="background:#2a2a3e;padding:14px;border-radius:8px">';
    h += `<strong style="color:white;font-size:1.1em">${away} @ ${home}</strong>`;
    
    // Away team analysis
    if (data.away) {
      const a = data.away;
      const aColor = a.multiplier < 0.94 ? '#ef4444' : a.multiplier < 0.97 ? '#f59e0b' : a.multiplier > 1.03 ? '#22c55e' : '#6b7280';
      h += `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px">
          <div style="background:#1a1a2e;padding:10px;border-radius:6px">
            <div style="color:#aaa;font-size:0.8em">${a.team} offense vs ${a.vsPitcherHand || '?'}HP</div>
            <div style="font-size:1.3em;font-weight:bold;color:${aColor}">${a.multiplier}x (${a.impactPct > 0 ? '+' : ''}${a.impactPct}%)</div>
            <div style="font-size:0.8em;color:#888;margin-top:4px">wOBA: ${a.wOBA} · LHH: ${a.lhh_pct ? (a.lhh_pct * 100).toFixed(0) + '%' : 'N/A'}</div>
            <div style="font-size:0.8em;color:#aaa;margin-top:4px">${a.notes || ''}</div>
          </div>
      `;
    }
    
    // Home team analysis
    if (data.home) {
      const hm = data.home;
      const hColor = hm.multiplier < 0.94 ? '#ef4444' : hm.multiplier < 0.97 ? '#f59e0b' : hm.multiplier > 1.03 ? '#22c55e' : '#6b7280';
      h += `
          <div style="background:#1a1a2e;padding:10px;border-radius:6px">
            <div style="color:#aaa;font-size:0.8em">${hm.team} offense vs ${hm.vsPitcherHand || '?'}HP</div>
            <div style="font-size:1.3em;font-weight:bold;color:${hColor}">${hm.multiplier}x (${hm.impactPct > 0 ? '+' : ''}${hm.impactPct}%)</div>
            <div style="font-size:0.8em;color:#888;margin-top:4px">wOBA: ${hm.wOBA} · LHH: ${hm.lhh_pct ? (hm.lhh_pct * 100).toFixed(0) + '%' : 'N/A'}</div>
            <div style="font-size:0.8em;color:#aaa;margin-top:4px">${hm.notes || ''}</div>
          </div>
        </div>
      `;
    }
    
    // Total runs impact
    if (data.totalRunsImpact !== undefined) {
      const impColor = data.totalRunsImpact < -0.3 ? '#3b82f6' : data.totalRunsImpact > 0.3 ? '#ef4444' : '#6b7280';
      h += `
        <div style="margin-top:10px;text-align:center;padding:8px;background:#1a1a2e;border-radius:6px">
          <span style="color:#aaa">Total Runs Impact: </span>
          <span style="font-size:1.2em;font-weight:bold;color:${impColor}">${data.totalRunsImpact > 0 ? '+' : ''}${data.totalRunsImpact} runs</span>
        </div>
      `;
    }

    resultDiv.innerHTML = '<p style="color:#ffcc00">Select both a pitcher and opponent</p>';
    return;

  resultDiv.innerHTML = '<p>Analyzing...</p>';
  try {
    const res = await fetch(`${API}/api/mlb/kprops/matchup/${encodeURIComponent(pitcher)}/${opponent}`);
    const data = await res.json();
    if (data.error) { resultDiv.innerHTML = `<p style="color:red">${data.error}</p>`; return; }

    const recColor = data.recommendation === 'OVER' ? '#00ff88' : data.recommendation === 'UNDER' ? '#ff4444' : '#888';
    const gradeColor = data.grade && data.grade.startsWith('A') ? '#00ff88' : data.grade && data.grade.startsWith('B') ? '#88ff00' : '#ffcc00';

    let html = `<div style="background:#1e1e2e;border:1px solid #444;border-radius:8px;padding:16px;margin-top:8px">

      <p>Park: ${data.park} | Tier: ${data.tier}</p>
      <table>
        <tr><td>Steamer K/9</td><td><strong>${data.steamerK9}</strong></td><td>xK/9 (Savant)</td><td><strong>${data.xK9}</strong></td></tr>
        <tr><td>Blended K/9</td><td><strong>${data.blendedK9}</strong></td><td>Projected IP</td><td><strong>${data.projectedIP}</strong></td></tr>
        <tr><td>Raw Expected Ks</td><td>${data.rawExpectedKs}</td><td>Adjusted Expected Ks</td><td style="font-size:1.3em;font-weight:bold;color:#00ff88">${data.adjustedExpectedKs}</td></tr>
        <tr><td>80% Range</td><td>${data.low} — ${data.high}</td><td>Std Dev</td><td>${data.sd}</td></tr>
      </table>
      <h4>Adjustments</h4>

// ==================== LIVE K PROPS REFRESH ====================
async function refreshLiveKProps() {
  const btn = document.getElementById('live-k-btn');
  const status = document.getElementById('live-k-status');
  if (btn) btn.disabled = true;
  if (status) status.textContent = 'Fetching live lines from The Odds API...';
  
  try {
    const resp = await fetch(`${API}/api/opening-day/k-props/refresh`, { method: 'POST' });
    const data = await resp.json();
    
    if (data.error) {
      if (status) status.textContent = `❌ ${data.error}`;
    } else {
      const changes = data.liveUpdate?.changes?.length || 0;
      const updated = data.liveUpdate?.updated || 0;
      const added = data.liveUpdate?.added || 0;
      if (status) status.textContent = `✅ ${updated} updated, ${added} new, ${changes} line changes. Reloading...`;
      
      // Reload the tab after a short delay
      setTimeout(() => loadKPropsTab(), 1500);
    }
  } catch (e) {
    if (status) status.textContent = `❌ Error: ${e.message}`;
  } finally {
    if (btn) btn.disabled = false;
  }
}

          <span style="font-weight:500">${p.game || ''} — ${p.pick || ''} ${p.market || ''}</span>
          <span style="color:var(--text2)">@ ${p.book || 'DK'} ${p.ml > 0 ? '+' : ''}${p.ml || ''} | ${p.edge || ''} | ${p.ev || '$0'}</span>
        </div>`;
      }
      html += '</div></div>';
    }

    // Book allocation summary
    if (data.bookSummary?.length) {
      html += `<div class="card">
        <h3 style="margin-bottom:8px">🏦 Sportsbook Allocation</h3>
        <p style="font-size:12px;color:var(--text3);margin-bottom:8px">Where to have funds ready based on best available lines</p>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="border-bottom:1px solid var(--border)">
            <th style="text-align:left;padding:6px">Book</th>
            <th style="text-align:right;padding:6px">Plays</th>
            <th style="text-align:right;padding:6px">Wager</th>
            <th style="text-align:right;padding:6px">EV</th>
            <th style="text-align:right;padding:6px">Deposit Needed</th>
          </tr></thead><tbody>`;
      for (const b of data.bookSummary) {
        html += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05)">
          <td style="padding:6px;font-weight:600">${b.book}</td>
          <td style="text-align:right;padding:6px">${b.plays}</td>
          <td style="text-align:right;padding:6px">$${b.totalWager.toFixed(0)}</td>
          <td style="text-align:right;padding:6px;color:#22c55e">$${b.totalEV.toFixed(2)}</td>
          <td style="text-align:right;padding:6px;color:#f59e0b">$${b.depositNeeded}</td>
        </tr>`;
      }
      html += '</tbody></table></div>';
    }

    // Game-by-game details
    if (data.games?.length) {
      html += `<div class="card">
        <h3 style="margin-bottom:8px">🎮 Game-by-Game Breakdown</h3>`;
      for (const g of data.games) {
        const hasPlays = (g.bets || g.markets || []).length > 0;
        html += `<div style="background:var(--bg2);padding:10px;border-radius:8px;margin-bottom:8px;opacity:${hasPlays ? '1' : '0.5'}">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-weight:700">${g.game || g.matchup || ''}</span>
            <span style="font-size:12px;color:var(--text3)">${(g.bets || g.markets || []).length} plays</span>
          </div>`;
        for (const m of (g.bets || g.markets || [])) {
          const edgeColor = (m.edgePct || m.edge || 0) >= 10 ? '#f59e0b' : (m.edgePct || m.edge || 0) >= 5 ? '#3b82f6' : 'var(--text2)';
          html += `<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-top:1px solid rgba(255,255,255,0.04)">
            <span>${m.pick || m.type || ''} ${m.market || ''}</span>
            <span style="color:var(--text2)">@ ${m.book || 'DK'} ${m.ml > 0 ? '+' : ''}${m.ml || ''}</span>
            <span style="color:${edgeColor};font-weight:600">${typeof m.edgePct === 'number' ? m.edgePct.toFixed(1) + '%' : (m.edge || '')}</span>
            <span style="color:#22c55e">${typeof m.ev === 'number' ? '$' + m.ev.toFixed(2) : (m.ev || '')}</span>
          </div>`;
        }
        html += '</div>';
      }
      html += '</div>';
    }

    html += `<div style="text-align:center;color:var(--text3);font-size:11px;padding:16px 0">
      SportsSim v72.0 • Line Shopping Optimizer • ${data.timestamp ? new Date(data.timestamp).toLocaleString() : ''} • 🦞 Every cent counts
    </div>`;

    wrap.innerHTML = html;
  } catch(e) {
    wrap.innerHTML = `<div class="card">
      <h2 style="margin-bottom:8px">🛒 Line Shopping</h2>
      <p style="color:var(--text2);margin-bottom:12px">Multi-book line shopping optimizer finds the best available line across all sportsbooks for every bet in our portfolio.</p>
      <div style="background:rgba(245,158,11,0.1);padding:12px;border-radius:8px;border:1px solid rgba(245,158,11,0.3)">
        <p style="color:#f59e0b;font-weight:600;margin-bottom:4px">⚠️ Line shopping data not available yet</p>
        <p style="font-size:12px;color:var(--text3)">This will activate when Odds API returns live lines for upcoming games. Check back closer to game time.</p>
        <p style="font-size:11px;color:var(--text3);margin-top:6px">Error: ${e.message}</p>
      </div>
    </div>`;
  }
}

// ==================== LIVE TRACKER TAB ====================
async function loadLiveTrackerTab() {
  const wrap = document.getElementById('tab-content');
  wrap.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading live tracker...</p></div>';
  try {
    const res = await fetch('/api/live/session');
    const data = await res.json();
    
    let html = '';
    
    if (!data || data.error || !data.active) {
      // No active session — show setup UI
      html += `<div class="card" style="border-left:4px solid #ef4444">
        <h2 style="margin-bottom:8px">🔴 Opening Day Live Tracker</h2>
        <p style="color:var(--text2);font-size:13px;margin-bottom:16px">
          Real-time P&L tracking for Opening Day. Track every bet, every score, every dollar as it happens.
        </p>
        <div style="background:rgba(239,68,68,0.08);padding:16px;border-radius:8px;text-align:center;margin-bottom:16px">
          <div style="font-size:48px;margin-bottom:8px">⏳</div>
          <div style="font-size:18px;font-weight:700;margin-bottom:4px">No Active Session</div>
          <div style="font-size:13px;color:var(--text3)">Start a new tracking session on March 27 to go live</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <button onclick="startLiveSession()" style="padding:12px;background:#22c55e;color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px">
            🚀 Start Live Session
          </button>
          <button onclick="loadSessionHistory()" style="padding:12px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:8px;font-weight:600;cursor:pointer;font-size:14px">
            📜 Session History
          </button>
        </div>
      </div>`;
      
      // OD countdown
      const odDate = new Date('2026-03-27T00:00:00Z');
      const now = new Date();
      const daysLeft = Math.ceil((odDate - now) / (1000 * 60 * 60 * 24));
      
      html += `<div class="card" style="text-align:center">
        <div style="font-size:64px;margin-bottom:8px">🦞</div>
        <div style="font-size:28px;font-weight:800;background:linear-gradient(135deg,#22c55e,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
          ${daysLeft} DAYS TO OPENING DAY
        </div>
        <div style="font-size:14px;color:var(--text3);margin-top:8px">March 27, 2026 • 20 Games • 28+ Bets • Let's eat</div>
      </div>`;
      
      html += `<div class="card">
        <h3 style="margin-bottom:8px">📋 How It Works</h3>
        <div style="font-size:13px;line-height:1.8;color:var(--text2)">
          <div>1️⃣ <strong>Pre-Game:</strong> Auto-loads all OD bets from betting card + playbook</div>
          <div>2️⃣ <strong>Live:</strong> Pulls real-time scores from ESPN every 30s</div>
          <div>3️⃣ <strong>Tracking:</strong> Grades bets as games complete (W/L/P)</div>
          <div>4️⃣ <strong>P&L:</strong> Live running total — how much we're up/down</div>
          <div>5️⃣ <strong>CLV:</strong> Compares our entry lines to closing lines (closing line value)</div>
        </div>
      </div>`;
      
    } else {
      // Active session — show live data
      const s = data;
      const picks = s.picks || [];
      const scores = s.liveScores || {};
      const wins = picks.filter(p => p.result === 'WIN').length;
      const losses = picks.filter(p => p.result === 'LOSS').length;
      const pending = picks.filter(p => !p.result || p.result === 'PENDING').length;
      const totalPL = picks.reduce((sum, p) => sum + (p.pnl || 0), 0);
      const totalWagered = picks.reduce((sum, p) => sum + (p.wager || 0), 0);
      
      html += `<div class="card" style="border-left:4px solid ${totalPL >= 0 ? '#22c55e' : '#ef4444'}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h2 style="margin:0">🔴 LIVE — ${s.sessionName || 'Opening Day'}</h2>
          <button onclick="refreshLiveScores()" style="padding:6px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:12px">🔄 Refresh Scores</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px">
          <div style="background:${totalPL >= 0 ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)'};padding:12px;border-radius:8px;text-align:center">
            <div style="font-size:28px;font-weight:800;color:${totalPL >= 0 ? '#22c55e' : '#ef4444'}">${totalPL >= 0 ? '+' : ''}$${totalPL.toFixed(2)}</div>
            <div style="font-size:11px;color:var(--text3)">P&L</div>
          </div>
          <div style="background:var(--bg2);padding:12px;border-radius:8px;text-align:center">
            <div style="font-size:22px;font-weight:700;color:#22c55e">${wins}W</div>
            <div style="font-size:11px;color:var(--text3)">Wins</div>
          </div>
          <div style="background:var(--bg2);padding:12px;border-radius:8px;text-align:center">
            <div style="font-size:22px;font-weight:700;color:#ef4444">${losses}L</div>
            <div style="font-size:11px;color:var(--text3)">Losses</div>
          </div>
          <div style="background:var(--bg2);padding:12px;border-radius:8px;text-align:center">
            <div style="font-size:22px;font-weight:700;color:#f59e0b">${pending}</div>
            <div style="font-size:11px;color:var(--text3)">Pending</div>
          </div>
          <div style="background:var(--bg2);padding:12px;border-radius:8px;text-align:center">
            <div style="font-size:22px;font-weight:700">$${totalWagered.toFixed(0)}</div>
            <div style="font-size:11px;color:var(--text3)">Wagered</div>
          </div>
          <div style="background:var(--bg2);padding:12px;border-radius:8px;text-align:center">
            <div style="font-size:22px;font-weight:700;color:${totalWagered > 0 ? (totalPL/totalWagered >= 0 ? '#22c55e' : '#ef4444') : 'var(--text)'}">${totalWagered > 0 ? ((totalPL/totalWagered)*100).toFixed(1) : '0'}%</div>
            <div style="font-size:11px;color:var(--text3)">ROI</div>
          </div>
        </div>
      </div>`;

      // Bet-by-bet detail
      html += `<div class="card">
        <h3 style="margin-bottom:8px">🎯 Active Bets (${picks.length})</h3>
        <div style="display:grid;gap:6px">`;
      for (const pick of picks) {
        const resultColor = pick.result === 'WIN' ? '#22c55e' : pick.result === 'LOSS' ? '#ef4444' : '#f59e0b';
        const resultIcon = pick.result === 'WIN' ? '✅' : pick.result === 'LOSS' ? '❌' : '⏳';
        html += `<div style="background:var(--bg2);padding:8px 10px;border-radius:6px;border-left:3px solid ${resultColor};display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">
          <span style="font-size:13px">${resultIcon} <strong>${pick.game || ''}</strong> — ${pick.pick || pick.type || ''}</span>
          <span style="font-size:12px;color:var(--text2)">${pick.odds > 0 ? '+' : ''}${pick.odds || pick.ml || ''}</span>
          <span style="font-size:12px">$${(pick.wager || 0).toFixed(0)}</span>
          <span style="font-size:12px;font-weight:700;color:${resultColor}">${pick.result || 'PENDING'} ${pick.pnl ? (pick.pnl >= 0 ? '+' : '') + '$' + pick.pnl.toFixed(2) : ''}</span>
        </div>`;
      }
      html += '</div></div>';

      // Controls
      html += `<div class="card" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px">
        <button onclick="startMonitoring()" style="padding:10px;background:#22c55e;color:#000;border:none;border-radius:6px;font-weight:700;cursor:pointer">▶️ Start Auto-Refresh</button>
        <button onclick="stopMonitoring()" style="padding:10px;background:#ef4444;color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer">⏹ Stop</button>
        <button onclick="refreshLiveScores()" style="padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-weight:600">🔄 Manual Refresh</button>
        <button onclick="loadSessionHistory()" style="padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-weight:600">📜 History</button>
      </div>`;
    }

    wrap.innerHTML = html;
  } catch(e) {
    wrap.innerHTML = `<div class="card">
      <h2>🔴 Live Tracker</h2>
      <p style="color:var(--text2);margin-bottom:12px">Real-time P&L tracking for game day. Monitors scores, grades bets, tracks profit.</p>
      <div style="background:rgba(239,68,68,0.1);padding:12px;border-radius:8px">
        <p style="font-size:13px;color:var(--text3)">⚠️ Error: ${e.message}</p>
        <p style="font-size:12px;color:var(--text3);margin-top:4px">The live tracker will activate on March 27 when games begin.</p>
      </div>
    </div>`;
  }
}

// Live tracker helper functions
async function startLiveSession() {
  try {
    const res = await fetch('/api/live/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: '2026-03-27', bankroll: 1000 })
    });
    const data = await res.json();
    alert(data.error ? 'Error: ' + data.error : 'Session started! ' + (data.picks?.length || 0) + ' bets loaded.');
    loadLiveTrackerTab();
  } catch(e) { alert('Error starting session: ' + e.message); }
}

async function refreshLiveScores() {
  try {
    await fetch('/api/live/update-scores', { method: 'POST' });
    loadLiveTrackerTab();
  } catch(e) { alert('Error refreshing: ' + e.message); }
}

async function startMonitoring() {
  try {
    const res = await fetch('/api/live/monitoring/start', { method: 'POST' });
    const data = await res.json();
    alert(data.started ? 'Auto-refresh started (30s interval)' : 'Already monitoring');
  } catch(e) { alert('Error: ' + e.message); }
}

async function stopMonitoring() {
  try {
    const res = await fetch('/api/live/monitoring/stop', { method: 'POST' });
    const data = await res.json();
    alert(data.stopped ? 'Monitoring stopped' : 'Was not monitoring');
  } catch(e) { alert('Error: ' + e.message); }
}

async function loadSessionHistory() {
  try {
    const res = await fetch('/api/live/history');
    const data = await res.json();
    const wrap = document.getElementById('tab-content');
    
    let html = `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2>📜 Session History</h2>
        <button onclick="loadLiveTrackerTab()" style="padding:6px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:12px">← Back</button>
      </div>`;
    
    if (!data.history?.length) {
      html += '<p style="color:var(--text3);text-align:center;padding:20px">No previous sessions found.</p>';
    } else {
      for (const s of data.history) {
        const plColor = (s.totalPnl || 0) >= 0 ? '#22c55e' : '#ef4444';
        html += `<div style="background:var(--bg2);padding:12px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-weight:700">${s.name || s.date || 'Session'}</div>
            <div style="font-size:12px;color:var(--text3)">${s.date || ''} • ${s.totalPicks || 0} picks</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:18px;font-weight:700;color:${plColor}">${(s.totalPnl || 0) >= 0 ? '+' : ''}$${(s.totalPnl || 0).toFixed(2)}</div>
            <div style="font-size:11px;color:var(--text3)">${s.wins || 0}W-${s.losses || 0}L</div>
          </div>
        </div>`;
      }
    }
    html += '</div>';
    wrap.innerHTML = html;
  } catch(e) {
    alert('Error loading history: ' + e.message);
  }
}

</script>
